          options: ['Хлорофилът се синтезира по-интензивно', 'Хлорофилът се разгражда, разкривайки каротеноидите (жълти и оранжеви)', 'Листата синтезират нови оранжеви пигменти', 'Фотосинтезата преминава към нощен режим'],

          explanation: 'Фотосинтезата е анаболен процес — синтезира органични молекули от CO₂ и H₂O с помощта на светлинна енергия. Клетъчното дишане е катаболен процес — разгражда органиката до CO₂ и H₂O, освобождавайки АТФ. Те са противоположни по посока, но свързани.'

          q: 'Защо увеличаването на температурата над 35°C намалява фотосинтезата?',
          options: ['Хлорофилът се денатурира при висока температура', 'Ензимите на Калвиновия цикъл (включително РуБиСКО) се денатурират при висока температура', 'Светлинната фаза не може да протича при висока температура', 'Водата замръзва при 35°C'],
          correct: 1,
          explanation: 'Тъмнинната (Калвинова) фаза е ензимно катализирана. При температури над оптималните (обикновено 25–35°C) ензимите се денатурират и губят активност. РуБиСКО е особено чувствителен. Затова при жеги фотосинтезата намалява дори при достатъчно светлина.'

          q: 'Как хлоропластите приличат на митохондриите по произход?',
          options: ['И двата са се развили от вируси', 'И двата са се развили от погълнати прокариоти (ендосимбионтна теория)', 'И двата произхождат от апарата на Голджи', 'Хлоропластите са се образували от митохондриите'],

          q: 'На растение с пожълтели листа се предполага хлороза (дефицит на хлорофил). Кой минерален елемент вероятно липсва?',

        }
