      questions: [
        {
          q: 'Сравни сперматогенезата и оогенезата: каква е ключовата разлика в резултатите?',
          options: ['И двата процеса дават 4 жизнеспособни клетки', 'Сперматогенезата дава 4 сперматозоида; оогенезата — 1 яйцеклетка + 3 полярни тела', 'Оогенезата дава 4 яйцеклетки, сперматогенезата — 1 сперматозоид', 'Двата процеса са идентични'],

          explanation: 'При сперматогенезата и 4-те мейотични продукта стават функционални сперматозоиди. При оогенезата деленето е асиметрично — цялата цитоплазма отива в 1 клетка (яйцеклетката), а 3-те полярни тела получават по набор хромозоми, но минимална цитоплазма и деградират. Така яйцеклетката е богата на хранителни резерви.'
        },
        {
          q: 'Защо бактериите могат да се адаптират бързо към антибиотици, въпреки че се размножават безполово?',
          options: ['Защото провеждат мейоза', 'Защото имат висока скорост на делене (мутации се натрупват бързо) и могат да обменят ДНК хоризонтално', 'Защото използват кросинговър', 'Защото са диплоидни'],

        {
          q: 'Ако при мейоза кросинговърът е блокиран, какво ще се случи с генетичното разнообразие?',

          q: 'Клонирането (напр. овцата Доли) е пример за:',
          options: ['Полово размножаване', 'Безполово размножаване — ядрото на соматична клетка се поставя в ооцит; потомецът е генетичен клонинг на донора', 'Хоризонтален генетичен трансфер', 'Партеногенеза'],

          explanation: 'Соматичното клониране (техника на ядрен трансфер) е форма на безполово размножаване. Ядрото от соматична (телесна) клетка на донора се поставя в ооцит без ядро. Полученият организъм е генетичен клонинг на донора (с изключение на митохондриалната ДНК от реципиента). Доли (1996) е първото клонирано бозайник.'
        },
        {
          q: 'Партеногенезата е форма на размножаване, при която:',
          options: ['Яйцеклетката е оплодена от два сперматозоида', 'Яйцеклетката се развива без оплождане от сперматозоид', 'Ембрионът се развива без яйцеклетка', 'Новият организъм е диплоиден само ако е женски'],

          explanation: 'Партеногенезата е развитие на нов организъм от неоплодена яйцеклетка. Среща се при пчели, мравки (мъжките произхождат от партеногенеза), оси, някои гущери. При пчелите: неоплодени яйца → хаплоидни тъмени; оплодени → диплоидни работнички/пчелна майка.'
        },

          q: 'Организъм с 2n=8 провежда мейоза. Колко уникални комбинации от хромозоми е теоретично възможно да се получат само от независимото разпределение?',
          options: ['4', '8', '16', '32'],
          correct: 2,
          explanation: 'Формулата е 2ⁿ, където n = хаплоидният брой (брой двойки хомолози). При 2n=8, n=4 двойки → 2⁴ = 16 различни хромозомни комбинации само от независимото разпределение. При хора (n=23): 2²³ ≈ 8 милиона комбинации. Кросинговърът добавя още безбройно разнообразие.'
        },
        {
          q: 'При какво ОБЩО е между митоза и мейоза II?',
          options: ['И двата разделят хомоложни хромозоми', 'И при двата сестринските хроматиди се разделят и се теглят към противоположни полюси', 'И двата се предхождат от кросинговър', 'И двата произвеждат диплоидни клетки'],
          correct: 1,
          explanation: 'И при митоза, и при мейоза II: хроматидите се разделят (сестринските хроматиди → противоположни полюси). Разликата е, че митозата стартира от диплоидна клетка и дава 2 диплоидни; мейоза II стартира от хаплоидна клетка и дава 2 (общо 4) хаплоидни. При мейоза II НЯМА кросинговър.'
        },
        {
          q: 'При хора, колко хромозоми носи сперматозоидът и яйцеклетката съответно?',
          options: ['46 и 46', '23 и 46', '23 и 23', '46 и 23'],
          correct: 2,
          explanation: 'Гаметите при хора са хаплоидни — съдържат n=23 хромозоми (1 от всяка двойка). Сперматозоидът носи 23, яйцеклетката — 23. При оплождане: 23 + 23 = 46 хромозоми в 23 двойки хомолози. Полът се определя от половата хромозома на сперматозоида (X → момиче, Y → момче).'
        },
        {
          q: 'Кой процес осигурява НАЙ-ГОЛЯМО генетично разнообразие при половото размножаване?',
          options: ['Само мейоза I', 'Комбинацията от кросинговър, независимо разпределение и случайно оплождане', 'Само мейоза II', 'Само оплождането'],

          explanation: 'Трите механизма, генериращи разнообразие при полово размножаване: 1) Кросинговър в профаза I (рекомбинация); 2) Независимо разпределение на хромозомите (2²³ ≈ 8 млн. комбинации за хора); 3) Случайно оплождане (яйцеклетка × сперматозоид = всеки с различна комбинация). Заедно дават практически безкрайно разнообразие.'
        },

          q: 'Фрагментацията е форма на безполово размножаване, характерна за:',

        }
