  <script>

      lessonName: 'Правописна норма',

      title:      'Куиз — Правописна норма — Тест 3',
      sub:        '10 въпроса · Избери верния отговор',
      passScore:  8,
      quizNum:    3,
      questions: [
        { q:'Намери изречението БЕЗ правописна грешка.', opts:['"Листът паднаха от дървото."','"Листът падна от дървото."','"Листа паднаха от дървото."','"Листата падна от дървото."'], correct:1, explanation:'„Листът падна" — „листът" е подлог (ед. ч., пълен член -ът), „падна" е глагол в ед. ч. — съответствие. В другите изречения има несъответствие между подлог и сказуемо или грешен член.' },
        { q:'Кой вариант е правилно написан?', opts:['"нито един"','"нитоедин"','"нито-един"','"ни-то един"'], correct:0, explanation:'„Нито" като съюз е слята дума. „Нито един" — „нито" е слято, но следващата дума „един" е отделна. Правилно: „нито един" (две думи).' },
        { q:'„Черно-бяло" се пише с тире, защото:', opts:['Съдържа цветове','Двата компонента са равноправни (координативна сложна дума)','Е чуждица','Е наречие'], correct:1, explanation:'„Черно-бяло" е координативна сложна дума — двата компонента (черно и бяло) са равноправни, нито единият не определя другия. При субординативните (едното определя другото) → слято: „черноморски".' },
        { q:'Кое е ПРАВИЛНОТО изписване на „вследствие"?', opts:['"в следствие" — разделно','"вследствие" — слято','"въ-следствие" — с тире','"в-следствие" — с тире'], correct:1, explanation:'„Вследствие" (в значение на „поради", „заради") е слят предлог: „вследствие на аварията". Не бъркай с „в следствието" (= в отдела за разследване) — тогава е разделно.' },
        { q:'В изречението „Помогнах на ___" коя форма на „директор" е правилна?', opts:['"директорът"','"директора"','"директорa"','"директоря"'], correct:1, explanation:'„Помогнах на..." — думата е непряко допълнение (не подлог) → кратък член (-а). „Директора" е правилното. Пълен член (-ът) само за подлог.' },
        { q:'Как се транскрибира английската буква "W" в „William" на български?', opts:['В','У','В-У','W'], correct:1, explanation:'Английската "W" се транскрибира като „У" в български: William → Уилям, Washington → Уашингтон. Транскрипцията предава звука, не буквата.' },
        { q:'Кой правопис на „нередовно" е верен?', opts:['"не редовно" — разделно','"нередовно" — слято','"не-редовно" — с тире','"нередъвно"'], correct:1, explanation:'„Не" + наречие → слято: „нередовно", „неправилно", „невярно". „Не" + глагол → разделно: „не работи". Наречията и прилагателните с „не" са слято.' },
        { q:'Намери изречението с ГРЕШЕН правопис.', opts:['"Четох „Под игото" на Вазов."','"Пловдивският университет е голям."','"Той учи в Пловдивски Университет."','"Изпитът беше труден."'], correct:2, explanation:'„Пловдивски Университет" — „университет" е нарицателно существително, пише се с малка буква. Правилно: „Пловдивски университет" или официалното „Пловдивски университет „Паисий Хилендарски"".' },
        { q:'Кой е правилният правопис на „поради"?', opts:['"по ради" — разделно','"по-ради" — с тире','"поради" — слято','"пора-ди" — с тире'], correct:2, explanation:'„Поради" е слят предлог (= заради, вследствие на): „поради лошото време", „поради технически причини". Не се разделя.' },
        { q:'Кое твърдение за пълния член е ВЯРНО?', opts:['Пълният член се пише, когато думата е предмет на разговора','Пълният член (-ът/-ят) се пише само когато думата е граматически подлог в изречението','Пълният член може да се пише при всяко съществително','Пълният и краткият член са взаимозаменяеми'], correct:1, explanation:'Единственото правило е граматическо: пълен член (-ът/-ят) само при подлог. В останалите случаи — кратък (-а/-я). Примери: „Ученикът учи" (подлог) vs. „Виждам ученика" (допълнение).' },
      ]
