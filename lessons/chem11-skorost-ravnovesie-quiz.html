        {
          q: 'Какво е активационна енергия (Ea)?',

          q: 'За реакцията A + B ⇌ C, как се записва Kc?',

        {
          q: 'Принципът на Льо Шателие гласи, че:',

          explanation: 'Реакцията е екзотермична (ΔH < 0, отделя топлина). При T↑, системата се противопоставя — измества равновесието в посоката на ендотермичната обратна реакция (← поглъща топлина). Резултат: по-малко NH₃ при по-висока T. Kc намалява при T↑ за екзо реакция.'
        },
        {
          q: 'Как влияе повишаването на налягане на N₂ + 3H₂ ⇌ 2NH₃?',
          options: ['Намалява добива на NH₃', 'Увеличава добива на NH₃ (4 mol газ → 2 mol газ)', 'Не влияе (твърди вещества)', 'Измества равновесие ← към реагентите'],

          explanation: 'Ляво: 1+3 = 4 mol газ; дясно: 2 mol газ. При P↑ равновесието се измества към страната с по-малко молове газ (→ дясно) → повече NH₃. Затова синтезът на амоняк се провежда при 150–200 atm. Налягането не влияе, ако броят молове газ от двете страни е равен.'
        },
        {
          q: 'Какво е химичното равновесие?',
          options: ['Реагентите са напълно изразходвани', 'Скоростите на правата и обратната реакция са равни, концентрациите не се изменят', 'Реакцията е спряла напълно', 'Концентрацията на продуктите е нула'],

        },
        {
          q: 'Защо реакцията Zn + HCl е по-бърза с цинков прах, отколкото с цинкова бучка?',
