        { q:'Ацетиленът HC≡CH е пример за:', opts:['Алкан','Алкен','Алкин','Ароматен въглеводород'], correct:2, explanation:'Ацетиленът (етин, HC≡CH) е най-простият алкин — съдържа тройна C≡C връзка. Формула C₂H₂, обща формула CₙH₂ₙ₋₂. Използва се при заваряване (ацетиленово-кислородни горелки).' },
        { q:'Реакцията на бензен с бромна вода (Br₂/H₂O) без катализатор:', opts:['Обезцветява бромната вода бързо','Не протича — бензенът е стабилен спрямо адиция без катализатор','Дава полибромиран продукт','Образува фенол'], correct:1, explanation:'За разлика от алкените, бензенът не обезцветява бромна вода без катализатор — ароматната система е стабилна и не претърпява лесно адиция. За заместване (бромиране) е необходим катализатор AlBr₃ или FeBr₃.' },
        { q:'Кой алкан е основната съставка на природния газ?', opts:['Етан','Пропан','Бутан','Метан'], correct:3, explanation:'Природният газ се състои предимно от метан (CH₄, около 85–95%). Метанът е и основна суровина за производство на водород, метанол, амоняк и много химикали.' },
        { q:'Реакцията CH₂=CH₂ + H₂ → CH₃CH₃ се нарича:', opts:['Дехидрогениране','Хидрогениране (хидриране)','Халогениране','Хидратация'], correct:1, explanation:'Присъединяването на водород (H₂) към алкен се нарича хидрогениране или хидриране. Продуктът е съответният алкан. Реакцията протича при катализатор (Ni, Pd, Pt) и е екзотермична.' },
        { q:'Кое вещество обезцветява бромна вода (Br₂/CCl₄)?', opts:['Метан','Бутан','Бутен (1-бутен, CH₂=CH–CH₂–CH₃)','Бензен'], correct:2, explanation:'Алкените обезцветяват бромна вода при адиция на бром към двойната C=C връзка. Алканите и бензенът (без катализатор) не реагират. Качествена реакция за ненаситеност.' },
        { q:'Какво е „изомеризация" при въглеводородите?', opts:['Реакция с кислород','Преобразуване на праволинеен въглеводород в разклонен изомер','Добавяне на водород','Разграждане на молекулата'], correct:1, explanation:'Изомеризацията е преобразуване на един изомер в друг: напр. нормален бутан → изобутан. Бензинът с по-разклонени молекули има по-високо октаново число (по-добро качество).' },

        { q:'Толуенът C₆H₅–CH₃ е:', opts:['Алкан','Алкен','Алкилбензен (ароматен въглеводород с метилова група)','Алкин'], correct:2, explanation:'Толуенът е метилбензен — ароматен въглеводород (бензенов пръстен + метилова група CH₃). Широко използван разтворител и изходен материал за производство на ТНТ, полиуретани, аспирин и много друго.' },
        { q:'Как се получава полиетиленът?', opts:['Хидролиза на етанол','Полимеризация на етилен CH₂=CH₂','Окисляване на метан','Крекинг на нефт'], correct:1, explanation:'Полиетиленът се получава чрез полимеризация на етилен: n(CH₂=CH₂) → (–CH₂–CH₂–)ₙ. При полимеризацията двойните С=С връзки се отварят и мономерите се свързват в дълга верига (полимер). Полиетиленът е най-широко произвежданата пластмаса.' },
