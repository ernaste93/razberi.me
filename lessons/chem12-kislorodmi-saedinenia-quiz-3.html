      quizNum:    3,
      questions: [
        { q:'Фенолът C₆H₅OH е ароматен алкохол. Каква е характерната му реакция с FeCl₃?', opts:['Дава жълто оцветяване','Дава виолетово оцветяване — качествена реакция за феноли','Не реагира','Образува газ'], correct:1, explanation:'Фенолът реагира с железен(III) хлорид (FeCl₃) с получаване на интензивно виолетово (лилаво) оцветяване. Тази реакция е качествена проба за феноли и е различна от реакциите на алифатни алкохоли.' },
        { q:'Кой е правилният IUPAC суфикс за алдехиди?', opts:['-ол','-он','-ал','-ова киселина'], correct:2, explanation:'По IUPAC номенклатурата: алдехидите завършват на -ал (метанал = HCHO, етанал = CH₃CHO), кетоните на -он (пропанон = ацетон), алкохолите на -ол, карбоксилните киселини на -ова киселина.' },
        { q:'Коя функционална група прави карбоксилните киселини киселинни?', opts:['–OH група сама по себе си','Карбонилната C=O група','Комбинацията –COOH: OH протонът се дисоциира поради активиращото влияние на C=O','Въглеродната верига'], correct:2, explanation:'В карбоксилната група –COOH, карбонилната C=O понижава електронната плътност на OH, улеснявайки отдаването на протона (H⁺). Затова карбоксилните киселини са киселинни, докато алкохолите (само –OH) са практически неутрални.' },
        { q:'При нагряване на етанол с конц. H₂SO₄ при ~140°C се получава:', opts:['Оцетна киселина','Диетилов етер (CH₃CH₂–O–CH₂CH₃)','Ацеталдехид','Етилен'], correct:1, explanation:'При ~140°C с конц. H₂SO₄ две молекули етанол реагират с елиминиране на вода: 2C₂H₅OH → C₂H₅–O–C₂H₅ + H₂O (диетилов етер). При по-висока температура (~180°C) от единична молекула се образува етилен (CH₂=CH₂).' },
        { q:'Какъв е процесът, при който захар се превръща в етанол и CO₂?', opts:['Окисляване','Ферментация (алкохолна)','Дестилация','Естерификация'], correct:1, explanation:'Алкохолната ферментация е анаеробен биохимичен процес при дрождите: C₆H₁₂O₆ → 2C₂H₅OH + 2CO₂. Провежда се без кислород. Използва се при производство на вино, бира и хляб.' },
        { q:'Аспиринът е естер на оцетна киселина и салициловата киселина. Каква реакция го произвежда?', opts:['Хидролиза','Окисляване','Естерификация (ацетилиране)','Полимеризация'], correct:2, explanation:'Аспиринът (ацетилсалицилова киселина) се получава при ацетилиране на салициловата киселина с оцетен анхидрид (или оцетна киселина) — естерификация. Той е един от най-продаваните фармацевтични продукти в историята.' },
        { q:'Кой алкохол е токсичен и може да причини слепота при поглъщане?', opts:['Етанол','Пропанол','Метанол (метилов алкохол)','Бутанол'], correct:2, explanation:'Метанолът (CH₃OH) е силно токсичен. При метаболизиране в организма се образуват формалдехид и мравчена киселина, увреждащи зрителния нерв (слепота) и другите органи. Дори малки количества (10-20 ml) могат да причинят смърт.' },
        { q:'Коя е правилната формула на оцетния анхидрид?', opts:['CH₃COOH','(CH₃CO)₂O','CH₃COOCH₃','CH₃CHO'], correct:1, explanation:'Оцетният анхидрид (CH₃CO)₂O е производно на оцетната киселина с две ацилни групи, свързани чрез кислороден атом. Използва се при синтез на естери (включително аспирин) и целулозен ацетат (ацетатна коприна).' },
        { q:'Кое твърдение за естерите е ВЯРНО?', opts:['Естерите са силни киселини','Естерите не се хидролизират','Много естери имат приятна плодова или цветна миризма и се използват в парфюмерията','Естерите не могат да се синтезират от алкохоли'], correct:2, explanation:'Много естери (особено нискомолекулни) имат приятна плодова или цветна миризма: изоамилов ацетат (банан), амилов бутират (кайсия). Затова се използват като аромати в парфюмерията и хранителната промишленост.' },
        { q:'Как се наименува естерът, образуван от метанол и пропанова киселина?', opts:['Метилпропаноат','Пропилметаноат','Метилетаноат','Пропилетаноат'], correct:0, explanation:'Естерите се именуват: алкилова група от алкохола + наименование на киселината с окончание -оат. Метанол дава „метил-", пропанова киселина дава „пропаноат". Значи: метилпропаноат (CH₃CH₂COOCH₃).' },
      ]
