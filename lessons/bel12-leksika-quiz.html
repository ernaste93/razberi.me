        { q:'Какво са синонимите?', opts:['Думи с противоположно значение','Думи с еднакво или близко значение','Думи с еднакъв звуков облик','Думи с двойно значение'], correct:1, explanation:'Синонимите са думи с еднакво или близко значение: „бърз" – „скоростен", „красив" – „хубав". Те могат да се заменят в определен контекст без значителна промяна на смисъла.' },
        { q:'Кой е антонимът на „тъжен"?', opts:['скъп','весел','умен','красив'], correct:1, explanation:'„Весел" е антонимът на „тъжен" — двете думи имат противоположно значение. Антонимите са думи с противоположни значения, свързани в обща семантична сфера.' },

        { q:'Каква е разликата между „наистина" и „въистина"?', opts:['Нямат разлика','„Въистина" е архаична/тържествена форма, „наистина" е книжовната норма за ежедневна употреба','„Наистина" е диалект','„Въистина" е по-правилно'], correct:1, explanation:'„Наистина" е книжовната норма за ежедневна употреба. „Въистина" е архаична/тържествена форма, ползвана в религиозен контекст. Употребата им е стилово различна.' },
