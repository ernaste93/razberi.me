        { q:'Кое изречение е пунктуационно ПРАВИЛНО?', opts:['"Мамо ела тук."','"Мамо, ела тук."','"Мамо ела, тук."','"Мамо, ела, тук."'], correct:1, explanation:'При обръщение задължително се поставя запетая след обръщението (или преди него, ако е в края): „Мамо, ела тук." Обръщенията се изолират с запетая от останалата част на изречението.' },

        { q:'В кое изречение запетаята е ПОСТАВЕНА ГРЕШНО?', opts:['"Знам, че ще дойдеш."','"Момчето, което виждаш, е мой брат."','"Ученикът, учи усърдно."','"Ако вали, оставам вкъщи."'], correct:2, explanation:'„Ученикът, учи усърдно." — между подлог и сказуемо НЕ се поставя запетая. Запетаята разделя части на изречение, но не разделя подлога от сказуемото.' },
