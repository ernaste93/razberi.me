      questions: [
        { q:'Кое изречение е с правилна употреба на „като"?', opts:['Той работи като бърз.','Той работи бързо, като добър специалист.','Той бърз като работи.','Като той работи бърз.'], correct:1, explanation:'„Като добър специалист" е сравнително изречение — правилна употреба на „като" за сравнение. Другите варианти са синтактично некоректни.' },
        { q:'Кое е правилно: „въпреки" или „въпреки че"?', opts:['Само „въпреки" е правилно','„Въпреки" се използва с именна група, „въпреки че" — с изречение','Само „въпреки че" е правилно','Двата израза са взаимозаменяеми'], correct:1, explanation:'„Въпреки умората той работи" (именна група). „Въпреки че беше уморен, той работи" (изречение). Смесването е честа грешка: „въпреки да беше уморен" е нередно.' },
        { q:'Кой е правилният ред на думите в изречението с кратко местоимение?', opts:['Казах го него вчера.','Вчера казах му го.','Вчера му го казах.','Му го вчера казах.'], correct:2, explanation:'Краткото местоимение следва глагола или стои преди него в определен ред. „Вчера му го казах" е нормативното — наречие + кратко местоимение + глагол е допустимо.' },
        { q:'Кое от следните е правилна форма на глагола „ям" в 1 л. ед.ч. сег. вр.?', opts:['ядам','ям','яда','ядя'], correct:1, explanation:'„Ям" е правилната форма в 1 л. ед.ч. сег. вр. „Ядам" е диалектна форма. „Яда" и „ядя" не са книжовни форми за сегашно време.' },
        { q:'Кое изречение е с правилна употреба на „поради" и „заради"?', opts:['Закъснях поради теб.','Закъснях заради болестта.','Закъснях поради болестта.','Поради теб закъснях.'], correct:2, explanation:'„Поради" изисква причина-обстоятелство (нещо, не лице): „поради болестта". „Заради" може да се употребява с лице: „заради теб". Грешка: „поради теб".' },
        { q:'Каква е частта на речта на „вчера" в „Вчера валя дъжд"?', opts:['Прилагателно','Наречие за време','Съществително','Числително'], correct:1, explanation:'„Вчера" е наречие за време — отговаря на въпроса „кога?". Наречията не се менят по род, число или падеж — те са неизменяема част на речта.' },
        { q:'Кое е правилното изречение?', opts:['Очаквам да дойдеш.','Очаквам да дойде ти.','Очаквам ти да дойдеш.','Очаквам дойдеш.'], correct:0, explanation:'„Очаквам да дойдеш" е правилно. В книжовния Bulgarian след „очаквам" следва подчинено изречение с „да". „Очаквам дойдеш" пропуска съюза „да".' },
        { q:'Кое от следните е неправилно съгласуване по род?', opts:['голям успех','голяма успех','голяма победа','голям подвиг'], correct:1, explanation:'„Голяма успех" е грешно — „успех" е мъжки род, правилното е „голям успех". Прилагателното се съгласува по род, число и определеност с определяемото съществително.' },
        { q:'Кое изречение е в бъдеще предварително (futurum exactum) време?', opts:['Ще чета.','Ще съм прочел.','Четях.','Прочетох.'], correct:1, explanation:'„Ще съм прочел" е бъдеще предварително — изразява действие, което ще е завършено преди друго бъдещо действие. „Ще чета" е обикновено бъдеще.' },
        { q:'Кое предложение е за вземане на решение чрез глагола „нека"?', opts:['Нека да отидем.','Нека ще отидем.','Нека сме отишли.','Нека бихме отишли.'], correct:0, explanation:'„Нека да отидем" е правилното подбудително изречение с „нека". „Нека" + „да" + глагол е стандартната конструкция за подбудително изречение в 1 л. мн.ч.' },
