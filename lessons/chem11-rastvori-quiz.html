      questions: [
        {
          q: 'Какво е рН на неутрален разтвор при 25°C?',
          options: ['0', '7', '14', '1'],
          correct: 1,
          explanation: 'При 25°C неутралният разтвор (чиста вода) има [H⁺] = [OH⁻] = 10⁻⁷ mol/L. рН = −log(10⁻⁷) = 7. При рН < 7 разтворът е кисел, при рН > 7 — основен.'

        {
          q: 'Кое от следните е силен електролит?',
          options: ['CH₃COOH (оцетна киселина)', 'NH₃ (амоняк)', 'HCl (солна киселина)', 'H₂O (вода)'],
          correct: 2,
          explanation: 'HCl (солна киселина) е силна киселина — дисоциира напълно: HCl → H⁺ + Cl⁻. Оцетната киселина и амонякът са слаби електролити (частична дисоциация). Водата е много слаб електролит (Kw = 10⁻¹⁴).'
        },
        {
          q: 'Каква е молната концентрация на разтвор с 0,2 mol NaCl в 500 mL разтвор?',

          correct: 2,
          explanation: 'c = n/V = 0,2 mol / 0,5 L = 0,4 mol/L. Внимание: 500 mL = 0,5 L! Концентрацията е 0,4 M (0,4 mol/L).'

        {
          q: 'Реакцията HCl + NaOH → NaCl + H₂O е:',

          explanation: 'Реакцията между киселина (HCl) и основа (NaOH) се нарича неутрализация. Нетното йонно уравнение е: H⁺ + OH⁻ → H₂O. Продуктите са сол (NaCl) и вода. Степените на окисление не се променят — не е редокс.'
        },
        {
          q: 'Лакмусовата хартия оцветява се в червено при:',
          options: ['рН > 7', 'рН = 7', 'рН < 7', 'рН > 12'],
          correct: 2,
          explanation: 'Лакмусът е индикатор, който е червен в кисела среда (рН < 7), лилав при неутрална (рН ≈ 7) и тъмносин в основна (рН > 7). Киселините превръщат синия лакмус в червен.'

          q: 'Ако [H⁺] = 0,001 mol/L, какво е рН?',
          options: ['1', '3', '7', '11'],

          q: 'Кое от следните вещества е слаба киселина?',
          options: ['HNO₃', 'H₂SO₄', 'HCl', 'H₂CO₃'],

          explanation: 'Въглената киселина (H₂CO₃) е слаба киселина — дисоциира частично (H₂CO₃ ⇌ H⁺ + HCO₃⁻). HNO₃, H₂SO₄ и HCl са силни киселини — дисоциират напълно.'

          q: 'Какво се получава при разтваряне на NH₄Cl (амониев хлорид) — сол от слаба основа и силна киселина?',

          explanation: 'NH₄Cl се образува от слаба основа (NH₃) и силна киселина (HCl). При разтваряне NH₄⁺ хидролизира: NH₄⁺ + H₂O ⇌ NH₃ + H₃O⁺, отделяйки H⁺ йони. Разтворът е кисел (рН < 7).'
        },

          q: 'Какво изразява рОН?',
          options: ['рОН = −log[H⁺]', 'рОН = −log[OH⁻]', 'рОН = рН − 14', 'рОН = 7 при кисел разтвор'],
