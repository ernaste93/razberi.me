        },
        {
          q: 'Спорообразуването като безполово размножаване е характерно за:',
          options: ['Само за бактерии', 'Гъби, папрати, мъхове и бактерии', 'Само за животни', 'Само за растения с цветове'],

          explanation: 'Спорообразуването е характерно за гъби, папрати, мъхове (безсеменни растения) и бактерии. Спорите са специализирани клетки — устойчиви на неблагоприятни условия (суша, висока температура) и могат да бъдат разнасяни от вятъра или вода. При подходящи условия покълват и дават нов организъм.'

          correct: 1,
          explanation: 'Независимото разпределение (Закон на Мендел) гласи: при ориентацията на биваленти в метафаза I всяка двойка хомолози се наредва независимо от другите. Майчиният или бащиният хомолог от всяка двойка попада случайно в дадена клетка. При 23 двойки при хора → 2²³ различни комбинации (~8 милиона)!'
        },
