  <script>
    window.QUIZ_CONFIG = {
      lessonKey:   'chem12-lekarstva-goriva-q2',
      lessonUrl:   '/lessons/chem12-lekarstva-goriva.html',
      lessonName:  'Лекарства, горива и полимери',
      eyebrow:     'ХИМИЯ · 12 КЛАС',
      title:       'Тест 2 – Полимери',
      sub:         '10 въпроса · Избери верния отговор',
      passScore:   8,
      quizNum:     2,
      nextQuizUrl: '/lessons/chem12-lekarstva-goriva-quiz-3.html',
      questions: [
        {
          q: 'Какво е полимер?',
          opts: ['Малка молекула с молекулно тегло под 1000', 'Голяма молекула, изградена от многократно повтарящи се мономерни единици', 'Смес от различни соли', 'Вид изкопаемо гориво'],
          correct: 1,
          explanation: 'Полимерите са макромолекули, изградени от многократно повтарящи се малки молекули – мономери, свързани чрез ковалентни връзки. Реакцията на образуване се нарича полимеризация. Примери: полиетилен, нишесте, ДНК.'
        },
        {
          q: 'Кой е мономерът на полиетилена?',
          opts: ['Пропилен (CH₂=CHCH₃)', 'Стирен (C₆H₅CH=CH₂)', 'Етилен (CH₂=CH₂)', 'Винилхлорид (CH₂=CHCl)'],
          correct: 2,
          explanation: 'Полиетиленът (PE) се получава чрез полимеризация на етилен (CH₂=CH₂). Двойната C=C връзка на етилена се разкъсва и мономерите се свързват в дълга верига: −[CH₂−CH₂]ₙ−. Полиетиленът е най-широко произвежданата пластмаса в света.'
        },
        {
          q: 'Какво се съдържа в структурата на PVC (поливинилхлорид), което го отличава от другите пластмаси?',
          opts: ['Азот', 'Хлор', 'Сяра', 'Фосфор'],
          correct: 1,
          explanation: 'PVC (поливинилхлорид) съдържа хлорни атоми в структурата си. Мономерът е винилхлорид (CH₂=CHCl). Хлорът придава на PVC огнеустойчивост и химична стабилност, но при изгаряне отделя токсични хлорсъдържащи съединения.'
        },
        {
          q: 'Кой полимер се получава чрез кондензационна полимеризация между диамин и дикарбоксилна киселина?',
          opts: ['Полиетилен', 'Полистирен', 'PVC', 'Найлон (полиамид)'],
          correct: 3,
          explanation: 'Найлонът (полиамид) се получава чрез кондензационна полимеризация: при всяко свързване на диамин с дикарбоксилна киселина се образува пептидна (амидна) връзка −CO−NH− и се отделя молекула H₂O. Типичен пример: найлон-6,6 от хексаметилендиамин и адипинова киселина.'
        },
        {
          q: 'Какво е вулканизация на каучука?',
          opts: ['Разтваряне на каучука в разтворители', 'Нагряване с елементарна сяра, при което се образуват дисулфидни мостове между веригите', 'Охлаждане под −80°C', 'Реакция с азотна киселина'],
          correct: 1,
          explanation: 'Вулканизацията е процес, открит от Чарлз Гудиър, при който каучукът се нагрява с елементарна сяра (S). Сярата образува дисулфидни (−S−S−) мостове между полимерните вериги, правейки материала здрав, еластичен и устойчив на температури. Без вулканизация каучукът е лепкав и нетраен.'
        },
        {
          q: 'От какво е изграден природният каучук?',
          opts: ['Полиетилен', 'Полиизопрен', 'Полистирен', 'Полипропилен'],
          correct: 1,
          explanation: 'Природният каучук е полиизопрен – полимер на изопрена (2-метилбутадиен-1,3). Получава се от латекса на каучуковото дърво (Hevea brasiliensis). Молекулата съдържа двойни C=C връзки в цис-конфигурация, което му придава еластичност.'
        },
        {
          q: 'Кое изделие се произвежда от полипропилен (PP)?',
          opts: ['Стиропор (разпенени опаковки)', 'Прозоречни профили и тръби (PVC)', 'Канализационни тръби и кутии', 'Найлонови чорапи'],
          correct: 2,
          explanation: 'Полипропиленът (PP) е по-твърд и термоустойчив от полиетилена. Използва се за производство на канализационни тръби, кутии за хранителни продукти, автомобилни броячи, медицински спринцовки и контейнери. Прозоречните профили и тръбите за вода обикновено са PVC.'
        },
        {
          q: 'Полистиренът (PS) се използва за производство на:',
          opts: ['Автомобилни гуми', 'Разпенени (стиропорени) опаковки и еднократни съдове', 'Найлонови влакна', 'Тръбопроводи'],
          correct: 1,
          explanation: 'Полистиренът (PS) е полимер на стирена. В разпенен вид (EPS – expandable polystyrene) образува стиропора – лек, добър топлоизолатор. Използва се за опаковки на електроника, термоси, еднократни чаши и чинии.'
        },
        {
          q: 'Кои полимери се разграждат от микроорганизми в природата?',
          opts: ['Полиетилен и PVC', 'Полипропилен и полистирен', 'Полилактид (PLA) и полигидроксиалканоати (PHA)', 'Найлон и тефлон'],
          correct: 2,
          explanation: 'Биоразградимите полимери като полилактид (PLA, от млечна киселина) и полигидроксиалканоати (PHA, произведени от бактерии) могат да се разграждат от микроорганизми в почвата. Традиционните пластмаси (PE, PVC, PP) остават в природата стотици години.'
        },
        {
          q: 'Кой тип полимеризация се осъществява при образуване на полиетилен?',
          opts: ['Кондензационна полимеризация', 'Верижна (адиционна) полимеризация', 'Йонна обмяна', 'Хидролиза'],
          correct: 1,
          explanation: 'Полиетиленът се получава чрез адиционна (верижна) полимеризация: двойните C=C връзки на етилена се разкъсват и мономерите се добавят един към друг без отделяне на странични продукти. Кондензационната полимеризация (при найлон, полиестер) отделя малки молекули като H₂O.'
        }
      ]
    };
