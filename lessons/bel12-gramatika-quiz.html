      questions: [
        { q:'Кое изречение е граматически правилно?', opts:['Аз и ти отидохме на кино.','Аз и ти отиде на кино.','Аз и ти отидоха на кино.','Аз и ти отиди на кино.'], correct:0, explanation:'При субект „Аз и ти" (1 л. и 2 л.) глаголът трябва да е в 1 л. мн.ч. — „отидохме". Грешките идват от несъгласуване по лице и число.' },
        { q:'Кое е правилното множествено число на „ден"?', opts:['дении','дни','дений','дньове'], correct:1, explanation:'Правилното множествено число е „дни". Формата „дении" е диалектна, а „дньове" и „дений" не съществуват в книжовния език.' },
        { q:'Кой е глаголът в изречението „Ученикът чете книга"?', opts:['Ученикът','чете','книга','Изречението няма глагол'], correct:1, explanation:'„Чете" е глаголът — означава действие. „Ученикът" е подлог (съществително), „книга" е допълнение (съществително).' },
        { q:'Кое от следните е прилагателно?', opts:['бързо (тичам бързо)','бърз (бърз влак)','бързина','забързвам'], correct:1, explanation:'„Бърз" в „бърз влак" е прилагателно — определя съществителното „влак". „Бързо" в случая е наречие (отговаря на въпроса „как?"), „бързина" е съществително, „забързвам" е глагол.' },
        { q:'Кое местоимение е правилно в изречението „___ ми каза истината"?', opts:['Него','Нему','Той','Него му'], correct:2, explanation:'Правилно е „Той ми каза истината" — „Той" е именителен падеж (подлог). „Него" е винителен (за допълнение), „Нему" е старинна форма. „Него му" е тавтологична грешка.' },
        { q:'Кое е правилното глаголно време в изречението: „Вчера аз ___ вкъщи"?', opts:['съм бил','бях','ще бъда','бивам'], correct:1, explanation:'„Бях" е минало несвършено (имперфект) — правилно за завършено действие в конкретен момент от миналото. „Вчера" сочи минало, „съм бил" е перфект, а „ще бъда" е бъдеще.' },
        { q:'В кое изречение има грешка в съгласуването?', opts:['Момичето е красиво.','Три момчета играеха.','Книгата е нова.','Децата е весели.'], correct:3, explanation:'„Децата е весели" е грешно — „децата" е мн.ч., глаголът трябва да е „са": „Децата са весели". Грешката е несъгласуване по число между подлог и сказуемо.' },
        { q:'Какво е „много красив" — степенна форма на прилагателното?', opts:['Положителна степен','Сравнителна степен','Превъзходна степен','Умалителна форма'], correct:0, explanation:'„Много красив" е положителна степен — описва качеството без сравнение. Сравнителна е „по-красив", превъзходна е „най-красив".' },
        { q:'Кое изречение съдържа правилна употреба на „ли"?', opts:['Знаеш ли?','Знаеш ли ли?','Знаели?','Знаеш?'], correct:0, explanation:'„Знаеш ли?" е правилна въпросителна конструкция. Частицата „ли" следва глагола и образува въпрос. „Знаеш ли ли?" е удвояване, „Знаели?" е грешна форма.' },
        { q:'Кое от следните изречения е в страдателен залог?', opts:['Учителят обяснява урока.','Урокът е обяснен от учителя.','Учителят обяснява добре.','Урокът е труден.'], correct:1, explanation:'„Урокът е обяснен от учителя" е страдателен залог — подлогът „урокът" претърпява действието, а извършителят е въведен с предлога „от". В деятелен залог подлогът извършва действието.' },
