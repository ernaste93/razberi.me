  <script>

      eyebrow:     'БИОЛОГИЯ · 12 КЛАС',
      title:       'Тест 1 — Мутации и популационна генетика',
      sub:         '10 въпроса · Избери верния отговор',
      passScore:   8,
      quizNum:     1,
      nextQuizUrl: '/lessons/bio12-mutatsii-quiz-2.html',
      questions: [
        {
          q: 'Кой вид мутация е замяната на 1 нуклеотид в ДНК веригата?',
          options: ['Хромозомна мутация', 'Геномна мутация', 'Генна (точкова) мутация', 'Транслокация'],
          correct: 2,
          explanation: 'Генните (точкови) мутации засягат единичен нуклеотид — чрез замяна (субституция), вмъкване (инсерция) или заличаване (делеция). Хромозомните мутации променят структурата на цяла хромозома, а геномните — броя хромозоми.'
        },
        {
          q: 'Сърповидно-клетъчната анемия е причинена от:',
          options: ['Делеция на хромозома 5', 'Тризомия на хромозома 21', 'Замяна на 1 нуклеотид в гена за β-хемоглобин', 'Полиплоидия'],
          correct: 2,
          explanation: 'При сърповидно-клетъчната анемия е заменен единствен нуклеотид в β-глобиновия ген (GAG→GTG), което води до синтез на хемоглобин S. Еритроцитите придобиват сърповидна форма и се блокират в капилярите.'
        },
        {
          q: 'Синдромът на Даун е резултат от:',
          options: ['Делеция в хромозома 5', 'Инверсия в хромозома 21', 'Тризомия 21 — три копия на хромозома 21', 'Транслокация между хромозоми 14 и 21'],
          correct: 2,
          explanation: 'Синдромът на Даун в класическата си форма се дължи на тризомия 21 — наличие на три копия на хромозома 21 (общо 47 хромозоми). Това е геномна мутация от типа анеуплоидия.'
        },
        {
          q: 'Коя от следните е ХРОМОЗОМНА мутация?',
          options: ['Замяна на 1 азотна база', 'Делеция на участък от хромозомата', 'Добавяне на цял хромозомен набор (полиплоидия)', 'Грешка при репликацията на ДНК'],
          correct: 1,
          explanation: 'Хромозомните мутации (делеция, дупликация, инверсия, транслокация) засягат структурата на хромозомата — загуба, удвояване, обръщане или пренасяне на участъци. Полиплоидията е геномна мутация.'
        },
        {
          q: 'Синдромът "Писък на котката" (cri-du-chat) е причинен от:',
          options: ['Тризомия 5', 'Делеция в късото рамо на хромозома 5', 'Инверсия в хромозома 5', 'Полизомия X'],
          correct: 1,
          explanation: 'Cri-du-chat е причинен от делеция (загуба на участък) в късото рамо на хромозома 5. Засегнатите деца издават характерен пискащ звук, подобен на котешко мяукане, откъдето идва и наименованието.'
        },
        {
          q: 'Кой е пример за ФИЗИЧЕСКИ мутаген?',
          options: ['Бензпирен в цигарения дим', 'UV лъчение', 'Вирус HPV', 'Нитрозамини'],
          correct: 1,
          explanation: 'UV лъчението е физически мутаген — причинява образуване на тиминови димери в ДНК, които блокират репликацията. Бензпирен и нитрозамините са химически мутагени, а HPV е биологичен.'
        },
        {
          q: 'Транспозоните се класифицират като:',
          options: ['Физически мутагени', 'Химически мутагени', 'Биологични мутагени', 'Спонтанни мутации'],
          correct: 2,
          explanation: 'Транспозоните ("скачащи гени") са ДНК елементи, способни да се преместват в рамките на генома. Те се причисляват към биологичните мутагени, тъй като вграждането им може да наруши функцията на гени.'
        },
        {
          q: 'Полиплоидията е явление, при което:',
          options: ['Липсва една хромозома', 'Цял хромозомен набор е умножен кратно (3n, 4n и т.н.)', 'Участък от хромозома е обърнат наобратно', 'Добавена е само 1 хромозома (47 общо)'],
          correct: 1,
          explanation: 'Полиплоидията е геномна мутация, при която броят на хромозомните набори се умножава кратно. Широко разпространена е при растенията (пшеницата е хексаплоид, 6n=42). При хората обикновено е летална.'
        },
        {
          q: 'Вмъкването (инсерцията) на 1 нуклеотид в кодиращата последователност е опасно, защото:',
          options: ['Винаги блокира транскрипцията', 'Води до изместване на рамката на четене на всички следващи кодони', 'Причинява полиплоидия', 'Засяга само интроните и няма ефект'],
          correct: 1,
          explanation: 'Вмъкването или заличаването на нуклеотид води до "изместване на рамката на четене" (frameshift mutation) — всички кодони след точката на мутацията се четат погрешно, което обикновено води до нефункционален протеин.'
        },
        {
          q: 'Колко е честотата на спонтанни мутации при репликацията на ДНК?',
          options: ['1 на 10³ нуклеотида', '1 на 10⁶ нуклеотида', '1 на 10⁹ нуклеотида', '1 на всеки нуклеотид'],
          correct: 2,
          explanation: 'Скоростта на спонтанни мутации е приблизително 1 на 10⁹ нуклеотида на репликация. Клетките разполагат с ефективни механизми за поправка на ДНК (DNA repair), но малка част от грешките остават незабелязани.'
        }
      ]
    };
