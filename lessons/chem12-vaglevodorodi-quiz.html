      questions: [
        { q:'Каква е общата формула на алканите?', opts:['CₙH₂ₙ','CₙH₂ₙ₊₂','CₙH₂ₙ₋₂','CₙHₙ'], correct:1, explanation:'Алканите (наситени въглеводороди) имат обща формула CₙH₂ₙ₊₂. Съдържат само единични C–C и C–H връзки. Примери: метан CH₄ (n=1), етан C₂H₆ (n=2), пропан C₃H₈ (n=3).' },
        { q:'Кой е правилното IUPAC наименование на CH₃–CH₂–CH₂–CH₃?', opts:['Пентан','Бутан','Пропан','Хексан'], correct:1, explanation:'CH₃–CH₂–CH₂–CH₃ е бутан (4 въглеродни атома). По IUPAC: мет-(1С), ет-(2С), проп-(3С), бут-(4С), пент-(5С), хекс-(6С)... + -ан за наситени.' },
        { q:'Каква е характерната реакция на алканите?', opts:['Присъединяване','Заместване (халогениране, нитриране)','Полимеризация','Естерификация'], correct:1, explanation:'Алканите са химически инертни (отсъствие на двойни/тройни връзки) и претърпяват предимно реакции на заместване: халогениране (CH₄ + Cl₂ → CH₃Cl + HCl при светлина), нитриране. Горят с пълно окисляване.' },
        { q:'Каква е общата формула на алкените?', opts:['CₙH₂ₙ₊₂','CₙH₂ₙ','CₙH₂ₙ₋₂','CₙHₙ'], correct:1, explanation:'Алкените (ненаситени въглеводороди с една двойна връзка) имат обща формула CₙH₂ₙ. Примери: етен (етилен) CH₂=CH₂ (n=2), пропен CH₂=CH–CH₃ (n=3).' },
        { q:'Каква е характерната реакция на алкените?', opts:['Заместване','Присъединяване (адиция) – към двойната C=C връзка','Горене','Крекинг'], correct:1, explanation:'Двойната C=C връзка е реакционен център. Алкените претърпяват реакции на присъединяване: хидрогениране (+ H₂ → алкан), халогениране (+ Br₂ → дибромалкан), хидратация (+ H₂O → алкохол). Обезцветяват бромова вода.' },
        { q:'Каква е общата формула на алкините?', opts:['CₙH₂ₙ₊₂','CₙH₂ₙ','CₙH₂ₙ₋₂','CₙH₂ₙ₋₄'], correct:2, explanation:'Алкините (ненаситени въглеводороди с тройна С≡С връзка) имат обща формула CₙH₂ₙ₋₂. Пример: ацетилен (етин) HC≡CH – C₂H₂ (2×2−2=2). Реагират с присъединяване подобно на алкените.' },
        { q:'Бензенът C₆H₆ е:', opts:['Алкан','Алкен','Ароматен въглеводород с делокализирана π-система','Алкин'], correct:2, explanation:'Бензенът е представителен ароматен въглеводород. Молекулата му е плоска шестоъгълна с делокализирани π-електрони (резонансна структура). Характерна реакция за него е заместването (не присъединяването), запазващо ароматността.' },
        { q:'Кой газ се използва за зреене на плодове и е прост алкен?', opts:['Метан','Ацетилен','Етилен (етен, CH₂=CH₂)','Бутан'], correct:2, explanation:'Етиленът (CH₂=CH₂) е растителен хормон, ускоряващ зреенето на плодовете. В промишлеността се използва и за производство на полиетилен чрез полимеризация.' },
        { q:'Изомерите са вещества с:', opts:['Еднаква структура и свойства','Еднаква молекулна формула, но различна структура и различни свойства','Различна молекулна формула, но еднакви свойства','Различен брой атоми'], correct:1, explanation:'Структурните изомери имат еднаква молекулна формула, но различно свързване на атомите (различна структура). Пример: бутан (CH₃CH₂CH₂CH₃) и изобутан (CH₃CH(CH₃)CH₃) – и двата с формула C₄H₁₀.' },
        { q:'Какво е „крекинг" при преработка на нефт?', opts:['Изгаряне на нефт','Разцепване на дълговерижни въглеводороди на по-малки молекули при висока температура','Очистване на нефт от сяра','Смесване на различни фракции'], correct:1, explanation:'Крекингът е термичен или каталитичен процес, при който дълговерижни алкани (от тежки нефтени фракции) се разцепват на по-малки молекули (бензин, газ, алкени). Дава бензин с по-добри качества от директната дестилация.' },
