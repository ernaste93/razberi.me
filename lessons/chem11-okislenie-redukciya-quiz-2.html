          options: ['1', '3', '5', '8'],

          q: 'Каква е С.О. на Mn в KMnO₄?',
          options: ['+2', '+4', '+6', '+7'],

          explanation: 'KMnO₄: K(+1) + Mn(x) + O(−2)×4 = 0 → 1 + x − 8 = 0 → x = +7. Mn е в степен +7 в перманганат — максималната за мангана. При редукция: в кисела → Mn²⁺(+2); неутрална → MnO₂(+4); силно алкална → MnO₄²⁻(+6).'
