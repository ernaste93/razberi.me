        {

          opts: [
            'Орган → Тъкан → Клетка → Органна система → Организъм',
            'Клетка → Тъкан → Орган → Органна система → Организъм',
            'Тъкан → Клетка → Органна система → Орган → Организъм',
            'Клетка → Орган → Тъкан → Организъм → Органна система'

          correct: 1,
          explanation: 'Правилният ред е: Клетка → Тъкан → Орган → Органна система → Организъм. Всяко ниво е изградено от елементите на предходното.'
        },
        {
          q: 'Колко основни вида тъкани има при животните (и човека)?',
          opts: ['2', '3', '4', '5'],
          correct: 2,
          explanation: 'При животните има 4 основни вида тъкани: епителна, съединителна, мускулна и нервна.'

        {

            'Мускулна тъкан',
            'Епителна тъкан',
            'Нервна тъкан'

          correct: 2,
          explanation: 'Епителната тъкан покрива повърхности и кухини. Клетките й са плътно наредени без пространство между тях – основна разлика от съединителната тъкан.'
        },
        {
          q: 'Кой вид тъкан се характеризира с голямо количество извънклетъчно вещество (матрикс)?',
          opts: [
            'Епителна тъкан',
            'Съединителна тъкан',
            'Мускулна тъкан',
            'Нервна тъкан'
          ],
          correct: 1,
          explanation: 'Съединителната тъкан има много извънклетъчно вещество (матрикс). Именно матриксът определя свойствата на различните видове съединителна тъкан – течен при кръвта, минерализиран при костта.'

        {
          q: 'Кръвта е вид:',
          opts: [

            'Мускулна тъкан',
            'Нервна тъкан',
            'Съединителна тъкан'
          ],
          correct: 3,
          explanation: 'Кръвта е вид съединителна тъкан с течен матрикс – плазмата. Кръвните клетки (еритроцити, левкоцити, тромбоцити) са потопени в нея.'

          q: 'Кой вид мускулна тъкан е набразден, но неволен и притежава автоматизъм?',

            'Скелетна мускулна тъкан',
            'Гладка мускулна тъкан',
            'Сърдечна мускулна тъкан',
            'Гладка и скелетна едновременно'
          ],
          correct: 2,
          explanation: 'Сърдечният мускул е набразден (като скелетния), но неволен и с автоматизъм (бие само по себе си без нервен импулс). Среща се само в сърцето.'
        },
        {
          q: 'Гладката мускулна тъкан се среща:',
          opts: [
            'Само в сърцето',
            'Прикрепена към костите',
            'В стените на вътрешните органи (стомах, черва, кръвоносни съдове)',
            'Само в скелетната мускулатура'
          ],
          correct: 2,
          explanation: 'Гладката мускулна тъкан е ненабраздена и неволна – открива се в стените на вътрешните органи: стомах, черва, пикочен мехур, кръвоносни съдове.'

          opts: [
            'Ненабраздена структура и неволен контрол',
            'Набраздена структура и доброволен контрол',

            'Автоматизъм и набраздена структура'

          explanation: 'Скелетната мускулна тъкан е набраздена (под микроскоп се виждат напречни ивици) и доброволна – контролира се съзнателно. Прикрепена е към костите чрез сухожилия.'

          q: 'Сухожилията и връзките са изградени от:',
          opts: [

            'Плътна съединителна тъкан',
            'Рехава съединителна тъкан',
            'Мускулна тъкан'
          ],
          correct: 1,
          explanation: 'Сухожилията (свързват мускул с кост) и връзките (свързват кост с кост) са изградени от плътна съединителна тъкан – колагенови влакна, наредени успоредно.'

        {
          q: 'Коя тъкан НЕ е вид съединителна тъкан?',
          opts: [
            'Хрущял',
            'Кост',
            'Мастна тъкан',
            'Ресничест епител'
          ],
          correct: 3,
          explanation: 'Ресничестият епител е вид епителна тъкан – покрива дихателните пътища и движи частиците с ресничките си. Хрущялът, костта и мастната тъкан са видове съединителна тъкан.'
        }
      ]
