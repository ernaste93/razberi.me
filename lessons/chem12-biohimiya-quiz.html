      questions: [
        { q:'Кои са основните класове биомолекули в живите организми?', opts:['Соли, оксиди, киселини, основи','Въглехидрати, мазнини, белтъци, нуклеинови киселини','Алкани, алкени, алкини, арени','Естери, алкохоли, алдехиди, кетони'], correct:1, explanation:'Четирите основни класа биомолекули са: въглехидрати (енергиен източник), мазнини (липиди — резервна енергия и мембрани), белтъци (структурни и функционални молекули) и нуклеинови киселини (ДНК и РНК — носители на наследствена информация).' },

        { q:'Какво е нишестето от химична гледна точка?', opts:['Дизахарид','Монозахарид','Полизахарид, изграден от глюкозни единици','Мастна киселина'], correct:2, explanation:'Нишестето е полизахарид — полимер на глюкозата. Изгражда се от амилоза (неразклонена верига) и амилопектин (разклонена верига). Служи като резервен въглехидрат в растенията.' },

        { q:'Какъв е съставът на мазнините (триглицеридите)?', opts:['Глицерол + три молекули аминокиселини','Глицерол + три молекули мастни киселини (естерна връзка)','Три молекули глюкоза','Фосфор + азот + въглерод'], correct:1, explanation:'Мазнините (триглицериди) са естери на тривалентния алкохол глицерол с три молекули мастни киселини. Реакцията е естерификация. Мазнините са неполярни и не се разтварят в вода.' },
        { q:'Каква е разликата между наситени и ненаситени мастни киселини?', opts:['Наситените са по-малки молекули','Ненаситените имат двойни C=C връзки, наситените — само единични','Наситените са течни при стайна температура','Ненаситените не могат да образуват мазнини'], correct:1, explanation:'Наситени мастни киселини: само единични C-C връзки (напр. палмитинова, стеаринова) — твърди при стайна температура. Ненаситени: имат 1 или повече двойни C=C връзки (напр. олеинова, линолова) — течни при стайна температура (масла).' },
        { q:'Кои са градивните единици на белтъците?', opts:['Нуклеотиди','Монозахариди','Аминокиселини','Мастни киселини'], correct:2, explanation:'Белтъците (протеините) са полимери, изградени от аминокиселини, свързани с пептидни връзки (–CO–NH–). В природата се срещат 20 стандартни аминокиселини, чиято последователност определя структурата и функцията на протеина.' },
