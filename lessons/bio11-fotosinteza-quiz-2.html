        {
          q: 'Какво се случва при затваряне на устицата на листата?',
          options: ['Светлинната фаза спира', 'CO₂ не може да влезе, фотосинтезата се забавя', 'Хлорофилът се разгражда', 'АТФ синтезата се ускорява'],
