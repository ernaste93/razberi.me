        { q:'Каква е разликата между любовта в „Крадецът на праскови" и любовта в народната балада?', opts:['Няма разлика','При Станев любовта е психологически реалистична и трагична поради конкретни исторически обстоятелства','Народната балада е по-трагична','При Станев любовта е щастлива'], correct:1, explanation:'Народната балада обяснява трагедията с митологични или съдбови причини. При Станев причината е историческа и конкретна — войната е тази, която разделя. Психологическият реализъм е ключов.' },
        { q:'Как образът на „затворника" се пресича с темата за свободата?', opts:['Затворникът е свободен защото е в плен','Парадоксът: физически в плен, но духовно свободен чрез любовта — и обратното, войниците са „свободни", но духовно пленени от войната','Затворникът символизира само наказанието','Няма пресичане'], correct:1, explanation:'Парадоксът е ключов: пленникът е духовно свободен — любовта му дава свобода. Победителите (войниците) са духовно пленени от системата на войната. Истинската свобода е вътрешна.' },
        { q:'Каква е ролята на „мълчанието" в комуникацията между героите?', opts:['Липса на комуникация','Мълчанието е по-красноречиво от думите — то изразява неизказаното, защото думите не могат да преодолеят пропастта','Страх да говорят','Езиковата бариера'], correct:1, explanation:'Мълчанието е значимо — двамата герои говорят различни езици (в буквален и метафоричен смисъл). Неизказаното е по-дълбоко от казаното. Мълчанието е формата на невъзможния диалог.' },
        { q:'Как Станев изобразява военния ред като система?', opts:['С възхищение','Критично — военният ред е безчовечен, принуждава хората да потискат човечността си','Неутрално','Като необходимо зло'], correct:1, explanation:'Станев е критичен към военния ред като система — той принуждава хората да игнорират човечността си и да следват абстрактни заповеди. Системата превръща хората в части от машина.' },
        { q:'Каква е значимостта на детайла „ботуши" в образа на героя?', opts:['Само описание на облеклото','Ботушите символизират военната система, в която е потопен героят — той е войник преди всичко','Показват богатство','Символ на свободата'], correct:1, explanation:'Конкретните детайли (ботуши, мундир) напомнят постоянно, че героят е войник — системата е буквално „облечена" върху него. Те са материален знак за потапянето в военната идентичност.' },
        { q:'Как любовната история в повестта функционира като морален урок?', opts:['Тя не е морален урок','Показва, че дори в най-тежките обстоятелства хората могат да запазят човечността си','Учи, че любовта е глупост','Показва, че войните са добри'], correct:1, explanation:'Моралният урок е: дори в лудостта на войната, хората могат да запазят и демонстрират човечността си чрез любов, съчувствие и доброта. Това е заявка за вяра в човека.' },
        { q:'Как може да се интерпретира заглавието „Крадецът на праскови"?', opts:['Буквална история за кражба','Метафора за желанието за живот и красота в ситуация, в която са забранени','Осъждане на крадеца','Ирония към войната'], correct:1, explanation:'Заглавието е метафоричен ключ — „крадецът" е онзи, който тайно си взима красота (праскови = живот, любов) оттам, където е забранено. Той „краде" от войната за да остане човек.' },
        { q:'Как повестта поставя въпроса „кой е врагът"?', opts:['Врагът е ясен — противоположната армия','Повестта размива границата — истинският враг е войната като система, не конкретните хора','Всеки е враг на всеки','Врагът е случаен'], correct:1, explanation:'Станев размива картата на вражданата — конкретните хора (Иван, Елза) не са врагове. Врагът е системата на войната, която ги принуждава да бъдат такива. Хуманизмът победава национализма.' },

        { q:'Какво прави „Крадецът на праскови" актуален и за съвременния читател?', opts:['Историческите факти','Темата за любовта, хуманизма и безсмислието на войната е вечна и актуална — войните не са спрели','Само литературната стойност','Само за любителите на история'], correct:1, explanation:'Повестта е актуална, защото темата е вечна — войните не са спрели, разделени народи продължават да съществуват, а любовта и хуманизмът са постоянно застрашени от системи на омразата.' },
