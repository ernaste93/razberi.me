      quizNum:    3,
      questions: [
        { q:'Кое от изброените е нормален алкан (незаразклонен) с 5 въглеродни атома?', opts:['Изопентан','Неопентан','н-пентан (пентан)','Циклопентан'], correct:2, explanation:'н-пентан (CH₃CH₂CH₂CH₂CH₃) е нормален (незаразклонен) алкан с 5 въглеродни атома. Изопентан и неопентан са разклонени изомери. Циклопентан е цикличен въглеводород.' },
        { q:'Правилото на Марковников при хидрохалогениране на алкени гласи:', opts:['Халогенът се присъединява само към крайния въглерод','Водородът се присъединява към по-малко заместения въглероден атом от двойната връзка','И водородът, и халогенът се присъединяват произволно','Реакцията не протича при ненаситени въглеводороди'], correct:1, explanation:'Правилото на Марковников: при хидрохалогениране на несиметрични алкени водородът (H) се присъединява към по-малко заместения въглерод (носещ повече H), а халогенът – към по-заместения. Пример: CH₃–CH=CH₂ + HBr → CH₃–CHBr–CH₃ (не CH₃–CH₂–CH₂Br).' },
        { q:'Кой въглеводород изгаря с пуши (непълно горене) и дава чер сажди при горене на въздух?', opts:['Метан','Пропан','Ацетилен (C₂H₂) – висок % въглерод','Бутан'], correct:2, explanation:'Ацетиленът (C₂H₂) има висок масов дял на въглерода (92,3%). При горене на въздух наличният кислород не е достатъчен за пълно окисляване и се отделят сажди (C). Метанът (75% С) и другите алкани горят по-пълно.' },
        { q:'Полипропиленът е полимер, получен от:', opts:['Пропан','Пропен (пропилен, CH₂=CH–CH₃)','Пропин','Бензен'], correct:1, explanation:'Полипропиленът се получава при полимеризация на пропен: n(CH₂=CH–CH₃) → (–CH₂–CH(CH₃)–)ₙ. Широко използван термопласт за опаковки, тъкани, автомобилни части.' },
        { q:'При горене на алкани с кислород (пълно горене) се получават:', opts:['Само CO и H₂O','CO₂ и H₂O','CO и H₂','Само въглероден диоксид'], correct:1, explanation:'При пълно горене на алкани: CₙH₂ₙ₊₂ + O₂ → CO₂ + H₂O. Пример: CH₄ + 2O₂ → CO₂ + 2H₂O. При непълно горене (недостиг на O₂) се образуват CO и/или C (сажди).' },
        { q:'Какво е „октаново число" на бензина?', opts:['Плътността на бензина в g/ml','Мярка за устойчивостта на бензина спрямо детонация в двигателя – по-висока стойност = по-добро качество','Процентното съдържание на октан в бензина','Температурата на горене на бензина'], correct:1, explanation:'Октановото число (ON) измерва устойчивостта на бензина спрямо детонация (преждевременно запалване). Изооктан (2,2,4-триметилпентан) = ON 100, н-хептан = ON 0. Разклонените алкани имат по-добро ON от нормалните.' },
        { q:'Реакцията на хлориране на метан CH₄ + Cl₂ → CH₃Cl + HCl протича при:', opts:['Тъмнина и стайна температура','Облъчване с UV светлина или нагряване (свободнорадикален механизъм)','Присъствие на вода','Катализатор алуминиев хлорид'], correct:1, explanation:'Халогенирането на алкани протича по свободнорадикален механизъм, задействан от UV светлина или топлина. Светлината разкъсва Cl–Cl до два хлорни радикала (Cl•), стартирайки верижната реакция.' },
        { q:'Каква е молекулната формула на бензен?', opts:['C₆H₁₂','C₆H₁₄','C₆H₆','C₆H₁₀'], correct:2, explanation:'Бензенът е C₆H₆. По общата формула на алканите би трябвало да е C₆H₁₄, но ароматното кондензирано пръстенно устройство означава степен на ненаситеност 4 (три двойни + 1 пръстен). Формулата C₆H₆ = CₙH₂ₙ₋₆ (ароматен).' },
        { q:'Цис- и транс-изомерите са пример за:', opts:['Структурна изомерия','Пространствена изомерия (стереоизомерия)','Оптична изомерия','Верижна изомерия'], correct:1, explanation:'Цис-транс изомерията е вид геометрична стереоизомерия – молекулите имат еднаква свързаност (структурна формула), но различно пространствено наредение около двойната C=C връзка. При цис: едни и същи заместители са от същата страна на двойната връзка; при транс – от противоположните страни.' },
        { q:'Кой въглеводород е суровина за производство на стирен (и полистирен)?', opts:['Метан','Бензен','Етилбензен (дехидрогениран до стирен C₆H₅–CH=CH₂)','Ацетилен'], correct:2, explanation:'Стиренът (C₆H₅–CH=CH₂) се произвежда индустриално от етилбензен чрез дехидрогениране: C₆H₅–CH₂–CH₃ → C₆H₅–CH=CH₂ + H₂. При полимеризация на стирен се получава полистирен (PS).' },
      ]
