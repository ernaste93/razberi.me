          explanation: 'Растителните клетки имат три характерни структури, липсващи при животинските: клетъчна стена (от целулоза), хлоропласти и голяма централна вакуола. Гъбните клетки имат клетъчна стена (от хитин), но нямат хлоропласти.'

          q: 'Ако клетка е третирана с отрова, блокираща рибозомите, какво ще се наруши?',

          explanation: 'Автофагията е процес, при който лизозомите разграждат увредени или стари собствени клетъчни компоненти и органели. Хетерофагията е разграждане на погълнати чужди частици и бактерии (фагоцитоза).'

          q: 'Двата вида ендоплазмен ретикулум се различават по:',

          correct: 1,
          explanation: 'Грубият (гранулиран) ЕПР е покрит с рибозоми и синтезира белтъци за секреция или мембранно вграждане. Гладкият ЕПР няма рибозоми и е специализиран за синтез на липиди и детоксикация.'

        }
      ]
