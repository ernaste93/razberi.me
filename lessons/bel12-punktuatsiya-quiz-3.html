  <script>
    window.QUIZ_CONFIG = {
      lessonKey:  'bel12-punktuatsiya-q3',
      lessonUrl:  '/lessons/bel12-punktuatsiya.html',
      lessonName: 'Пунктуационна норма',
      eyebrow:    'БЕЛ · 12 КЛАС · ЕЗИК',
      title:      'Куиз — Пунктуационна норма — Тест 3',
      sub:        '10 въпроса · Избери верния отговор',
      passScore:  8,
      quizNum:    3,
      questions: [
        { q:'Намери изречението БЕЗ пунктуационна грешка.', opts:['"Слушайте ученици, внимателно."','"Слушайте, ученици, внимателно."','"Слушайте, ученици внимателно."','"Слушайте ученици внимателно."'], correct:1, explanation:'„Ученици" е обръщение и се отделя с запетаи от двете страни: „Слушайте, ученици, внимателно." Ако обръщението е в края: „Внимателно, ученици."' },
        { q:'Кой знак е подходящ в изречението „Беше умна красива и добра ___всичко, за което бих мечтал"?', opts:['Запетая','Тире','Двоеточие','Точка и запетая'], correct:1, explanation:'„Беше умна, красива и добра — всичко, за което бих мечтал." Тире пред обобщителната дума „всичко", която обобщава изброените качества. Изреждане → тире → обобщение.' },
        { q:'Кое изречение с определително подчинено е ВЯРНО пунктуирано?', opts:['"Момчето което виждаш е мой брат."','"Момчето, което виждаш е мой брат."','"Момчето, което виждаш, е мой брат."','"Момчето което, виждаш, е мой брат."'], correct:2, explanation:'Определителното подчинено изречение „което виждаш" се отделя с две запетаи — пред и след: „Момчето, което виждаш, е мой брат." Така се изолира вметнатата подчинена клауза.' },
        { q:'В кое изречение многоточието е употребено ПРАВИЛНО?', opts:['"Имам три желания: слава... пари... и здраве."','"Исках да кажа нещо важно, но думите не дойдоха..."','"Той имаше... три ябълки... в чантата."','"Учителят... дойде... в час."'], correct:1, explanation:'„Исках да кажа нещо важно, но думите не дойдоха..." — многоточието изразява незавършена мисъл, потисната емоция. В другите примери употребата е несистемна и не изразява реална пауза/незавършеност.' },
        { q:'При условно подчинено изречение в началото, запетаята се поставя:', opts:['Пред „ако"','След условното изречение, пред главното','Никъде — условните изречения нямат запетая','В средата на условното изречение'], correct:1, explanation:'„Ако вали, ще остана вкъщи." — запетаята е след условното изречение („ако вали"), пред главното. Когато главното е пред условното, запетая обикновено не се пише: „Ще остана вкъщи, ако вали." (тук има запетая, защото е подчинено след главното).' },
        { q:'Кое твърдение за точката и запетаята е ВЯРНО?', opts:['Използва се само в поезия','Маркира по-дълга пауза от запетаята, при разделяне на независими, но свързани части','Е равна по сила на точката','Използва се само при изброяване'], correct:1, explanation:'Точката и запетаята (;) е между запетая и точка по сила. Разделя независими изречения или групи при сложно изброяване: „Взех ябълки, круши и сливи; пъпеши, дини и грозде."' },
        { q:'Намери ГРЕШНО пунктуирано изречение.', opts:['"— Как си? — попита той.','„Той попита: „Как си?""','"Той попита: Как си?"','"— Добре, благодаря."'], correct:2, explanation:'„Той попита: Как си?" — при пряка реч думите задължително се поставят в кавички: „Той попита: „Как си?"" Без кавичките е неправилно.' },
        { q:'Кое изречение с вметнато пояснение е правилно пунктуирано?', opts:['"Той — макар и уморен — продължи пътя."','"Той, макар и уморен продължи пътя."','"Той макар и, уморен — продължи пътя."','"Той (макар и уморен, продължи пътя)."'], correct:0, explanation:'„Той — макар и уморен — продължи пътя." — вметнатото изречение „макар и уморен" се огражда с две тирета. Алтернативно може да се използват скоби: „Той (макар и уморен) продължи пътя."' },
        { q:'Пред кое съчинително подчинено изречение НЕ се поставя запетая?', opts:['"... а той не дойде."','"... но тя отказа."','"... и се прибра."','"... или те ще решат."'], correct:2, explanation:'Запетая не се поставя пред „и" когато то свързва две прости части (не две пълни изречения с подлог): „Той дойде и се прибра." При две пълни изречения: „Той дойде, и тя го посрещна."' },
        { q:'Кое описва ПРАВИЛНО употребата на двоеточие?', opts:['Само пред пряка реч','Пред пряка реч, пред изброяване след обобщаваща дума и пред обяснение','Само при изброяване','Между подлог и сказуемо'], correct:1, explanation:'Двоеточието има три основни функции: (1) пред пряка реч — „Той каза:...", (2) пред изброяване след обобщение — „Взех всичко:...", (3) пред обяснение — „Имаше едно препятствие: липсата на пари."' },
      ]
    };
