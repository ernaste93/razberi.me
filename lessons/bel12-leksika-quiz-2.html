      questions: [
        { q:'Кои думи са пароними?', opts:['студен / горещ (антоними)','адресат / адресант (пароними)','куче / пес (синоними)','сол / захар (думи без връзка)'], correct:1, explanation:'Паронимите са думи с близко звучене, но различно значение. „Адресат" (получателят) и „адресант" (изпращачът) са класически пароними — лесни за смесване.' },
        { q:'Каква е стилистичната разлика между „лице" и „физиономия"?', opts:['Нямат разлика','„Лице" е неутрално, „физиономия" е разговорна/ироничнна','„Физиономия" е по-учтиво','„Лице" е диалектно'], correct:1, explanation:'„Лице" е неутрална книжовна дума. „Физиономия" носи разговорен и леко ироничен оттенък — употребата й в официален стил е стилистична грешка.' },
        { q:'Кое е значението на архаизма „чело"?', opts:['Плочка','Чело — вродена прическа','Чело — глава/чело, стара дума за „чело" на лицето (уточнение: в старобългарски — „глава/начело")','Военно звание'], correct:2, explanation:'„Чело" в архаичен смисъл е свързано с „глава", „начело" — „начело на войската" (пред всички). В съвременния език „чело" е само частта на лицето над веждите.' },
        { q:'Кое изречение съдържа смесване на пароними?', opts:['Изпратих писмото до адресата.','Изпратих писмото до адресанта.','Той е адресатът на пакета.','Адресатът получи посилката.'], correct:1, explanation:'„Адресантът" е изпращачът, не получателят. В контекста „изпратих до" — трябва да е „адресата" (получателя). Употребата на „адресанта" е смесване на пароними.' },
        { q:'Какво е „плеоназъм"?', opts:['Фигура на мълчание','Излишно повторение на едно и също значение с различни думи','Намаляване на думите','Хиперболизиране'], correct:1, explanation:'Плеоназъмът е излишно повторение: „синя перваника" (перваника е синя по дефиниция), „мъртъв труп" (трупът е мъртъв по дефиниция). Грешка при употреба на думи с припокриващо се значение.' },
        { q:'Кой е синоним на „смел"?', opts:['страхлив','плах','безстрашен','предпазлив'], correct:2, explanation:'„Безстрашен" е синоним на „смел" — двете думи имат близко значение. „Страхлив" и „плах" са антоними, „предпазлив" е думи от друга семантична сфера.' },
        { q:'Кое е правилното значение на „буквален"?', opts:['Свързан с букви','Дословен, точно така, без преносно значение','Преносен','Метафоричен'], correct:1, explanation:'„Буквален" означава дословен, без преносно значение — „буквалния смисъл на думата". Антонимът е „преносен/метафоричен". Употребата на „буквален" за „много/силно" е неправилна.' },
        { q:'В кое изречение има тавтология?', opts:['Той написа книга.','Той написа написана книга.','Той написа нова книга.','Книгата е нова.'], correct:1, explanation:'„Написа написана книга" е тавтология — повтаряне на корена на думата в различна форма. Тавтологията е вид плеоназъм и е стилистична грешка.' },
        { q:'Кое от следните е чуждица с дублет в български?', opts:['компютър (без дублет)','лифт / асансьор','маса (без дублет)','столица (без дублет)'], correct:1, explanation:'„Лифт" (от английски) и „асансьор" (от френски) са чуждици с общ смисъл. „Асансьор" е по-утвърден в книжовния Bulgarian, „лифт" е разговорен вариант.' },
