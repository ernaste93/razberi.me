      questions: [
        { q:'Кой полизахарид изпълнява резервна функция при животните?', opts:['Целулоза','Нишесте','Гликоген','Хитин'], correct:2, explanation:'Гликогенът е резервен полизахарид при животните — аналог на нишестето при растенията. Съхранява се предимно в черния дроб и мускулите и се разгражда до глюкоза при нужда от енергия.' },
        { q:'Комплементарните азотни бази в ДНК са:', opts:['A-G и T-C','A-T и G-C','A-U и G-C','A-C и G-T'], correct:1, explanation:'В ДНК комплементарните двойки са: Аденин (A) с Тимин (T) — свързани с 2 водородни връзки, и Гуанин (G) с Цитозин (C) — свързани с 3 водородни връзки. Това е основата на двойната спирала на Уотсън и Крик.' },
        { q:'Фотосинтезата е процес, при който растенията:', opts:['Разграждат глюкоза до СО₂ и вода с отделяне на енергия','Синтезират глюкоза от СО₂ и вода с използване на светлинна енергия','Синтезират белтъци от аминокиселини','Разграждат мазнини до глицерол и мастни киселини'], correct:1, explanation:'Фотосинтеза: 6CO₂ + 6H₂O + светлинна енергия → C₆H₁₂O₆ + 6O₂. Хлорофилът поглъща светлинна енергия, която се използва за синтеза на глюкоза от CO₂ и вода.' },
        { q:'Кое от изброените е пример за липид, различен от триглицерид?', opts:['Глюкоза','Холестерол','Аланин','Целулоза'], correct:1, explanation:'Холестеролът е стероид — вид липид с различна структура от триглицеридите. Той е важна съставка на клетъчните мембрани и прекурсор на стероидни хормони, жлъчни киселини и витамин D.' },
        { q:'Каква е функцията на хемоглобина?', opts:['Катализира разграждане на захари','Пренася кислород в кръвта','Съхранява генетична информация','Разгражда мазнините в червата'], correct:1, explanation:'Хемоглобинът е железосъдържащ белтък в червените кръвни клетки. Желязото в хема се свързва обратимо с O₂ в белите дробове и го освобождава в тъканите. Всяка молекула хемоглобин носи 4 молекули O₂.' },
        { q:'Каква е ролята на тРНК при транслацията?', opts:['Копира ДНК','Синтезира рибозоми','Доставя аминокиселини до рибозомата и ги свързва с кодоните на иРНК','Разгражда стари белтъци'], correct:2, explanation:'тРНК (транспортна РНК) е адаптерна молекула: свързва специфична аминокиселина на 3\'-края си и чрез антикодона разпознава съответния кодон на иРНК. Осигурява точното подреждане на аминокиселините при синтеза на белтъка.' },
        { q:'Кое е основното място за синтез на белтъци в клетката?', opts:['Ядро','Митохондрия','Рибозома','Клетъчна мембрана'], correct:2, explanation:'Рибозомите са органелите, на които се извършва транслацията — синтезът на белтъци. Те се намират в цитоплазмата (свободни рибозоми) или свързани с ендоплазмения ретикулум (гранулиран ЕР).' },
        { q:'Кое твърдение за ензимите е ВЯРНО?', opts:['Ензимите се изразходват в реакцията','Ензимите само забавят реакциите','Ензимите са специфични — действат на определен субстрат','Всички ензими изискват метален йон'], correct:2, explanation:'Ензимите са специфични: всеки ензим действа само на определен субстрат или тип реакция. Тази специфичност се дължи на активния център — трето измерна структура, която е комплементарна на субстрата (модел „ключ-ключалка" или „индуцирано прилягане").' },
        { q:'При осапунване на мазнина с NaOH се получава:', opts:['Глицерол + мастни киселини','Глицерол + натриеви соли на мастни киселини (сапун)','Глицерол + естери','Само CO₂ и H₂O'], correct:1, explanation:'Осапунването е алкална хидролиза на мазнини: триглицерид + 3 NaOH → глицерол + 3 натриеви соли на мастни киселини. Натриевите соли са твърди сапуни; калиевите соли — течни сапуни.' },
