          explanation: 'Сборът на трите вътрешни ъгъла в триъгълник е винаги 180°. Това е основна теорема в геометрията. ∠A + ∠B + ∠C = 180°.'

          correct: 2,
          explanation: 'Проверяваме 2, 3, 5: 2 + 3 = 5, но по неравенството трябва 2 + 3 > 5 (строго неравенство). 5 не е > 5. Следователно 2, 3, 5 НЕ образуват триъгълник.'
