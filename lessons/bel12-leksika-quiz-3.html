        { q:'Кое от следните е стилистична грешка в официален текст?', opts:['Моля да се вземат необходимите мерки.','Ще трябва да се поправи работата.','Яко трябва да поправим нещата.','Следва да се предприемат мерки.'], correct:2, explanation:'„Яко трябва да поправим нещата" е разговорен (неофициален) стил — „яко" е жаргон, „да поправим нещата" е размито. В официален текст се изисква точен, неутрален стил.' },
        { q:'Коя двойка думи са контекстуални антоними (стават антоними само в конкретен текст)?', opts:['бял / черен','живот / смърт','светлина / тъмнина','„бебе" и „старец" в „Децата са бъдещето, старците са миналото"'], correct:3, explanation:'Контекстуалните антоними са противопоставени само в конкретен контекст. „Бебе" и „старец" нямат общ антонимен корен, но в конкретното изречение са противопоставени по смисъл.' },
        { q:'Каква е разликата между „ефективен" и „ефикасен"?', opts:['Нямат разлика','„Ефективен" означава „постигащ резултат", „ефикасен" е „бърз и точен в постигането му" — нюанс в степента','„Ефикасен" е по-общата дума','„Ефективен" е разговорна дума'], correct:1, explanation:'Паронимите „ефективен" и „ефикасен" са близки, но с нюанс: „ефективен" (постигащ желания резултат), „ефикасен" (действащ бързо и точно). В строгия стил разграничаването е важно.' },
        { q:'Кое изречение е с правилна употреба на „буквално"?', opts:['Буквално ми е мъчно.','Той буквално изяде цялата торта.','Буквално умирам от смях.','Буквално не мога да понасям шума.'], correct:1, explanation:'„Той буквално изяде цялата торта" означава в точния смисъл — изял е цялата. Употребите „буквално умирам", „буквално ми е мъчно" са хиперболни и неточни — „буквално" стои вместо „много".' },
        { q:'Какво е „евфемизъм"?', opts:['Директна обида','Смекчена, по-учтива дума вместо груба или неприятна дума','Преувеличение','Ирония'], correct:1, explanation:'Евфемизмът заменя грубата или неприятна дума с по-мека: „почина" вместо „умря", „посети тоалетната" вместо директното обозначение. Използва се в официален и учтив стил.' },
        { q:'Кое е правилното значение на „апология"?', opts:['Извинение','Защита, оправдание на нечии идеи или действия','Критика','Биография'], correct:1, explanation:'„Апология" е защита и оправдание на нечии идеи, действия или личност. Сходно звучи с „апологет" (защитник). Не трябва да се бърка с „апологетика" (богословска дисциплина).' },
        { q:'Каква е разликата между „гарантирам" и „осигурявам"?', opts:['Нямат разлика','„Гарантирам" = поемам отговорност за резултата; „осигурявам" = правя условия за нещо','„Осигурявам" е по-силно','„Гарантирам" е разговорно'], correct:1, explanation:'Нюансът е важен: „гарантирам успех" = поемам лична отговорност за успеха. „Осигурявам условия за успех" = правя предпоставки, но не поемам гаранция за резултата.' },
        { q:'Кое е правилното изречение от лексикална гледна точка?', opts:['Той направи добро впечатление.','Той направи отлична услуга.','Той направи добра услуга.','Той направи отлично впечатление.'], correct:3, explanation:'„Направи отлично впечатление" е правилно — „впечатление" се „прави". „Услуга" се „оказва" или „прави", но „направи добра услуга" е правилно. Проблемът е в „отлична услуга" + направи. Всъщност и двете последни са приемливи; изречение 1 е основно правилно.' },
