      passScore: 7,
      questions: [
        {
          q: 'Коя от следните думи е собствено съществително?',
          opts: ['маса', 'дърво', 'Дунав', 'учител'],
          correct: 2,
          explanation: '„Дунав" е собствено съществително — то е конкретно географско название (река). Собствените съществителни се пишат с главна буква и назовават конкретен предмет, лице или място. Масата, дървото и учителят са нарицателни.'
        },
        {
          q: 'Какъв е родът на съществителното „маса"?',
          opts: ['Мъжки', 'Женски', 'Среден', 'Няма род'],
          correct: 1,
          explanation: '„Маса" е от женски род — членува се с –та (масата). Мъжки род: стол (столът/стола). Среден род: дете (детето). Родът на съществителните в Bulgarian може да се определи по члена.'
        },
        {
          q: 'Кога се използва ПЪЛНИЯТ член (-ът/-ят) при мъжки род?',
          opts: ['Винаги', 'Само когато думата е подлог в изречението', 'Само при глаголи', 'При всички части на изречението'],
          correct: 1,
          explanation: 'Пълният член (-ът/-ят) се използва само когато съществителното от мъжки род е подлог (субект) в изречението. Пример: „Столът е дървен." Когато не е подлог, се използва кратък член (-а/-я): „Виждам стола."'
        },
        {
          q: 'Кое прилагателно е качествено?',
          opts: ['дървен', 'морски', 'бащин', 'висок'],
          correct: 3,
          explanation: '„Висок" е качествено прилагателно — означава вътрешно или външно качество и може да има степени (висок, по-висок, най-висок). „Дървен" е относително (от дърво), „морски" е относително (от море), „бащин" е притежателно.'
        },
        {
          q: 'Коя е превъзходната степен на прилагателното „добър"?',
          opts: ['по-добър', 'много добър', 'най-добър', 'добре'],
          correct: 2,
          explanation: 'Превъзходната степен на „добър" е „най-добър". Трите степени: положителна (добър), сравнителна (по-добър), превъзходна (най-добър). Степените на прилагателните са характерни само за качествените прилагателни.'
        },
        {
          q: 'Какъв вид числително е думата „трима"?',
          opts: ['Бройно', 'Редно', 'Събирателно', 'Дробно'],
          correct: 2,
          explanation: '„Трима" е събирателно числително — те се използват за означаване на група лица (предимно мъже или смесена група): двама, трима, четирима. Бройно е „три", редно — „трети", дробно — „три четвърти".'
        },
        {
          q: 'Кое числително е редно?',
          opts: ['пет', 'петима', 'пети', 'пет шести'],
          correct: 2,
          explanation: '„Пети" е редно числително — означава пореден номер и отговаря на въпроса „Кой по ред?". „Пет" е бройно (Колко?), „петима" е събирателно, „пет шести" е дробно.'
        },
        {
          q: 'Какъв вид е прилагателното „детски"?',
          opts: ['Качествено', 'Относително', 'Притежателно', 'Степенувано'],
          correct: 1,
          explanation: '„Детски" е относително прилагателно — изразява отношение (свързано с деца) и НЕ може да се степенува. Не можем да кажем „по-детски" или „най-детски". Относителните прилагателни изразяват материал, произход, отношение.'
        },
        {
          q: 'Как се членува съществителното „учител" когато е подлог?',
          opts: ['учителя', 'учителят', 'учителя', 'учители'],
          correct: 1,
          explanation: '„Учителят" — с пълен член (-ят) се членува, когато е подлог. Пример: „Учителят обяснява урока." Когато не е подлог: „Виждам учителя" (кратък член -я). Тази разлика е важна за НВО!'
        },
        {
          q: 'Кое от следните е дробно числително?',
          opts: ['двама', 'двойно', 'две трети', 'втори'],
          correct: 2,
          explanation: '„Две трети" е дробно числително — означава дробна (частична) величина. Дробните числителни изразяват части: половин, четвърт, три четвърти, две трети. „Двама" е събирателно, „двойно" не е числително, „втори" е редно.'
        }
      ]
