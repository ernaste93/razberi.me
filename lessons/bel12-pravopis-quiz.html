      questions: [
        { q:'Кое изречение съдържа ПРАВИЛНО използван пълен член?', opts:['"Видях ученикът на улицата."','"Ученикът влезе в класната стая."','"Дадох книгата на ученикът."','"Помогнах на ученикът."'], correct:1, explanation:'Пълният член (-ът/-ят) се пише само когато думата е подлог в изречението. „Ученикът влезе" – ученик е подлог → пълен член. В другите изречения думата е допълнение → трябва „ученика".' },
        { q:'Как се пише правилно: „не работи" или „неработи"?', opts:['"неработи" – слято','„не работи" – разделно','И двете са правилни','Зависи от контекста'], correct:1, explanation:'Частицата „не" с глаголи винаги се пише разделно: „не работи", „не идва", „не можа". Слято се пише само с прилагателни и наречия: „невъзможен", „нередовно".' },
        { q:'Как се пише правилно: „по добър" или „по-добър"?', opts:['„по добър" – разделно','„по-добър" – с тире','„подобър" – слято','„по_добър" – с долна черта'], correct:1, explanation:'Степените за сравнение с „по-" и „най-" винаги се пишат с тире: „по-добър", „по-бързо", „най-красив", „най-много".' },
        { q:'Кой правопис е ВЕРЕН?', opts:['„ексамен"','„екзамен"','„ексзамен"','„eкзамeн" с й'], correct:1, explanation:'Правилото е: пред гласна → „кз" (екзамен, екзотичен, екзекуция); пред съгласна → „кс" (текст, екстра, екстравагантен). В „екзамен" следва гласна „а" → „кз".' },
        { q:'Кое е правилното изписване?', opts:['„Черноморски бряг"','„Черно-морски бряг"','„черноморски бряг"','„Черноморски Бряг"'], correct:2, explanation:'„Черноморски" е прилагателно от собствено географско название – пише се с малка буква: „черноморски бряг". С главна само ако е официално собствено наименование на конкретно място.' },
        { q:'В изречението „Виждам коня в полето" какъв член носи „кон"?', opts:['Пълен член (-ят)','Кратък член (-я)','Без член','Множествено число'], correct:1, explanation:'„Коня" е с кратък член (-я), защото думата е допълнение (не подлог). Ако кон бе подлог: „Конят тичаше" – пълен член (-ят).' },
        { q:'Как се пише „българо-руски речник"?', opts:['„българо-руски" – с тире','„българоруски" – слято','„българо руски" – разделно','„Българо-Руски" – с главни'], correct:0, explanation:'При координативни сложни думи (двата компонента са равнопоставени, без субординация) се пише полуслято (с тире): „българо-руски", „физико-математически", „историко-географски".' },
        { q:'Кой правопис е ГРЕШЕН?', opts:['"Министерство на образованието"','"Народна библиотека"','"Европейски Съюз"','"Пловдивски университет"'], correct:2, explanation:'„Европейски съюз" – „съюз" е нарицателно и се пише с малка буква. Официалното наименование е „Европейски съюз" – само „Европейски" с главна (като начало на собствено наименование).' },
        { q:'Кое изречение НЕ съдържа правописна грешка?', opts:['"Учителят обясни урокът."','"Учителят обясни урока."','"Учителя обясни урокът."','"Учителя обясни урока."'], correct:1, explanation:'„Учителят" е подлог → пълен член (-ят). „Урока" е допълнение → кратък член (-а). Правилното изречение е „Учителят обясни урока."' },
