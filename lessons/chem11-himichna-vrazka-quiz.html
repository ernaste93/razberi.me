      passScore:   8,
      questions: [
        {
          q: 'Кой вид химична връзка се образува при споделяне на електронна двойка между два атома?',
          options: ['Йонна', 'Ковалентна', 'Метална', 'Водородна'],
          correct: 1,
          explanation: 'Ковалентната връзка се образува при споделяне на една или повече двойки електрони между два атома. Характерна е за неметалите. Йонната включва прехвърляне, а не споделяне на електрони.'
        },
        {
          q: 'Каква е химичната връзка в молекулата Cl₂?',
          options: ['Полярна ковалентна', 'Йонна', 'Неполярна ковалентна', 'Метална'],
          correct: 2,
          explanation: 'В Cl₂ двата хлорни атома имат еднаква електроотрицателност, затова електронната двойка се споделя равномерно. Връзката е неполярна ковалентна. При различни атоми с различна ЕО се получава полярна ковалентна.'
        },
        {
          q: 'Между кои атоми се образува йонна връзка?',
          options: ['C и H', 'Na и Cl', 'O и O', 'N и H'],
          correct: 1,
          explanation: 'Йонната връзка се образува между Na (метал, ниска ЕО, отдава e⁻) и Cl (неметал, висока ЕО, приема e⁻). Разликата в ЕО е голяма (>1,7), което води до пълно прехвърляне на електрон.'
        },
        {
          q: 'Каква геометрия има молекулата H₂O?',
          options: ['Линейна', 'Тетраедрична', 'Ъглова', 'Тригонална планарна'],
          correct: 2,
          explanation: 'Водата има 2 свързващи двойки (О–Н) и 2 несвързващи двойки. По теорията VSEPR, несвързващите двойки отблъскват свързващите, придавайки на молекулата ъглова форма с ъгъл ≈104,5°.'
        },
        {
          q: 'Коя от следните молекули образува водородни връзки?',
          options: ['CH₄', 'CCl₄', 'NH₃', 'CO₂'],
          correct: 2,
          explanation: 'NH₃ образува водородни връзки, защото азотът е силно електроотрицателен (N–H···N). CH₄ и CCl₄ нямат О, N или F директно свързани с H. CO₂ е неполярна молекула без О–H връзки.'
        },
        {
          q: 'Каква е връзката в N₂ (молекулярен азот)?',
          options: ['Единична ковалентна', 'Двойна ковалентна', 'Тройна ковалентна', 'Йонна'],
          correct: 2,
          explanation: 'Азотът има 5 валентни електрона. За да достигне октет, всеки N трябва да сподели 3 двойки с другия N. Тройната връзка N≡N е много здрава (946 kJ/mol), което прави N₂ химически инертен при стайна температура.'
        },
        {
          q: 'Какво е „електронното море" при металната връзка?',
          options: ['Наредените метални йони в решетката', 'Делокализираните свободни електрони', 'Свързващите електронни двойки', 'Несвързващите електронни двойки'],
          correct: 1,
          explanation: 'При металната връзка валентните електрони се „освобождават" от атомите и се движат свободно из цялата метална решетка. Тези делокализирани електрони образуват „електронното море", което свързва металните катиони.'
        },
        {
          q: 'Кое свойство на металите се обяснява с металната връзка?',
          options: ['Разтворимост във вода', 'Електрическа проводимост', 'Реакция с киселини', 'Цвят на пламъка'],
          correct: 1,
          explanation: 'Свободните (делокализирани) електрони в металите се движат насочено под действие на електрическо напрежение, осигурявайки електрическа проводимост. Това е пряк резултат от металната връзка и „електронното море".'
        },
        {
          q: 'Кое от следните е пример за донорно-акцепторна (координатна) ковалентна връзка?',
          options: ['H–H', 'Na–Cl', 'NH₄⁺', 'O=O'],

        },
        {
          q: 'При каква разлика в електроотрицателности се образува йонна връзка?',
          options: ['ΔEN < 0,4', 'ΔEN = 0,4–1,7', 'ΔEN > 1,7', 'ΔEN = 0'],
          correct: 2,
          explanation: 'При ΔEN > 1,7 разликата в електроотрицателности е толкова голяма, че по-силният атом „отнема" практически напълно електрона от другия — образува се йонна връзка. При по-малки разлики се образуват полярна или неполярна ковалентна връзка.'
        }
      ]
