      questions: [
        { q:'В клас от 20 момчета и 10 момичета се избира един ученик на лотария. Каква е P(момиче)?', opts:['1/2','1/3','2/3','10/20'], correct:1, explanation:'Всичко ученици: 20 + 10 = 30. Благоприятни (момичета): 10. P(момиче) = 10/30 = 1/3 ≈ 0,333 ≈ 33,3%.' },
        { q:'Ако P(A) = 0,4 и P(B) = 0,5 и A и B са независими, намери P(A и B).', opts:['0,9','0,2','0,1','0,45'], correct:1, explanation:'За независими събития: P(A ∩ B) = P(A) × P(B) = 0,4 × 0,5 = 0,2.' },
        { q:'Каква е вероятността при хвърляне на зар да се падне число по-голямо от 4?', opts:['1/6','1/3','1/2','2/3'], correct:1, explanation:'Числата по-големи от 4 при зар: 5 и 6 — два изхода. P(>4) = 2/6 = 1/3 ≈ 0,333.' },
        { q:'Формулата за условна вероятност P(A|B) е:', opts:['P(A) + P(B)','P(A ∩ B) / P(B)','P(A) × P(B)','P(A) - P(B)'], correct:1, explanation:'Условната вероятност P(A|B) — вероятността за A при условие, че B е настъпило: P(A|B) = P(A ∩ B) / P(B), при P(B) ≠ 0.' },
        { q:'Модата на данните 3, 5, 5, 7, 9, 5, 2 е:', opts:['3','7','5','9'], correct:2, explanation:'Модата е стойността, която се среща най-много пъти. „5" се среща 3 пъти (на позиции 2, 3, 6) — повече от всяка друга. Мода = 5.' },
        { q:'При хвърляне на монета 3 пъти, каква е вероятността да се паднат точно 3 пъти „ос"?', opts:['1/2','1/4','1/8','3/8'], correct:2, explanation:'Вероятността за всяко хвърляне е 1/2. За независими събития: P(ос, ос, ос) = (1/2)³ = 1/8.' },
        { q:'Каква е вероятността при хвърляне на зар да се падне или 2, или 3?', opts:['1/6','1/3','1/2','2/3'], correct:1, explanation:'„2" и „3" са взаимно изключващи се: P(2 или 3) = P(2) + P(3) = 1/6 + 1/6 = 2/6 = 1/3. Теорема за сумата за несъвместими събития.' },

        { q:'Относителната честота на дадено събитие се изчислява като:', opts:['Брой изпитания × P(A)','Брой благоприятни изходи / общ брой изпитания','Общ брой изпитания / благоприятни','1 / P(A)'], correct:1, explanation:'Относителната честота (fn) е емпирична мярка: fn = m/n, където m е броят на изпитанията, при които е настъпило A, а n е общият брой изпитания. При голямо n: fn ≈ P(A) — закон за големите числа.' },
