        { q:'Какво е октановото число на бензина?', opts:['Съдържанието на октан в %','Мярка за устойчивост срещу детонация при горене','Точката на кипене на горивото','Количеството CO₂ при горене'], correct:1, explanation:'Октановото число показва устойчивостта на горивото срещу самовъзпламеняване (детонация) в двигателя. По-висок октан — по-малка детонация. Определя се чрез сравнение с изооктан (ОЧ = 100).' },

        { q:'Какъв е механизмът на действие на болкоуспокояващите (аналгетиците)?', opts:['Убиват бактериите, причиняващи болката','Потискат предаването на болкови сигнали в нервната система','Разширяват кръвоносните съдове','Намаляват температурата на тялото само'], correct:1, explanation:'Аналгетиците (парацетамол, ибупрофен) потискат синтеза на простагландини — вещества, участващи в предаването на болков сигнал и възпалителния отговор. Опиоидните аналгетици действат директно върху ЦНС.' },
