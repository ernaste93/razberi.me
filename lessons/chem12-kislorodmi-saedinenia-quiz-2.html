        { q:'При окисляване на първичен алкохол се получава:', opts:['Кетон','Алдехид (при леко окисление) или карбоксилна киселина (при силно)','Естер','Алкен'], correct:1, explanation:'При леко окисление на първичен алкохол (R–CH₂OH) се получава алдехид (R–CHO); при по-силно окисление – карбоксилна киселина (R–COOH). При окисление на вторичен алкохол (R–CHOH–R\') се получава кетон.' },

        { q:'Формалдехидът (метанал) HCHO се използва за:', opts:['Гориво за автомобили','Дезинфекция (формалин) и производство на пластмаси','Хранителна добавка','Лекарствено средство'], correct:1, explanation:'Формалдехидът (40%-ен воден разтвор = формалин) се използва за консервиране на биологични препарати и дезинфекция. Освен това е суровина за производство на фенолформалдехидни смоли (пластмаси, лепила).' },

        { q:'Какъв тип реакция е дехидратацията на алкохол?', opts:['Присъединяване','Заместване','Елиминиране (отнемане на вода с образуване на алкен)','Окисляване'], correct:2, explanation:'При нагряване на алкохол с конц. H₂SO₄ при висока температура протича елиминиране: от молекулата се отнемат H₂O, а се образува алкен. Пример: C₂H₅OH → CH₂=CH₂ + H₂O (при ~180°C).' },
        { q:'Оцетноетиловият естер (етилацетат) CH₃COOC₂H₅ се получава от:', opts:['Метанол + оцетна киселина','Етанол + оцетна киселина','Пропанол + мравчена киселина','Глицерол + три молекули оцетна киселина'], correct:1, explanation:'Етилацетат = естерификация на етанол (C₂H₅OH) с оцетна киселина (CH₃COOH): CH₃COOH + C₂H₅OH → CH₃COOC₂H₅ + H₂O. Той е широко използван разтворител с характерна плодова миризма.' },
        { q:'Маслената киселина (бутанова киселина C₃H₇COOH) е известна с:', opts:['Приятна цветна миризма','Характерна остра неприятна миризма на развалено масло','Отсъствие на мирис','Миризма на горски плодове'], correct:1, explanation:'Маслената (бутанова) киселина е карбоксилна киселина с 4 въглеродни атома. Тя е с характерна неприятна миризма – тя се образува при разваляне на масло и мазнини чрез хидролиза и окисляване.' },
