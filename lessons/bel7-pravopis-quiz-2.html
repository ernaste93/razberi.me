          correct: 1,
          explanation: '„Наистина" се пише СЛЯТО — то е наречие (отговаря на въпроса „как?/наистина ли е така?"). Когато можеш да поставиш определение между двете части (на истинска истина), значи е разделно, но „наистина" е станало единна дума.'

          opts: ['на дясно', 'надясно', 'на-дясно', 'надесно'],
          correct: 1,
          explanation: '„Надясно" се пише СЛЯТО — наречие за посока/място. Подобно: „наляво", „нагоре", „надолу", „навън", „навътре" — всички се пишат слято.'
        },
        {
          q: 'Думата „засега" се пише:',
          opts: ['за сега', 'засега', 'за-сега', 'зесега'],

          q: 'Коя от думите се пише РАЗДЕЛНО?',

          explanation: '„На ред" (в значение „в определен ред/последователно") може да се пише разделно, когато „ред" е самостоятелно съществително с предлог. Контекстът определя: „Трябва да влезете на ред." Наречието „наред" (= добре, правилно) е слято.'
        },
        {
          q: 'Кога се пише ГЛАВНА БУКВА?',
          opts: ['При всички прилагателни', 'При собствени имена на хора, градове, реки', 'При всички съществителни', 'Само в началото на абзац'],

          explanation: '„Той" — с главна буква, защото е в началото на изречението. „Варна" — с главна буква, защото е собствено име на град. „Лято" и „миналото" се пишат с малка буква — те са нарицателни думи.'
        },
        {
          q: 'Думата „изведнъж" се пише:',

          explanation: '„Изведнъж" се пише СЛЯТО — наречие за начин, означава „внезапно", „неочаквано". Подобно: „изведнага". Винаги слято.'

        }
      ]
