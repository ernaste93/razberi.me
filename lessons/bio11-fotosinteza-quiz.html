          correct: 1,

        },
        {
          q: 'Кое е обобщеното уравнение на фотосинтезата?',
          options: ['C₆H₁₂O₆ + 6O₂ → 6CO₂ + 6H₂O + енергия', '6CO₂ + 6H₂O + светлина → C₆H₁₂O₆ + 6O₂', '6O₂ + светлина → 6CO₂ + 6H₂O', 'C₆H₁₂O₆ → 2C₃H₄O₃ + 2АТФ'],
          correct: 1,
          explanation: 'Обобщеното уравнение на фотосинтезата е: 6CO₂ + 6H₂O + светлинна енергия → C₆H₁₂O₆ + 6O₂. Въглеродният диоксид и водата се превръщат в глюкоза и кислород с помощта на светлинна енергия.'
        },
        {
          q: 'Кой е основният фотосинтетичен пигмент?',
          options: ['Каротин', 'Ксантофил', 'Хлорофил а', 'Хлорофил б'],
          correct: 2,
          explanation: 'Хлорофил а е основният пигмент на фотосинтезата. Той поглъща предимно червена (~680 нм) и синьо-виолетова светлина и е единственият пигмент, способен директно да задейства фотохимичните реакции в реакционния център.'
        },
        {
          q: 'Къде протича светлинната фаза на фотосинтезата?',
          options: ['В стромата на хлоропласта', 'В тилакоидните мембрани', 'В матрикса на митохондрията', 'В ендоплазмения ретикулум'],
          correct: 1,
          explanation: 'Светлинната фаза протича в тилакоидните мембрани на хлоропласта, където са наредени молекулите на хлорофила, фотосистемите и белтъчните комплекси на електронно-транспортната верига.'

        {

          options: ['CO₂', 'Глюкоза', 'O₂', 'АТФ'],
          correct: 2,
          explanation: 'Кислородът (O₂) се отделя като страничен продукт на фотолизата на водата в светлинната фаза: 2H₂O → 4H⁺ + 4e⁻ + O₂. Практически целият атмосферен кислород е биогенен – резултат от фотосинтезата.'

          q: 'Каква е ролята на ензима РуБиСКО в Калвиновия цикъл?',
          options: ['Синтез на АТФ', 'Фиксация на CO₂ към RuBP', 'Разграждане на глюкоза', 'Фотолиза на вода'],
          correct: 1,
          explanation: 'РуБиСКО (рибулозо-1,5-бисфосфат карбоксилаза/оксигеназа) е ензимът, фиксиращ CO₂ като го прикрепя към петвъглеродния акцептор RuBP. Той е най-разпространеният ензим на Земята и е ключова стъпка в тъмнинната фаза.'
        },
        {
          q: 'Какво се произвежда в светлинната фаза и се използва в тъмнинната?',
          options: ['CO₂ и H₂O', 'АТФ и НАДФH', 'Глюкоза и O₂', 'G3P и RuBP'],

          explanation: 'В светлинната фаза се синтезират АТФ (чрез фотофосфорилиране) и НАДФH (чрез редукция на НАДФ⁺). Тези две молекули се използват в тъмнинната фаза (Калвинов цикъл) за фиксиране на CO₂ и синтез на глюкоза.'
        },
        {
          q: 'Какви светлинни вълни поглъща НАЙ-ДОБРЕ хлорофилът?',

          explanation: 'Хлорофилът поглъща предимно червена (~660–700 нм) и синьо-виолетова (~430–450 нм) светлина. Зелената светлина се отразява, поради което листата ни изглеждат зелени. Оттук идва и зеленият цвят на растенията.'

          q: 'Какви са стековете от тилакоиди в хлоропласта?',
          options: ['Строми', 'Грани', 'Кристи', 'Ламели'],

          explanation: 'Тилакоидите са наредени в стекове, наречени грани (ед.ч. гран). В тилакоидните мембрани са наредени хлорофилните молекули и фотосистемите. Стромата е течната матрица около граните, където протича Калвиновият цикъл.'
        },
        {
          q: 'Коя от следните НЕ е лимитиращ фактор за фотосинтезата?',
          options: ['Концентрацията на CO₂', 'Интензитетът на светлината', 'Концентрацията на O₂ в клетката', 'Температурата'],

          explanation: 'Концентрацията на O₂ в клетката не е лимитиращ фактор за фотосинтезата – O₂ е страничен продукт. Лимитиращи фактори са: интензитет на светлината, концентрация на CO₂ (субстрат за Калвиновия цикъл) и температура (ензимна активност).'
        }
      ]
