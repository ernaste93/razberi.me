    { q: 'Какво се случва в светлинната фаза?', a: 'В тилакоидите: хлорофилът поглъща светлина → фотолиза на вода (O₂ ↑) → електронен транспорт → синтез на АТФ и НАДФН.' },
    { q: 'Какво се случва в тъмната фаза?', a: 'В стромата: АТФ и НАДФН от светлинната фаза се използват за фиксиране на CO₂ чрез цикъла на Калвин → синтез на глюкоза (G3P).' },
    { q: 'Какви са лимитиращите фактори на фотосинтезата?', a: 'Интензивност на светлината, концентрация на CO₂ и температура. При увеличаване на всеки фактор скоростта нараства, докато друг стане лимитиращ.' },
    { q: 'Какъв е кислородът — реагент или продукт? Откъде идва?', a: 'Продукт — страничен от фотолизата на вода в светлинната фаза. Не идва от CO₂.' },
    { q: 'Сравнете фотосинтезата и клетъчното дишане.', a: 'Фотосинтеза: CO₂ + H₂O → глюкоза + O₂ (в хлоропласт, изисква светлина). Дишане: глюкоза + O₂ → CO₂ + H₂O + АТФ (в митохондрия, без светлина). Противоположни процеси.' }
  ],
  'bio11-dishane': [
    { q: 'Какви са трите етапа на аеробното клетъчно дишане?', a: '1) Гликолиза — цитоплазма; 2) Цикъл на Кребс — митохондриален матрикс; 3) Окислително фосфорилиране — вътрешна митохондриална мембрана.' },
    { q: 'Какво се произвежда при гликолизата?', a: '1 глюкоза → 2 пирувата + 2 АТФ (нетно) + 2 НАДН. Протича в цитоплазмата без нужда от кислород.' },
    { q: 'Каква е ролята на цикъла на Кребс?', a: 'Пируватите (от гликолизата) се окисляват до CO₂; отделят се НАДН, ФАДН₂ и малко АТФ; коензимите захранват дихателната верига.' },
    { q: 'Как окислителното фосфорилиране произвежда АТФ?', a: 'НАДН и ФАДН₂ отдават електрони на дихателната верига → изгражда се протонен градиент → АТФ-синтазата използва градиента за синтез на ~34 АТФ.' },
    { q: 'Каква е разликата между аеробното и анаеробното дишане?', a: 'Аеробно: с O₂ → ~38 АТФ, CO₂, H₂O. Анаеробно (ферментация): без O₂ → 2 АТФ + лактат (мускули) или 2 АТФ + етанол + CO₂ (дрожди).' },
    { q: 'Защо мускулите болят след интензивно натоварване?', a: 'При липса на O₂ мускулите преминават към анаеробна гликолиза → натрупват се лактат → понижава се рН → усещане за парене и умора.' },
    { q: 'Какво е АТФ и защо е важен?', a: 'АТФ (аденозинтрифосфат) е универсалният носител на енергия в клетката; хидролизата му (АТФ → АДФ + Pи) освобождава ~30 kJ/mol за клетъчна работа.' },
    { q: 'Защо митохондрията има двойна мембрана?', a: 'Вътрешната мембрана създава компартимент (матрикс) за Кребс и е носител на дихателната верига; гънките (кристи) увеличават повърхността за АТФ синтез.' }
  ],
  'bio11-nervna-sistema': [
    { q: 'Каква е разликата между ЦНС и ПНС?', a: 'ЦНС: главен и гръбначен мозък — обработка и интеграция на информацията. ПНС: нерви и ганглии, извън ЦНС — свързва ЦНС с органите; соматична и автономна.' },
    { q: 'Опишете строежа на неврона.', a: 'Тяло (перикарион) с ядро; дендрити — приемат входящи сигнали; аксон — провежда изходящия импулс; миелинова обвивка ускорява проводимостта.' },
    { q: 'Как се генерира нервен импулс?', a: 'В покой мембраната е поляризирана (–70 mV). При дразнение Na⁺ каналите се отварят → Na⁺ влиза → деполяризация → акционен потенциал. После K⁺ излиза → реполяризация.' },
    { q: 'Какво е синапс и как се предава сигналът?', a: 'Синапсът е контакт между два неврона (или неврон и ефектор). Акционният потенциал задейства освобождаване на невротрансмитери от везикулите → свързват се с рецептори → нов потенциал.' },
    { q: 'Какво е рефлексна дъга?', a: 'Пътят на нервния импулс при рефлекс: рецептор → аферентен (сетивен) неврон → нервен център → еферентен (двигателен) неврон → ефектор (мускул/жлеза).' },
    { q: 'Каква е разликата между симпатикусова и парасимпатикусова система?', a: 'Симпатикус: активира при стрес — ускорява пулса, разширява зениците, забавя храносмилането. Парасимпатикус: релаксация — забавя пулса, стимулира храносмилането.' },
    { q: 'Какво е миелинова обвивка и каква е ролята й?', a: 'Изолиращ слой около аксона от миелин (образуван от Schwann клетки); позволява скокообразна (saltatory) проводимост — импулсът „скача" между Ranvier нодусите → по-бърз.' },
    { q: 'Назовете невротрансмитери и техните функции.', a: 'Ацетилхолин — нервно-мускулен синапс, памет. Допамин — награда, движение. Серотонин — настроение, сън. Норадреналин — вниманието и стресовата реакция.' }
  ],
  'bio11-endokrinna-sistema': [
    { q: 'Каква е разликата между нервна и хормонална регулация?', a: 'Нервна: бърза (ms), локална, електрически сигнал. Хормонална: бавна (секунди–часове), системна (чрез кръвта), химически сигнал; по-продължителен ефект.' },
    { q: 'Защо хипофизата е наречена „главна жлеза"?', a: 'Секретира тропни хормони (ТСХ, АКТА, ФСХ, ЛХ, ПРЛ), контролиращи дейността на другите ендокринни жлези; самата тя е под контрола на хипоталамуса.' },
    { q: 'Обяснете принципа на обратната отрицателна връзка.', a: 'Хипофизата секретира ТСХ → щитовидната произвежда тироксин → повишен тироксин инхибира хипофизата → по-малко ТСХ → по-малко тироксин. Система за саморегулация.' },
    { q: 'Как панкреасът регулира кръвната захар?', a: 'При висока захар — β-клетките секретират инсулин → клетките поемат глюкоза → захарта спада. При ниска захар — α-клетките секретират глюкагон → черният дроб освобождава глюкоза.' },
    { q: 'Какво е диабет и какви са видовете?', a: 'Диабет тип 1: автоимунно разрушаване на β-клетките → без инсулин → нужна инжекция. Диабет тип 2: клетките не реагират на инсулин (инсулинова резистентност) → обикновено при затлъстяване.' },
    { q: 'Каква е функцията на адреналина?', a: 'Хормон на надбъбречната медула; задейства реакцията „бий се или бягай": ускорява пулса, повишава кръвната захар, разширява бронхите, намалява храносмилателната активност.' },
    { q: 'Какво е хомеостаза и как ендокринната система я поддържа?', a: 'Хомеостазата е поддържане на постоянна вътрешна среда. Ендокринната система я осигурява чрез хормони с отрицателна обратна връзка — напр. инсулин/глюкагон за кръвна захар, тироксин за метаболизма.' }
  ],
  'bio11-razmnozhavane': [
    { q: 'Каква е разликата между митоза и мейоза?', a: 'Митоза: 1 делене → 2 диплоидни клетки (2n→2n); за растеж. Мейоза: 2 деления → 4 хаплоидни клетки (2n→n); за полови клетки; въвежда генетично разнообразие.' },
    { q: 'Какви са фазите на митозата?', a: 'Профаза (хромозомите се кондензират, вретено се оформя), метафаза (хромозомите наредени в екватора), анафаза (хроматидите се разтеглят), телофаза (ядра се формират) + цитокинеза.' },
    { q: 'Какво е кросинговър и защо е важен?', a: 'При профаза I на мейозата хомоложните хромозоми се кръстосват и обменят сегменти → нови комбинации от алели → генетично разнообразие в потомството.' },
    { q: 'Защо мейозата е необходима при половото размножаване?', a: 'Без мейоза гаметите биха били диплоидни → при оплождане: 4n → след поколения: хромозомите ще се удвояват безкрайно. Мейозата редуцира набора на n, оплождането го възстановява на 2n.' },
    { q: 'Какви са предимствата на половото размножаване пред безполовото?', a: 'Половото: генетично разнообразие → по-добра адаптация при промени на средата; по-бърза еволюция. Безполово: по-бързо, по-ефективно (не нужно партньор), идеално при стабилна среда.' },
    { q: 'Какво е партеногенеза?', a: 'Развитие на яйцеклетка без оплождане; форма на безполово размножаване при някои насекоми (пчели — търтеи) и гущери.' },
    { q: 'Опишете жизнения цикъл на клетката.', a: 'Интерфаза: G1 (растеж, синтез на белтъци) → S (репликация на ДНК) → G2 (подготовка за деление). Митотична фаза: митоза + цитокинеза.' },
    { q: 'Каква е разликата между сперматогенезата и оогенезата?', a: 'Сперматогенеза: 1 клетка → 4 спермия (равни по размер). Оогенеза: 1 клетка → 1 яйцеклетка + 3 полярни тела (неравно деление на цитоплазмата).' }
  ],

  // ── Химия 11 клас ──
  'chem11-stroezh-atoma': [
    { q: 'Какво определя химичния елемент?', a: 'Броят на протоните в ядрото (атомен номер Z). Елементите с различен брой неутрони са изотопи — имат еднакъв Z, но различно масово число A.' },
    { q: 'Какво е електронна конфигурация и как се записва?', a: 'Разпределение на електроните в подобвивки: 1s², 2s², 2p⁶, 3s², 3p⁶... Следват принципите на Паули, Хунд и Ауфбау.' },
    { q: 'Обяснете принципите на Паули, Хунд и Ауфбау.', a: 'Паули: максимум 2е⁻ с противоположни спинове в орбитала. Хунд: в равноценни орбитали първо по 1е⁻. Ауфбау: запълване от най-ниско енергийно ниво нагоре.' },
    { q: 'Как се изменя атомният радиус в периода и в групата?', a: 'В периода (→): нараства Z → по-силно притегляне → радиусът намалява. В групата (↓): добавят се обвивки → радиусът нараства.' },
    { q: 'Какво е електроотрицателност и как се изменя?', a: 'Способността на атома да привлича електрони в ковалентна връзка. Нараства в периода (→) и намалява в групата (↓). F е най-електроотрицателен.' },
    { q: 'Какво определя броят на валентните електрони?', a: 'Броят на електроните в последната (валентна) обвивка; за s- и p-елементи = номерът на групата; определя броя и типа на химичните връзки.' },
    { q: 'Какво са изотопи и какво е приложението им?', a: 'Атоми с еднакъв Z, но различен N и A. Примери: ¹H, ²H (деутерий), ³H (тритий). Приложения: ¹⁴C — радиовъглеродно датиране; ¹³¹I — диагностика/лечение.' }
  ],
  'chem11-himichna-vrazka': [
    { q: 'Какви са основните видове химична връзка?', a: 'Ковалентна (споделяне на е⁻ — неметали с неметали), йонна (прехвърляне на е⁻ — метал с неметал), метална (делокализирани е⁻ — метали), водородна (O/N/F–H···O/N/F).' },
    { q: 'Как се формира йонна връзка и какви са свойствата на йонните съединения?', a: 'Металът отдава е⁻ → катион; неметалът приема → анион; привличат се електростатично. Йонните съединения: твърди, крехки, висока Tтоп, провеждат ток в разтвор/стопилка.' },
    { q: 'Какво е полярна ковалентна връзка?', a: 'Когато двата атома в ковалентна връзка имат различна електроотрицателност, електронната двойка е изместена към по-електроотрицателния → частични заряди δ⁺ и δ⁻.' },
    { q: 'Защо водата кипи при 100°C, а не при –80°C (очаквано)?', a: 'Заради водородни връзки между молекулите (O–H···O) — допълнителна сила на привличане, изискваща повече енергия за кипене.' },
    { q: 'Как VSEPR определя формата на молекулата?', a: 'Всички е⁻ двойки около централния атом се отблъскват → заемат максимално разстояние. CH₄: тетраедър; H₂O: ъглова (2 несвързващи двойки); NH₃: пирамидална.' },
    { q: 'Каква е разликата между σ и π връзки?', a: 'σ (сигма): директно припокриване на орбитали по оста; π (пи): странично припокриване. Единична: 1σ; двойна: 1σ+1π; тройна: 1σ+2π. σ е по-здрава от π.' },
    { q: 'Защо металите провеждат ток и са пластични?', a: 'Металната връзка има делокализирани (свободни) електрони — движат се под напрежение → проводимост. Катионите могат да се плъзгат един спрямо друг → пластичност.' }
  ],
  'chem11-rastvori': [
    { q: 'Каква е разликата между силен и слаб електролит?', a: 'Силен: пълно дисоциира в разтвор (α ≈ 1); напр. HCl, NaOH, NaCl. Слаб: частична дисоциация (α << 1); напр. CH₃COOH, NH₃. Различна проводимост при равна концентрация.' },
    { q: 'Как се изчислява рН?', a: 'рН = –log[H⁺]. При [H⁺] = 10⁻³ mol/L → pH = 3. В базичен разтвор: [OH⁻] е известен → [H⁺] = 10⁻¹⁴/[OH⁻] → рН.' },
    { q: 'Какво е реакция на неутрализация?', a: 'H⁺ + OH⁻ → H₂O. Пример: HCl + NaOH → NaCl + H₂O. Нетно йонно: H⁺ + OH⁻ → H₂O. Продуктите са сол и вода.' },
    { q: 'Какво е хидролиза на соли?', a: 'Йоните на слаба киселина или слаба основа реагират с вода: CH₃COO⁻ + H₂O ⇌ CH₃COOH + OH⁻ → основна среда. NH₄⁺ + H₂O ⇌ NH₃ + H₃O⁺ → кисела среда.' },
    { q: 'Как функционира буферен разтвор?', a: 'Съдържа слаба киселина и нейната сол (конюгатна основа). При добавяне на H⁺: основата го неутрализира. При OH⁻: киселината го неутрализира. рН остава ~постоянно.' },
    { q: 'Каква е ролята на рН в биологичните системи?', a: 'рН на кръвта трябва да е 7.35–7.45; отклонения → ацидоза или алкалоза → фатални. Буферните системи (бикарбонатна, хемоглобинова) поддържат рН.' },
    { q: 'Как се изписва йонното уравнение?', a: 'Разпиши силните електролити като йони; слабите, неразтворимите и газовете — в молекулна форма. Съкрати повтарящите се йони (spectator ions). Напр. H⁺ + OH⁻ → H₂O.' }
  ],
  'chem11-okislenie-redukciya': [
    { q: 'Как се определя степента на окисление?', a: 'Правила: в прост елемент СО = 0; в моноатомен йон СО = заряда; О обикновено е –2 (освен в пероксиди: –1); Н: +1 (с неметали), –1 (с метали); сумата = заряда на частицата.' },
    { q: 'Кой се окислява и кой се редуцира в: Zn + CuSO₄ → ZnSO₄ + Cu?', a: 'Zn: 0 → +2 (отдава е⁻) → окислява се → Zn е редуктор. Cu²⁺: +2 → 0 (приема е⁻) → редуцира се → Cu²⁺ е окислител.' },
    { q: 'Обяснете метода на електронния баланс.', a: 'Определи СО преди и след. Запиши е⁻, отдадени от редуктора и приети от окислителя. Изравни броя им чрез коефициенти. Допълни останалите елементи.' },
    { q: 'Какви са типичните окислители и редуктори?', a: 'Окислители: O₂, Cl₂, Br₂, KMnO₄, K₂Cr₂O₇, H₂SO₄ (конц.), HNO₃. Редуктори: активни метали (Na, Zn, Fe), H₂, CO, C, HI, H₂S.' },
    { q: 'Какво е галваничен елемент?', a: 'Устройство, в което самоволна редокс реакция генерира електрически ток. На анода — окисление (–); на катода — редукция (+). Пример: Zn–Cu клетка.' },
    { q: 'Какво е електролиза и как се различава от галваничен елемент?', a: 'Електролизата е несамоволна редокс реакция, задействана от постоянен ток. Галваничен: реакцията произвежда ток; електролиза: токът задейства реакцията. На катода — редукция; на анода — окисление.' },
    { q: 'Посочете практически приложения на редокс реакциите.', a: 'Батерии и акумулатори, горивни клетки, корозия на металите, производство на Al (електролиза на Al₂O₃), пречистване на метали (електролитно рафиниране), дезинфекция с Cl₂.' }
  ],
  'chem11-neorganichni-saedinenia': [
    { q: 'Каква е класификацията на оксидите?', a: 'Основни (MeO — реагират с вода→основа, с киселини→сол+вода); киселинни (Non-MeO — реагират с вода→киселина, с основи→сол+вода); амфотерни (Al₂O₃, ZnO — реагират и с двете).' },
    { q: 'Напишете генетичната верига за натрий.', a: 'Na (метал) → Na₂O (основен оксид) → NaOH (основа) → NaCl (сол). Всяка стъпка е конкретна реакция: Na+O₂→Na₂O; Na₂O+H₂O→2NaOH; NaOH+HCl→NaCl+H₂O.' },
    { q: 'Какво е амфотерен хидроксид и кои са примерите?', a: 'Реагира и с киселини (действа като основа), и с основи (действа като киселина). Примери: Al(OH)₃, Zn(OH)₂, Cr(OH)₃. Al(OH)₃ + NaOH → NaAlO₂ + 2H₂O.' },
    { q: 'Какви реакции са типични за киселините?', a: '1) с метали: Zn + H₂SO₄ → ZnSO₄ + H₂↑; 2) с осн. оксиди: CaO + H₂SO₄ → CaSO₄ + H₂O; 3) с основи (неутрализация); 4) с соли: BaCl₂ + H₂SO₄ → BaSO₄↓ + 2HCl.' },
    { q: 'Как се разпознава хлориден йон?', a: 'Качествена реакция с AgNO₃: Cl⁻ + Ag⁺ → AgCl↓ (бяла утайка, неразтворима в HNO₃). Сулфатен йон: с Ba²⁺ → BaSO₄↓ (бяла, неразтворима).' },
    { q: 'Каква е разликата между силни и слаби киселини?', a: 'Силни (HCl, H₂SO₄, HNO₃): напълно дисоциират → висока [H⁺] → ниско рН → по-реактивни. Слаби (CH₃COOH, H₂CO₃): частично дисоциират → по-нискa [H⁺] → по-малко реактивни.' },
    { q: 'Запишете реакцията на неутрализация между H₂SO₄ и NaOH.', a: 'H₂SO₄ + 2NaOH → Na₂SO₄ + 2H₂O. Йонно: 2H⁺ + 2OH⁻ → 2H₂O. Нетно: H⁺ + OH⁻ → H₂O.' }
  ],
  'chem11-skorost-ravnovesie': [
    { q: 'Какви фактори влияят на скоростта на реакция?', a: 'Концентрация (повече молекули → повече сблъсъци), температура (повече молекули с Eакт), повърхност на контакт (при хетерогенни реакции), катализатор (намалява Eакт).' },
    { q: 'Какво е правилото на Вант Хоф?', a: 'При покачване на температурата с 10°C скоростта на реакция нараства 2–4 пъти (коефициент γ = 2–4). v₂ = v₁ · γ^(ΔT/10).' },
    { q: 'Дефинирайте химично равновесие.', a: 'Динамично състояние, при което скоростите на правата и обратната реакция са равни и концентрациите на всички вещества остават постоянни (не нулеви).' },
    { q: 'Как се записва и интерпретира Kc?', a: 'За aA + bB ⇌ cC + dD: Kc = [C]ᶜ[D]ᵈ / ([A]ᵃ[B]ᵇ). Kc > 1 → преобладават продукти; Kc < 1 → преобладават изходни вещества. Kc зависи само от T.' },
    { q: 'Приложете принципа на Льо Шателие към синтеза на амоняк: N₂ + 3H₂ ⇌ 2NH₃ (ΔH < 0).', a: 'Повишаване на P → равновесие надясно (по-малко молове газ). Понижаване на T → надясно (екзотермична). Но: ниска T = бавна реакция → компромис ~450°C + Fe катализатор.' },
    { q: 'Как катализаторът влияе на равновесието?', a: 'Ускорява и двете реакции (пряка и обратна) в еднаква степен → равновесието се достига по-бързо, но положението му (Kc) не се променя.' },
    { q: 'Какво е активационна енергия?', a: 'Минималната енергия, която молекулите трябва да имат, за да реагират. Катализаторът предлага алтернативен механизъм с по-ниска Eакт → повече молекули могат да реагират → по-висока скорост.' },
    { q: 'Обяснете защо разбиването на твърд реагент на по-малки парчета ускорява реакцията.', a: 'Увеличава се повърхността на контакт между реагентите → повече молекули могат да се срещат за единица време → по-висока скорост на реакция.' }
  ],

  // ── Математика 11 клас ──
  'math11-trigonometriya': [
    { q: 'Запишете основното тригонометрично тъждество и дайте две следствия от него.', a: 'sin²α + cos²α = 1. Следствия: tg²α + 1 = 1/cos²α (разделяме на cos²α); ctg²α + 1 = 1/sin²α (разделяме на sin²α).' },
    { q: 'Каква е стойността на sin 30°, cos 60°, tg 45° и sin 90°?', a: 'sin 30° = 1/2; cos 60° = 1/2; tg 45° = 1; sin 90° = 1. Тези стойности се извеждат от геометрията на равностранния и правоъгълния равнобедрен триъгълник.' },
    { q: 'Запишете формулата за sin(α + β) и изведете от нея формулата за sin 2α.', a: 'sin(α + β) = sin α cos β + cos α sin β. При β = α: sin 2α = sin α cos α + cos α sin α = 2 sin α cos α.' },
    { q: 'Запишете трите форми на формулата за cos 2α.', a: 'cos 2α = cos²α − sin²α = 1 − 2sin²α = 2cos²α − 1. Различните форми се получават чрез основното тъждество.' },
    { q: 'Как се решава уравнението cos x = 1/2?', a: 'cos x = 1/2 → x = ±π/3 + 2πn, n ∈ ℤ. В градуси: x = ±60° + 360°n. Намираме основното решение arccos(1/2) = π/3, след което добавяме ±2πn.' },
    { q: 'Каква е разликата между четна и нечетна тригонометрична функция?', a: 'Косинусът е четна функция: cos(−α) = cos α. Синусът и тангенсът са нечетни: sin(−α) = −sin α; tg(−α) = −tg α. Графиките: четна е симетрична спрямо Oy, нечетна — спрямо O.' },
    { q: 'Как се прилага редуцираща формула за sin(π − α)?', a: 'sin(π − α) = sin α. При аргументи от вида (π ± α) функцията не се сменя; при (π/2 ± α) sin и cos се разменят. Знакът се определя от квадранта.' },
    { q: 'Обяснете как се намират всички решения на sin x = a в интервала [0°, 360°].', a: 'Намираме основното решение x₁ = arcsin a (в I квадрант ако a > 0). Второто решение е x₂ = 180° − x₁. Проверяваме дали и двете са в [0°, 360°].' }
  ],
  'math11-pokazatelna-logaritmichna': [
    { q: 'Каква е дефиницията на логаритъма и как се записва?', a: 'log_a b = c ↔ aᶜ = b, при a > 0, a ≠ 1, b > 0. Логаритъмът е показателят, на който трябва да се вдигне основата, за да се получи b.' },
    { q: 'Запишете трите основни свойства на логаритмите.', a: '1) log_a(xy) = log_a x + log_a y; 2) log_a(x/y) = log_a x − log_a y; 3) log_a(xⁿ) = n·log_a x. Произтичат от свойствата на степените.' },
    { q: 'Как се решава показателното уравнение 3ˣ = 27?', a: '27 = 3³, следователно 3ˣ = 3³ → x = 3. При равни основи показателите са равни. Ако основите не могат да се изравнят, логаритмираме и двете страни.' },
    { q: 'Как се решава логаритмичното уравнение log₂(x − 1) = 3?', a: 'log₂(x − 1) = 3 → x − 1 = 2³ = 8 → x = 9. Проверка на ОДЗ: x − 1 > 0 → x > 1; x = 9 > 1 ✓.' },
    { q: 'Защо е важна ОДЗ при логаритмични уравнения?', a: 'Аргументът на логаритъма трябва да е строго положителен. Трябва да проверим допустимите стойности преди и след намиране на решението, тъй като алгебричните операции може да въведат чужди корени.' },
    { q: 'Как се решава показателното неравенство 2ˣ > 8?', a: '8 = 2³, следователно 2ˣ > 2³. При основа a > 1 функцията е нарастваща → x > 3. При 0 < a < 1 посоката на неравенството би се обърнала.' },
    { q: 'Обяснете смяната на основата и дайте пример.', a: 'log_a x = log_b x / log_b a. Пример: log₈ 4 = log₂ 4 / log₂ 8 = 2/3. Удобно е при изчисления с lg или ln на калкулатор.' },
    { q: 'Каква е връзката между показателната и логаритмичната функция?', a: 'Те са взаимно обратни: ако f(x) = aˣ, то f⁻¹(x) = log_a x. Графиките им са огледални спрямо правата y = x. log_a(aˣ) = x и a^(log_a x) = x.' }
  ],
  'math11-kvadratni-neravenstva': [
    { q: 'Обяснете метода на параболата за решаване на квадратни неравенства.', a: 'Решаваме ax² + bx + c = 0, намираме корените x₁ ≤ x₂. Скицираме парабола: при a > 0 клоновете са нагоре. Изразът е отрицателен между корените и положителен извън тях (при a > 0).' },
    { q: 'Решете x² − x − 6 > 0.', a: 'x² − x − 6 = 0 → D = 1 + 24 = 25 → x = (1 ± 5)/2 → x₁ = −2, x₂ = 3. При a = 1 > 0 изразът е положителен за x < −2 или x > 3.' },
    { q: 'Какво се случва когато D < 0 при ax² + bx + c > 0?', a: 'Параболата не сече Ох. При a > 0: изразът е винаги положителен → решението е x ∈ ℝ. При a < 0: изразът е винаги отрицателен → неравенство > 0 няма решение (∅).' },
    { q: 'Решете −x² + 4x − 4 ≥ 0.', a: '−x² + 4x − 4 = 0 → x² − 4x + 4 = 0 → (x−2)² = 0 → двоен корен x = 2. При a = −1 < 0 параболата е надолу; изразът е ≤ 0 навсякъде освен x = 2, където е 0. Решение: x = 2.' },
    { q: 'Какво е знакова схема и как се използва?', a: 'Нанасяме корените на числовата ос. Разделят ос на интервали. Проверяваме знака на израза в един интервал (напр. с конкретно число). Знаците се редуват при преминаване през корен (с нечетна кратност).' },
    { q: 'При какви стойности на k е вярно x² + kx + 1 > 0 за всички x?', a: 'Изразът е положителен за всички x ↔ D < 0 и a > 0 (a = 1 > 0 ✓). D = k² − 4 < 0 → k² < 4 → −2 < k < 2.' },
    { q: 'Как се решава система от две квадратни неравенства?', a: 'Решаваме всяко поотделно, след което намираме пресечното множество (ако са свързани с „и") или обединението (ако са свързани с „или"). Изобразяваме решенията на числовата ос.' }
  ],
  'math11-progresii': [
    { q: 'Запишете формулата за n-тия член и за сумата на аритметична прогресия.', a: 'n-ти член: aₙ = a₁ + (n−1)d. Сума: Sₙ = n·(a₁ + aₙ)/2 = n·(2a₁ + (n−1)d)/2. Сумата е средноаритметичното на крайните членове по техния брой.' },
    { q: 'Намерете 15-ия член на АП 3, 7, 11, 15, ...', a: 'd = 4; a₁ = 3. a₁₅ = 3 + 14·4 = 3 + 56 = 59.' },
    { q: 'Запишете формулата за n-тия член и за сумата на геометрична прогресия.', a: 'n-ти член: bₙ = b₁·q^(n−1). Сума: Sₙ = b₁·(qⁿ − 1)/(q − 1) при q ≠ 1. При q = 1: Sₙ = n·b₁.' },
    { q: 'Намерете сумата на безкрайната ГП: 4, 2, 1, 1/2, ...', a: 'b₁ = 4, q = 1/2. |q| = 1/2 < 1 → сумата е крайна. S∞ = 4/(1 − 1/2) = 4/(1/2) = 8.' },
    { q: 'Как да разберем дали редица е АП или ГП?', a: 'АП: проверяваме дали разликата aₙ₊₁ − aₙ е постоянна. ГП: проверяваме дали частното bₙ₊₁/bₙ е постоянно. Пример: 2, 4, 8, 16 — частното е 2 навсякъде → ГП с q = 2.' },
    { q: 'Защо при безкрайна ГП е нужно |q| < 1?', a: 'При |q| < 1 членовете клонят към 0 и сумата се доближава до краен предел. При |q| ≥ 1 членовете не клонят към 0 и сумата нараства неограничено (или осцилира).' },
    { q: 'В АП a₁ = 5 и S₁₀ = 140. Намерете d.', a: 'S₁₀ = 10·(2·5 + 9d)/2 = 5·(10 + 9d) = 140. 10 + 9d = 28 → 9d = 18 → d = 2.' },
    { q: 'Как периодичен десетичен дроб се изразява като дроб чрез безкрайна ГП?', a: '0,(3) = 0,3 + 0,03 + 0,003 + ... = ГП с b₁ = 0,3 и q = 0,1. S∞ = 0,3/(1−0,1) = 0,3/0,9 = 1/3.' }
  ],
  'math11-planimeriya': [
    { q: 'Кога се прилага теоремата на синусите и кога — на косинусите?', a: 'Теорема на синусите: при дадени страна и срещулежащ ъгъл (или когато търсим ъгъл). Теорема на косинусите: при дадени три страни или две страни и ъгъл между тях.' },
    { q: 'Запишете теоремата на косинусите и обяснете кога се свежда до питагоровата теорема.', a: 'c² = a² + b² − 2ab cos γ. При γ = 90°: cos 90° = 0 → c² = a² + b² (питагорова теорема). Следователно питагоровата теорема е частен случай на теоремата на косинусите.' },
    { q: 'Намерете лицето на триъгълник с a = 8, b = 6 и включен ъгъл γ = 30°.', a: 'S = (1/2)·a·b·sin γ = (1/2)·8·6·sin 30° = (1/2)·8·6·(1/2) = 12.' },
    { q: 'Какво е вписан ъгъл и как се свързва с централния?', a: 'Вписаният ъгъл има връх на окръжността и е равен на половината от централния ъгъл, стягащ същата дъга. Ако централният е 120°, вписаният е 60°.' },
    { q: 'Какво е свойството на допирателната към окръжност?', a: 'Допирателната в точката на допиране е перпендикулярна на радиуса в същата точка. Ако OT е радиус и t е допирателна в T, тогава OT ⊥ t.' },
    { q: 'Намерете страна c в триъгълник с a = 5, b = 7, γ = 60°.', a: 'c² = a² + b² − 2ab cos γ = 25 + 49 − 2·5·7·cos 60° = 74 − 70·(1/2) = 74 − 35 = 39. c = √39.' },
    { q: 'Запишете формулите за лице на паралелограм, трапец и кръг.', a: 'Паралелограм: S = a·h = ab·sin α. Трапец: S = (a+b)/2·h. Кръг: S = πR². Окръжност (периметър): C = 2πR.' }
  ],

  // ── Математика 12 клас ──
  'math12-trigonometriya': [
    { q: 'Какви са периодът и амплитудата на функцията y = 3sin(2x)?', a: 'Амплитуда = 3, период T = 2π/2 = π. Общо: за y = A·sin(ωx+φ) амплитудата е |A|, а периодът T = 2π/|ω|.' },
    { q: 'Запишете общото решение на уравнението sin x = 1/2.', a: 'sin x = 1/2 → x = π/6 + 2πn или x = 5π/6 + 2πn, n ∈ ℤ. Основните решения са arcsin(1/2)=π/6 и π−π/6=5π/6.' },
    { q: 'Каква е разликата между arcsin и sin?', a: 'sin е тригонометрична функция (аргумент — ъгъл, стойност — число в [−1,1]). arcsin е обратна функция (аргумент — число в [−1,1], стойност — ъгъл в [−π/2, π/2]).' },
    { q: 'Решете уравнението cos(2x) = 1 в интервала [0, 2π].', a: 'cos(2x) = 1 → 2x = 2πn → x = πn. В [0, 2π]: x = 0, π, 2π.' },
    { q: 'Обяснете как се чете периодът от графиката на тригонометрична функция.', a: 'Периодът е разстоянието между два последователни еднотипни точки — например от максимум до следващ максимум, или от нула до следваща нула в същата посока.' },
    { q: 'Решете неравенството cos x ≤ 0.', a: 'cos x ≤ 0 за x ∈ [π/2, 3π/2] + 2πn, n ∈ ℤ. Графично: дясното полукълбо на единичната окръжност е с отрицателна абсциса.' },
    { q: 'Каква е стойността на arctan(√3)?', a: 'arctan(√3) = π/3 (60°), защото tg(π/3) = √3 и π/3 ∈ (−π/2, π/2).' },
    { q: 'Как трансформацията y = sin(x + π/2) се свързва с y = cos x?', a: 'sin(x + π/2) = cos x — хоризонтално отместване наляво с π/2 на синусоидата дава косинусоидата. Двете функции са с фазова разлика π/2.' }
  ],
  'math12-kvadratna-funkciya': [
    { q: 'Как намираме осите на симетрия и върха на параболата y = 2x² − 8x + 5?', a: 'Ос: x₀ = −(−8)/(2·2) = 2. Връх: y₀ = 2·4 − 8·2 + 5 = 8−16+5 = −3. Връх V(2, −3).' },
    { q: 'Какво показва дискриминантата на квадратна функция?', a: 'D = b²−4ac. D > 0 → парабола сече Ox в две точки. D = 0 → докосва Ox в едно. D < 0 → не сяча Ox (нулите са комплексни).' },
    { q: 'Формулите на Виета — кога са полезни?', a: 'Когато са дадени корени и трябва да намерим коефициентите, или обратно. x₁+x₂=−b/a и x₁·x₂=c/a позволяват изчисления без директно намиране на корените.' },
    { q: 'Запишете каноничната форма на f(x) = x² − 6x + 7.', a: 'f(x) = (x²−6x+9) − 9 + 7 = (x−3)² − 2. Канонична форма: f(x) = (x−3)² − 2. Връх V(3, −2).' },
    { q: 'Какъв е минимумът/максимумът на квадратна функция?', a: 'При a > 0: минимум fmin = −D/(4a) в x₀ = −b/(2a). При a < 0: максимум fmax = −D/(4a) в x₀. Стойността е y-координатата на върха.' },
    { q: 'При какви условия квадратната функция е неотрицателна за всички x?', a: 'a > 0 и D ≤ 0. При a > 0 параболата е нагоре; ако не сяча или само докосва Ox, стойностите са ≥ 0 навсякъде.' },
    { q: 'Намерете квадратна функция с корени 1 и 4 и водещ коефициент 2.', a: 'f(x) = 2(x−1)(x−4) = 2(x²−5x+4) = 2x²−10x+8. Проверка: нули при x=1 и x=4 ✓.' }
  ],
  'math12-kvadratni-neravenstva': [
    { q: 'Обяснете алгоритъма за решаване на квадратно неравенство.', a: '1) Намери корените (реши = 0). 2) Начертай знакова схема — нанеси корените на числовата ос. 3) Определи знака на тричлена в интервалите. 4) Избери интервалите, удовлетворяващи неравенството.' },
    { q: 'Решете неравенството x² − 3x − 4 > 0.', a: 'x²−3x−4=0 → D=9+16=25 → x=(3±5)/2 → x₁=−1, x₂=4. a=1>0 → положителен „навън": x < −1 или x > 4.' },
    { q: 'Какво е решението на x² + 2x + 2 < 0?', a: 'D = 4−8 = −4 < 0; a = 1 > 0 → тричленът е винаги положителен → неравенство < 0 няма решение (∅).' },
    { q: 'Решете −x² + 4x − 3 ≥ 0.', a: 'Умножи по −1 (обърни неравенството): x²−4x+3 ≤ 0. Корени: 1 и 3. При a=1>0 тричленът е ≤ 0 между корените: x ∈ [1, 3].' },
    { q: 'При какви стойности на параметъра a уравнението ax² + 4x + a = 0 има два реални корена?', a: 'За a ≠ 0: D = 16−4a² > 0 → a² < 4 → −2 < a < 2. При a=0 уравнението е линейно (не квадратно).' },
    { q: 'Как строгото и нестрогото неравенство се различават по решение?', a: 'При строго (> или <) корените НЕ влизат в решението — отворен интервал. При нестрого (≥ или ≤) корените СА включени — затворен интервал.' },
    { q: 'Решете системата x²−4 ≤ 0 и x−1 > 0.', a: 'x²−4 ≤ 0 → x ∈ [−2, 2]. x−1 > 0 → x > 1. Сечение: x ∈ (1, 2].' }
  ],
  'math12-proizvodna': [
    { q: 'Дефинирайте производната и обяснете геометричния й смисъл.', a: 'f\'(x) = lim[Δx→0] [f(x+Δx)−f(x)]/Δx. Геометрично: f\'(x₀) е наклонът на допирателната към графиката на f в точката x₀.' },
    { q: 'Намерете производната на f(x) = x⁴ − 3x² + 7.', a: 'f\'(x) = 4x³ − 6x. Прилагаме правило (xⁿ)\' = nxⁿ⁻¹ за всеки член: (x⁴)\'=4x³; (3x²)\'=6x; (7)\'=0.' },
    { q: 'Приложете верижното правило за (sin(x²))\'.' , a: '(sin(x²))\' = cos(x²)·(x²)\' = cos(x²)·2x = 2x·cos(x²). Производна на външната (cos) × производна на вътрешната (2x).' },
    { q: 'Намерете екстремумите на f(x) = x³ − 3x.', a: 'f\'(x) = 3x²−3 = 3(x²−1) = 0 → x = ±1. f\'<0 за x∈(−1,1) → f намалява. Максимум при x=−1: f(−1)=2. Минимум при x=1: f(1)=−2.' },
    { q: 'Запишете уравнението на допирателната към y = x² в точката x = 3.', a: 'f(3)=9; f\'(3)=2·3=6. Допирателна: y−9=6(x−3) → y=6x−9.' },
    { q: 'Каква е производната на произведението (x·eˣ)?', a: '(x·eˣ)\' = (x)\'·eˣ + x·(eˣ)\' = 1·eˣ + x·eˣ = eˣ(1+x).' },
    { q: 'Как производната помага за определяне на монотонността на функция?', a: 'f\'(x) > 0 в интервал → f нараства. f\'(x) < 0 → f намалява. Намираме нулите на f\', разделяме числовата ос на интервали и проверяваме знака на f\' в тях.' },
    { q: 'Намерете производна на f(x) = ln(x²+1).', a: 'Верижно правило: f\'(x) = 1/(x²+1) · 2x = 2x/(x²+1).' }
  ],
  'math12-geometriya': [
    { q: 'Каква е разликата между формулата за обем на пирамида и призма?', a: 'Призма: V = S_осн·h. Пирамида: V = (1/3)·S_осн·h. Пирамидата е 3 пъти по-малка от призмата с еднакво основание и височина.' },
    { q: 'Намерете обема на конус с радиус r=5 и височина h=12.', a: 'V = (1/3)·π·r²·h = (1/3)·π·25·12 = 100π ≈ 314 куб. ед. Образуваща: l=√(25+144)=13.' },
    { q: 'Намерете пълното лице на цилиндър с r=4 и h=6.', a: 'Пълно лице = 2πr² + 2πrh = 2π·16 + 2π·4·6 = 32π + 48π = 80π.' },
    { q: 'Какви са обемът и лицето на сфера с R=3?', a: 'V = (4/3)π·27 = 36π; S = 4π·9 = 36π. Съвпадат в числата само при R=3 (случайно).' },
    { q: 'Намерете пространствената диагонала на куб с ребро 5.', a: 'd = 5√3 ≈ 8,66. Формула: d = a√3. Извеждане: диагоналата на основата е 5√2, после Питагор: d=√((5√2)²+5²)=√75=5√3.' },
    { q: 'В правилна 4-ъгълна пирамида с основа 6 и апотема 5, намерете лицето на страничната повърхнина.', a: 'Страничната повърхнина = (1/2)·P·l = (1/2)·24·5 = 60 кв. ед., където P=4·6=24 е периметърът на основата.' },
    { q: 'Кога се прилага теоремата на косинусите и кога — на синусите?', a: 'Косинуси: при дадени три страни (ССС) или две страни и ъгъл между тях (СЪС). Синуси: при дадени страна и срещулежащ ъгъл — (СЪС-страничен) или ЪСЪ.' }
  ],
  'math12-kombinatorika': [
    { q: 'Каква е разликата между вариации и комбинации?', a: 'При вариации редът има значение (АБ ≠ БА). При комбинации редът няма значение ({А,Б}={Б,А}). Vⁿₖ=n!/(n−k)!; Cⁿₖ=n!/[k!(n−k)!]. Cⁿₖ = Vⁿₖ / k!.' },
    { q: 'По колко начина могат да се наредят 6 различни предмета?', a: 'P₆ = 6! = 720.' },
    { q: 'Изчислете C¹⁰₃.', a: 'C¹⁰₃ = 10!/(3!·7!) = (10·9·8)/(3·2·1) = 720/6 = 120.' },
    { q: 'Обяснете биномната теорема с пример.', a: '(a+b)⁴ = C⁴₀a⁴ + C⁴₁a³b + C⁴₂a²b² + C⁴₃ab³ + C⁴₄b⁴ = a⁴+4a³b+6a²b²+4ab³+b⁴. Коефициентите са 1,4,6,4,1 от 4-ия ред на триъгълника на Паскал.' },
    { q: 'По колко начина може комисия от 4 човека да се избере от 9 кандидати?', a: 'C⁹₄ = 9!/(4!·5!) = (9·8·7·6)/(4·3·2·1) = 3024/24 = 126.' },
    { q: 'Какво е C⁰ₙ и Cⁿₙ?', a: 'C⁰ₙ = n!/(0!·n!) = 1 (0 елемента от n — само едно подмножество: празното). Cⁿₙ = 1 (всичките n елемента — само един начин).' },
    { q: 'Трима студенти трябва да се настанят в 5 стаи (по 1 студент в стая). По колко начина?', a: 'V⁵₃ = 5!/(5−3)! = 5!/2! = 60. Редът има значение (различни стаи за различни хора).' },
    { q: 'Намерете коефициента пред x² в разложението на (x+2)⁵.', a: 'k=2: C⁵₂·x³·2² → грешен; k-тият член е C⁵ₖ·x⁵⁻ᵏ·2ᵏ. За x²: 5−k=2 → k=3. Коефициент: C⁵₃·2³=10·8=80.' }
  ],
  'math12-veroyatnosti': [
    { q: 'Определете класическата вероятност и дайте пример.', a: 'P(A) = m/n: m — благоприятни, n — равновероятни изходи. Пример: зар P(≥5) = 2/6 = 1/3 (изходи 5 и 6 от 6 равновероятни).' },
    { q: 'Каква е вероятността при хвърляне на две монети да се паднат поне един „ези"?', a: 'Изходи: {ЕЕ, ЕТ, ТЕ, ТТ}; n=4. A={ЕЕ, ЕТ, ТЕ}: m=3. P(A)=3/4. Или: P(Ā)=P(ТТ)=1/4 → P(A)=1−1/4=3/4.' },
    { q: 'Кога две събития са независими? Дайте пример.', a: 'A и B са независими ако P(A∩B) = P(A)·P(B). Пример: две последователни хвърляния на зар — резултатът от 1-то не влияе на 2-то.' },
    { q: 'Намерете P(A∪B) ако P(A)=0,4, P(B)=0,3, P(A∩B)=0,1.', a: 'P(A∪B) = P(A)+P(B)−P(A∩B) = 0,4+0,3−0,1 = 0,6. Формулата за включване-изключване важи за произволни съвместими събития.' },
    { q: 'Обяснете схемата на Бернули с пример.', a: 'n независими опита, всеки с P(успех)=p. P(X=k) = Cⁿₖ·pᵏ·(1−p)ⁿ⁻ᵏ. Пример: монета 6 пъти, P(точно 2 ези) = C⁶₂·(1/2)²·(1/2)⁴ = 15/64.' },
    { q: 'В урна: 4 червени (Ч) и 6 сини (С) топки. Теглим 1 без връщане, после 2-ра. P(и двете Ч)?', a: 'P(1-ва Ч) = 4/10. P(2-ра Ч | 1-ва Ч) = 3/9. P(ЧЧ) = (4/10)·(3/9) = 12/90 = 2/15.' },
    { q: 'Кога използваме P(A) = 1 − P(Ā)?', a: 'Когато е по-лесно да изчислим P(Ā) — вероятността на допълнителното събитие. Типичен случай: „поне един" — по-лесно е да смяташ „нито един".' },
    { q: 'При хвърляне на два зара каква е вероятността сборът да е 7?', a: 'Изходи с сбор 7: (1,6),(2,5),(3,4),(4,3),(5,2),(6,1) — 6 изхода. Общо: 36. P = 6/36 = 1/6.' }
  ],
  'bel12-pravopis': [
    { q: 'Каква е разликата в значението на представките пре- и при-?', a: 'Пре- означава преминаване, превишаване или повторение (прескоча, премине, преработи). При- означава приближаване, добавяне или частично действие (пристигне, прибави, приседне).' },
    { q: 'Кога пишем „я" и кога „е" в думи с ятов корен?', a: '„Я" пишем в ударена сричка пред задна гласна (а, о, у) или в края на дума (бяла, сняг). „Е" пишем в неударена сричка или пред предна гласна (и, е) — бели, снегове, вятър → ветрове.' },
    { q: 'Кога сложните думи се пишат слято и кога разделно?', a: 'Слято: когато двете основи образуват нова единна лексема (железопътен, черноморски). Разделно: когато са самостоятелни думи-определение (Черно море, Северен полюс, Ботевата поема).' },
    { q: 'Какво е „полуслято" (с тире) писане и кога се прилага?', a: 'С тире пишем сложни прилагателни с равностойни части (физико-математически, социално-икономически) и двойни имена (Мария-Луиза). Двете части са равнозначни, не подчинени.' },
    { q: 'Как се пише „н" в членни форми на прилагателни от тип -ен/-на/-но?', a: 'Прилагателните на -ен имат удвоено „н" в женски, среден и мн. ч.: есенен — есенна, есенно, есенни. При суфикс -ски удвояване няма: морски, зимски.' },
    { q: 'Какви са правилата за главни букви при имена на институции?', a: 'Официалните имена на институции се пишат с главна буква за всяка дума (Народното събрание, Министерство на образованието). Родовото понятие (министерство, съд) — с малка, ако не е в официалното название.' },
    { q: 'Как проверяваме правописа на дума с „ъ"?', a: '„Ъ" се пише само в ударена сричка. Проверка: кажи умалителна форма или форма с наставка, за да се установи ударението. Пример: ъгъл (ударено) → ъглов, ъгловат (ъ запазен).' },
    { q: 'Какво е правилото за „е" след шушкавите съгласни?', a: 'След ш, ж, ч, щ се пише „е", не „я": жена, чело, шест, щета — не *жяна, *чяло.' }
  ],
  'bel12-punktuatsiya': [
    { q: 'Кога ЗАДЪЛЖИТЕЛНО се пише запетая пред „който/която/което"?', a: 'Винаги — пред относителните местоимения „който, която, което, когато, където, откъдето" се пише запетая, защото те въвеждат подчинено определително или обстоятелствено изречение.' },
    { q: 'Кога НЕ се пише запетая пред „и" в сложно изречение?', a: 'Не се пише, когато „и" свързва два еднородни члена с един и същ подлог: „Той пее и танцува." Пише се, когато двете части имат различни подлози: „Той пее, и тя танцува."' },
    { q: 'Кога се пише двоеточие преди изброяване?', a: 'Когато преди изброяването стои обобщителна дума (следните, такива, по-долу) или глагол с директна препратка: „Купи: хляб, мляко, масло." Но НЕ след глагол без такава дума: „Купи хляб и мляко." (без двоеточие).' },
    { q: 'Как се поставят препинателни знаци при пряка реч?', a: 'Ако изречението-говорещ предхожда: Той каза: „Ела тук." Ако следва: „Ела тук" — каза той. Ако е в средата: „Ела" — каза той — „веднага."' },
    { q: 'Как се ограждат вметнатите думи в изречение?', a: 'Вметнати думи и изрази (обаче, следователно, разбира се, за съжаление) в средата на изречението се ограждат с две запетаи: „Той, разбира се, знаеше отговора."' },
    { q: 'Каква е разликата между тире и двоеточие?', a: 'Двоеточието въвежда систематично изброяване или пояснение. Тирето добавя емоционален акцент или рязка промяна: „Той искаше само едно — свобода." Тирето е по-изразително.' },
    { q: 'Кога се ограждат обособени части с две запетаи?', a: 'Когато допълнителната информация прекъсва основния изказ: причастни обороти (Уморен от пътя, той седна.), вметнати изречения (Той — не вярвай — беше там.), уточнения.' }
  ],
  'bel12-gramatika': [
    { q: 'Кога се използва пълната (-ът/-ят), а кога кратката (-а/-я) членна форма?', a: 'Пълна форма при ПОДЛОГ: „Столът е тук." Кратка форма при ДОПЪЛНЕНИЕ или след предлог: „Взех стола. / Седна на стола." Правилото се прилага само при мъжки род ед.ч.' },
    { q: 'Каква е разликата между свършен и несвършен глаголен вид?', a: 'Несвършен вид изразява продължаващо или повтарящо се действие (чета, пиша, говоря). Свършен вид изразява завършено, еднократно действие (прочета, напиша, кажа). Двата образуват видова двойка.' },
    { q: 'Какво е деепричастие и кое е основното правило за употребата му?', a: 'Деепричастие е неизменяема глаголна форма на -ейки/-айки: вървейки, казвайки. Образува се само от несвършен вид. ЗАДЪЛЖИТЕЛНО: подлогът на деепричастието и на главния глагол трябва да са едно и също лице.' },
    { q: 'Как се образуват степените за сравнение на прилагателните?', a: 'Положителна: красив. Сравнителна: по-красив (префикс по-, слято). Превъзходна: най-красив (префикс най-, слято). Забрана: „по красив" (разделно) е грешка.' },
    { q: 'Какво е страдателен залог и как се образува?', a: 'Страдателен залог показва, че подлогът е обект, а не извършител. Образува се с „съм" + страдателно причастие (-н/-т/-ен): „Книгата беше написана от него." Сравни: „Той написа книгата." (деятелен залог).' },
    { q: 'Какви са видовете причастия в български?', a: '1) Деятелно сегашно причастие (-ащ/-ещ/-ящ): четящ, пишещ. 2) Деятелно минало причастие (-л): прочел, написал. 3) Страдателно причастие (-н/-т/-ен): написан, прочетен, открит.' },
    { q: 'Как числителното „два/две" се съгласува с рода?', a: '„Два" с мъжки род (два молива, два стола). „Две" с женски и среден род (две книги, две деца). Грешка: „*две молива" или „*два деца".' }
  ],
  'bel12-leksika': [
    { q: 'Каква е разликата между синоними и антоними?', a: 'Синонимите имат БЛИЗКО или еднакво значение (бърз — скоростен — светкавичен), но различна форма или стилова окраска. Антонимите имат ПРОТИВОПОЛОЖНО значение (светлина ↔ мрак, горещо ↔ студено) в рамките на едно семантично поле.' },
    { q: 'Как се различават омоними от пароними?', a: 'Омонимите имат ЕДНАКЪВ звуков и/или писмен вид, но съвсем различно значение и произход: лук (зеленчук) / лук (оръжие). Паронимите имат ПОДОБНО, но не еднакво звучене: ефектен (впечатляващ) / ефективен (резултатен).' },
    { q: 'Какво е фразеологизъм и как се различава от обикновено словосъчетание?', a: 'Фразеологизмът е устойчиво словосъчетание с преносно значение, неделимо на значенията на отделните думи: „хвана го за ухото" не означава физическо хващане, а „задяна го". Обикновеното словосъчетание се тълкува буквално.' },
    { q: 'Каква е разликата между архаизъм и историзъм?', a: 'Архаизмът е остаряла ДУМА за понятие, което продължава да съществува и има нова дума: чело = лице. Историзмът е дума за ИЗЧЕЗНАЛА реалия, за която няма нов синоним: еничари, аги, кадия.' },
    { q: 'Какво са неологизми и дайте 3 примера от съвременния език?', a: 'Неологизмите са нови думи или значения, появили се наскоро поради нови реалии или технологии. Примери: блогър (човек, пишещ блог), стрийминг (онлайн предаване), уебинар (онлайн семинар).' },
    { q: 'Защо е важно да разграничаваме книжовна дума от жаргон в писмена реч?', a: 'В официален и книжовен текст (есе, молба, доклад) жаргонизмите (яко, готино, пич) са неподходящи и снижават стила. Книжовната норма изисква неутрална или книжовна лексика.' },
    { q: 'Какви са видовете заемки по произход в съвременния български?', a: 'Турски заемки: чорба, хазна, тарикат. Гръцки: апостол, икономика. Латински/Френски: адрес, тротоар. Английски (най-нови): интернет, принтер, мениджър, уикенд.' }
  ],
  'math12-pokazatelna-logaritmichna': [

function loadKonspekt() {
  const data = KONSPEKTI[lessonKey];
  if (!data) {
    document.getElementById('konspekt-loading').style.display = 'none';
    document.getElementById('konspekt-error').style.display = '';
    return;
  }
  renderKonspekt(data);
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ══════════════════════════════════════════════════════════════════
//  renderSachinenie
// ══════════════════════════════════════════════════════════════════
function renderSachinenie() {
  const el = document.getElementById('tab-sachinenie');
  const hasSubmitted = [0, 1, 2, 3, 4].some(i => {
    try { return JSON.parse(localStorage.getItem(`essay_${lessonKey}_t${i}`) || '[]').length > 0; }
    catch { return false; }
  });
  const d = SAMPLE_ESSAYS[lessonKey];
  if (!d) {
    el.innerHTML = '<div class="konspekt-section"><p style="color:var(--muted);font-size:14px;">Примерно съчинение не е налично за този урок.</p></div>';
    return;
  }
  if (!hasSubmitted) {
    el.innerHTML = `
      <div class="konspekt-section">
        <div class="ks-essay-locked">
          <div class="ks-essay-locked-icon">🔒</div>
          <div class="ks-essay-locked-title">Предай първо собствено съчинение</div>
          <div class="ks-essay-locked-sub">Примерното отлично съчинение се отключва след като напишеш поне едно съчинение за тази творба. Опитай се сам/а, после виж как изглежда отличен отговор.</div>
          <a href="/lessons/sachine.html?key=${lessonKey}" draggable="false" style="display:inline-block;padding:11px 24px;background:var(--accent);color:#fff;border-radius:12px;font-weight:700;font-size:14px;text-decoration:none;">Напиши съчинение →</a>
        </div>
      </div>`;
    return;
  }
  el.innerHTML = `
    <div class="konspekt-section">
      <div class="ks-label"><span class="ks-label-icon">✍️</span> Примерно отлично съчинение</div>
      <div class="ks-essay-topic">Тема: ${esc(d.topic)}</div>
      <span class="ks-essay-badge">★ Примерна оценка: 22–24 / 24</span>
      <div class="ks-essay-body">${d.paragraphs.map(p => `<p>${esc(p)}</p>`).join('')}</div>
    </div>
    <div class="konspekt-section">
      <div class="ks-label"><span class="ks-label-icon">📌</span> Защо е отлично?</div>
      <ul class="ks-list">${d.whyGood.map(w => `<li>${esc(w)}</li>`).join('')}</ul>
    </div>`;
}

// ══════════════════════════════════════════════════════════════════
//  renderTips
// ══════════════════════════════════════════════════════════════════
function renderTips() {
  const el = document.getElementById('tab-tips');
  const subject = lessonKey.startsWith('bel') ? 'bel'
    : lessonKey.startsWith('bio') ? 'bio'
    : lessonKey.startsWith('chem') ? 'chem'
    : 'math';
  const categories = TIPS[subject];
  if (!categories?.length) {
    el.innerHTML = '<div class="konspekt-section"><p style="color:var(--muted);font-size:14px;">Типс и трикс не са налични за този предмет.</p></div>';
    return;
  }
  el.innerHTML = categories.map(cat => `
    <div class="konspekt-section">
      <div class="ks-label"><span class="ks-label-icon">${cat.icon}</span> ${esc(cat.title)}</div>
      <ul class="ks-list">${cat.tips.map(t => `<li>${esc(t)}</li>`).join('')}</ul>
    </div>`).join('');
}

document.getElementById('btn-retry-konspekt')?.addEventListener('click', () => loadKonspekt(true));

// Start — изчакай auth token преди да извикаш API
if (lessonKey) {
  if (window.__authReady) {
    loadKonspekt();
  } else {
    window.addEventListener('auth-ready', () => loadKonspekt(), { once: true });
  }
} else {
  document.getElementById('konspekt-loading').style.display = 'none';
  document.getElementById('konspekt-error').style.display = '';
}
</script>
