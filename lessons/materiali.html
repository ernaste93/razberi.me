<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Допълнителни материали — Разбери.Ме</title>
  <link rel="icon" type="image/png" href="/logos/tab_transparent.png?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #1e3a5f;
      --accent2: #2d5a9e;
      --soft: #f4f6fb;
      --line: #e2e8f0;
      --text: #1a2233;
      --muted: #64748b;
      --gold: #E8A020;
      --green: #16a34a;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    a, button { -webkit-user-drag: none; user-select: none; }
    body { font-family: 'Nunito Sans', sans-serif; background: var(--soft) url('/logos/background.png') center top / cover fixed; color: var(--text); min-height: 100vh; }

    /* ── Topbar ── */
    .topbar {
      background: #fff;
      border-bottom: 1px solid var(--line);
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 14px;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .topbar-back { color: var(--muted); text-decoration: none; font-size: 13px; font-weight: 700; user-select: none; -webkit-user-drag: none; cursor: pointer; }
    .topbar-back:hover { color: var(--accent); }
    .topbar-sep { color: var(--line); }
    .topbar-title { font-size: 14px; font-weight: 800; color: var(--text); flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* ── Material tabs ── */
    .mat-tabs {
      background: #fff;
      border-bottom: 1px solid var(--line);
      padding: 0 24px;
      display: flex;
      gap: 4px;
      overflow-x: auto;
    }
    .mat-tab {
      padding: 14px 18px;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      border: none;
      background: none;
      cursor: pointer;
      border-bottom: 3px solid transparent;
      white-space: nowrap;
      font-family: inherit;
      transition: color .15s;
    }
    .mat-tab:hover { color: var(--accent); }
    .mat-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
    .mat-tab.soon { opacity: .45; cursor: default; pointer-events: none; }

    /* ── Main ── */
    .main { max-width: 760px; margin: 0 auto; padding: 32px 20px 80px; }

    /* ── Loading ── */
    .loading-wrap { text-align: center; padding: 60px 0; }
    .loading-icon { font-size: 40px; display: inline-block; animation: pulse 1.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity:.4; } 50% { opacity:1; } }
    .loading-text { font-size: 14px; color: var(--muted); margin-top: 14px; font-weight: 600; }

    /* ── Конспект sections ── */
    .konspekt-section {
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 20px 22px;
      margin-bottom: 14px;
    }
    .ks-label {
      font-size: 11px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .07em;
      color: var(--accent);
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .ks-label-icon { font-size: 15px; }

    /* Summary */
    .ks-summary { font-size: 14px; line-height: 1.75; color: var(--text); }

    /* Bullet list */
    .ks-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .ks-list li {
      font-size: 14px;
      line-height: 1.6;
      color: var(--text);
      display: flex;
      gap: 10px;
      align-items: flex-start;
    }
    .ks-list li::before {
      content: '•';
      color: var(--accent);
      font-weight: 800;
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* Themes chips */
    .ks-chips { display: flex; flex-wrap: wrap; gap: 8px; }
    .ks-chip {
      padding: 6px 14px;
      background: #e8edf7;
      color: var(--accent);
      border-radius: 99px;
      font-size: 13px;
      font-weight: 700;
    }

    /* Literary devices */
    .ks-devices { display: flex; flex-direction: column; gap: 10px; }
    .ks-device { display: flex; flex-direction: column; gap: 3px; }
    .ks-device-name { font-size: 13px; font-weight: 800; color: var(--text); }
    .ks-device-example { font-size: 13px; color: var(--muted); font-style: italic; line-height: 1.5; }

    /* Quotes */
    .ks-quotes { display: flex; flex-direction: column; gap: 10px; }
    .ks-quote {
      border-left: 3px solid var(--accent);
      padding: 8px 14px;
      font-size: 14px;
      font-style: italic;
      line-height: 1.6;
      color: var(--text);
      background: var(--soft);
      border-radius: 0 8px 8px 0;
    }

    /* Exam points */
    .ks-exam { display: flex; flex-direction: column; gap: 8px; }
    .ks-exam-item {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      font-size: 14px;
      line-height: 1.6;
    }
    .ks-exam-num {
      background: var(--accent);
      color: #fff;
      border-radius: 99px;
      width: 20px;
      height: 20px;
      font-size: 11px;
      font-weight: 800;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    /* Refresh button */
    .btn-refresh {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 18px;
      background: var(--soft);
      border: 1.5px solid var(--line);
      border-radius: 99px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      margin-top: 8px;
      transition: border-color .15s, color .15s;
    }
    .btn-refresh:hover { border-color: var(--accent); color: var(--accent); }

    /* Coming soon tab content */
    .coming-soon {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }
    .coming-soon-icon { font-size: 40px; margin-bottom: 14px; }
    .coming-soon-title { font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .coming-soon-sub { font-size: 13px; line-height: 1.6; }

    /* Речник */
    .ks-terms { display: flex; flex-direction: column; gap: 14px; }
    .ks-term-card { background: var(--soft); border-radius: 12px; padding: 14px 16px; }
    .ks-term-name { font-size: 14px; font-weight: 800; color: var(--accent); margin-bottom: 4px; }
    .ks-term-def { font-size: 13px; color: var(--text); line-height: 1.6; margin-bottom: 6px; }
    .ks-term-example { font-size: 13px; color: var(--muted); font-style: italic; line-height: 1.5; }

    /* Устен изпит */
    .ks-questions { display: flex; flex-direction: column; gap: 10px; }
    .ks-q-card { border: 1.5px solid var(--line); border-radius: 12px; overflow: hidden; }
    .ks-q-head {
      display: flex; align-items: flex-start; gap: 10px;
      padding: 13px 16px; cursor: pointer; background: #fff;
      font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.5;
    }
    .ks-q-num {
      background: var(--accent); color: #fff; border-radius: 99px;
      width: 22px; height: 22px; font-size: 11px; font-weight: 800;
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .ks-q-toggle { margin-left: auto; color: var(--muted); font-size: 12px; flex-shrink: 0; transition: transform .15s; }
    .ks-q-card.open .ks-q-toggle { transform: rotate(180deg); }
    .ks-q-answer {
      display: none; padding: 0 16px 14px 48px; font-size: 13px;
      color: var(--muted); line-height: 1.6; background: #fff;
    }
    .ks-q-card.open .ks-q-answer { display: block; }
    .ks-q-answer-label { font-weight: 800; color: var(--green); margin-bottom: 4px; display: block; }

    /* Сравнения */
    .ks-compare-head {
      display: flex; align-items: center; gap: 10px; margin-bottom: 14px;
      padding: 12px 16px; background: #e8edf7; border-radius: 12px;
    }
    .ks-compare-vs { font-size: 12px; font-weight: 800; color: var(--accent); }
    .ks-compare-work { font-size: 14px; font-weight: 800; color: var(--text); }
    .ks-compare-cols { display: flex; flex-direction: column; gap: 10px; }
    .ks-compare-col-label { font-size: 13px; font-weight: 800; color: var(--accent); margin: 14px 0 8px; }
  /* Примерно съчинение */
  .ks-essay-locked { text-align: center; padding: 36px 20px; }
  .ks-essay-locked-icon { font-size: 44px; margin-bottom: 10px; }
  .ks-essay-locked-title { font-size: 17px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
  .ks-essay-locked-sub { font-size: 13px; color: var(--muted); margin-bottom: 20px; line-height: 1.6; }
  .ks-essay-topic { font-size: 13px; color: var(--muted); font-style: italic; margin-bottom: 14px; line-height: 1.6; }
  .ks-essay-badge { display: inline-flex; align-items: center; gap: 5px; background: var(--green); color: #fff; padding: 4px 12px; border-radius: 99px; font-size: 12px; font-weight: 800; margin-bottom: 16px; }
  .ks-essay-body p { font-size: 14px; color: var(--text); line-height: 1.85; margin-bottom: 14px; }
  /* Типс и трикс */
  .ks-tips-intro { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 0; }
  .konspekt-section a, .ks-essay-locked a { -webkit-user-drag: none; user-select: none; }

    /* Picker filters */
    .picker-filters { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 24px; }
    .picker-filter {
      padding: 7px 18px;
      border-radius: 99px;
      border: 1.5px solid var(--line);
      background: #fff;
      font-family: inherit;
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      cursor: pointer;
      transition: border-color .15s, color .15s, background .15s;
    }
    .picker-filter:hover { border-color: var(--accent); color: var(--accent); }
    .picker-filter.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* Error */
    .error-wrap { text-align: center; padding: 40px 0; }
    .error-text { font-size: 14px; color: var(--muted); margin-bottom: 16px; }
  </style>
</head>

<script>
const params    = new URLSearchParams(location.search);
const lessonKey = params.get('key') || '';

// ── Tab switching ──
const tabRenderers = { rechnik: renderRechnik, usten: renderUsten, sravnenie: renderSravnenie, sachinenie: renderSachinenie, tips: renderTips };
const tabRendered = {};
document.querySelectorAll('.mat-tab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.mat-tab').forEach(t => t.classList.remove('active'));
    btn.classList.add('active');
    document.querySelectorAll('[id^="tab-"]').forEach(t => t.style.display = 'none');
    document.getElementById('tab-' + btn.dataset.tab).style.display = '';
    const tab = btn.dataset.tab;
    if (tabRenderers[tab] && !tabRendered[tab]) {
      tabRenderers[tab]();
      tabRendered[tab] = true;
    }
  });
});

// ── Lesson title map (for topbar) ──
const LESSON_TITLES = {
  'bel12-debelyanov-lyubov':              'Дебелянов — „Аз искам да те помня все така"',
  'bel12-fotev-lyubov':                   'Фотев — „Колко си хубава!"',
  'bel12-dubarova-posveshenie':           'Дубарова — „Посвещение"',
  'bel12-vaptsarov-vyara':                'Вапцаров — „Вяра"',
  'bel12-dalchev-molitva':               'Далчев — „Молитва"',
  'bel12-elin-pelin-spasova-mogila':      'Елин Пелин — „Спасова могила"',
  'bel12-elin-pelin-vetrena-melnitsa':    'Елин Пелин — „Ветрената мелница"',
  'bel12-yovkov-pesenta-na-koleletata':   'Йовков — „Песента на колелетата"',
  'bel12-paskov-balada':                  'Пасков — „Балада за Георг Хених"',

  'bel12-bagryana-potomka':               'Багряна — „Потомка"',

  'bel11-vazov-pod-igoto':               'Вазов — „Под игото"',
  'bel11-vazov-epopea':                  'Вазов — „Епопея на забравените"',

  'bel11-slaveykov-cis-moll':            'П. П. Славейков — „Cis moll"',

  'bel11-stratiev-sako':                 'Стратиев — „Сако от велур"',
  'bel11-smirnanski-yohan':              'Смирненски — „Йохан"',
  'bel11-vaptsarov-istoriya':            'Вапцаров — „История"',
  'bel11-radichkov-nezhnata-spirala':    'Радичков — „Нежната спирала"',

  'bio11-endokrinna-sistema':            'Ендокринна система — хормони, жлези, регулация',

  'chem11-himichna-vrazka':             'Химична връзка — ковалентна, йонна, метална, водородна',
  'chem11-rastvori':                    'Разтвори и рН — дисоциация, рН скала, киселинност',
  'chem11-okislenie-redukciya':         'Окислително-редукционни реакции',
  'chem11-neorganichni-saedinenia':     'Неорганични съединения — оксиди, киселини, основи, соли',

  // ── Математика 12 клас ──

  'math12-veroyatnosti':               'Вероятности',
  // ── БЕЛ 12 клас — езикови теми ──
  'bel12-pravopis':                    'Правопис',
  'bel12-punktuatsiya':                'Пунктуация',
  'bel12-gramatika':                   'Граматика',
  'bel12-leksika':                     'Лексика',
  // ── Математика 12 клас — допълнителни теми ──
  'math12-pokazatelna-logaritmichna':  'Показателна и логаритмична функция',
  'math12-progresii':                  'Прогресии',
};

// ── Picker (без ?key=) ──
if (!lessonKey) {
  document.getElementById('mat-tabs-nav').style.display = 'none';
  document.getElementById('mat-main').style.display = 'none';
  document.getElementById('back-link').href = '/urotsi.html';
  document.getElementById('topbar-title').textContent = 'Материали';
  document.getElementById('picker').style.display = 'block';

  const GROUPS = [
    { label: 'БЕЛ — 12 клас', prefix: 'bel12' },
    { label: 'БЕЛ — 11 клас', prefix: 'bel11' },
    { label: 'Биология',       prefix: 'bio' },
    { label: 'Химия',          prefix: 'chem' },
    { label: 'Математика',     prefix: 'math' },
  ];

  document.getElementById('picker-content').innerHTML = GROUPS.map(g => {
    const lessons = Object.entries(LESSON_TITLES).filter(([k]) => k.startsWith(g.prefix));
    if (!lessons.length) return '';
    return `
      <div class="picker-group" data-prefix="${g.prefix}" style="margin-bottom:28px;">
        <div style="font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#94a3b8;margin-bottom:10px;">${g.label}</div>
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px;">

    { term: 'Народна реч', definition: 'Автентичен говорим език на народа, използван в диалозите.', example: 'Диалогът на Андрешко е предаден с автентична народна интонация и лексика.' },
    { term: 'Морална победа', definition: 'Победа, оценявана не по юридическия, а по моралния критерий.', example: 'Андрешко „нарушава закона", но неговата постъпка е морално оправдана от читателя.' },
    { term: 'Социална критика', definition: 'Художествено изобличаване на обществени несправедливости.', example: 'Разказът критикува несправедливата конфискация на последния добитък на бедняка.' }

  'bel11-talev-zhelezniyat-svetilnik': [
    { term: 'Историческа сага', definition: 'Роман, обхващащ дълъг период от историята на семейство или народ.', example: '„Железният светилник" проследява три поколения на рода Глаушеви.' },
    { term: 'Национална идентичност', definition: 'Самоосъзнаването на принадлежност към народ, изразено в език, традиции и историческа памет.', example: 'Борбата за образование на роден език е борба за национална идентичност.' },
    { term: 'Символ на рода', definition: 'Художествен образ, въплъщаващ устойчивостта и приемствеността на рода/народа.', example: 'Светилникът символизира неугасващия дух на рода Глаушеви.' },
    { term: 'Психологически роман', definition: 'Роман с акцент върху вътрешния живот и психологическото развитие на персонажите.', example: 'Вътрешните конфликти на Ния са изградени с психологическа прецизност.' },
    { term: 'Диалектна автентичност', definition: 'Предаване на говора на персонажите с характерни езикови черти на определена общност.', example: 'Македонският говор на героите придава автентичност на пространството.' },
    { term: 'Саможертва за каузата', definition: 'Доброволен отказ от лично щастие в полза на обществена цел.', example: 'Героите на Талев жертват личното за националното — типичен мотив в романа.' }

  'bel11-stanev-kradetsat': [
    { term: 'Лирическа повест', definition: 'Кратко прозаично произведение с подчертан лиричен тон и поетическа образност.', example: '„Крадецът на праскови" съчетава реалистичен разказ с лирическа красота на описанията.' },
    { term: 'Невъзможна любов', definition: 'Любов, обречена поради исторически, социални или морални пречки.', example: 'Еньо и Иляна не могат да бъдат заедно — той е окупатор, тя — съпруга на пленник.' },
    { term: 'Нравствен конфликт', definition: 'Вътрешна борба между две морални ценности или задължения.', example: 'Еньо е разкъсан между любовта и честта — знае, че прегрешава.' },
    { term: 'Символика на плода', definition: 'Употреба на плод (праскови) като символ на желанието, греха или красотата.', example: 'Прасковите са едновременно реален обект и символ на забраненото.' },
    { term: 'Сетивен образ', definition: 'Образ, въздействащ на сетивата — вкус, мирис, допир, цвят.', example: 'Ароматът и цветът на прасковите изграждат атмосфера на чувствена красота.' },
    { term: 'Историческа рамка', definition: 'Реалните исторически обстоятелства, в чиито граници протича действието.', example: 'Войната е историческата рамка, правеща любовта невъзможна.' }
  ],
  'bel11-stratiev-sako': [
    { term: 'Абсурдна драма', definition: 'Театрален жанр, изобразяващ безсмислени, нелогични ситуации, за да разкрие абсурда на съществуването или на системата.', example: '„Сако от велур" е класически пример за абсурдна драма в България.' },
    { term: 'Алегория', definition: 'Художествен образ/ситуация с двойно значение — буквален и преносен план.', example: 'Сакото е алегория за всяко желание, осуетено от бюрократичната система.' },
    { term: 'Бюрокрация (в литературен контекст)', definition: 'Безлична, тромава система от правила, деперсонализираща индивида.', example: 'Героят е затрупан от безсмислени процедури — типично за Кафка и Стратиев.' },
    { term: 'Гротеска', definition: 'Нарочно преувеличение до нелепост, карикатурност на действителността.', example: 'Абсурдните изисквания на бюрокрацията са доведени до гротескна крайност.' },
    { term: 'Официозен език', definition: 'Стерилен, формален административен стил, лишен от личност и човечност.', example: 'Бюрократът говори с официозен жаргон — символ на безличната система.' },
    { term: 'Открит финал', definition: 'Завършек, при който конфликтът не е разрешен — абсурдът продължава.', example: 'Пиесата завършва без развръзка — системата не е победена, кръгът продължава.' }
  ],
  'bel11-smirnanski-yohan': [
    { term: 'Антивоенна литература', definition: 'Произведения, разобличаващи войната като трагедия и унищожение на човешкия живот.', example: '„Йохан" е антивоенен текст — войникът е жертва, не герой.' },
    { term: 'Хуманизъм', definition: 'Философска и художествена позиция, поставяща човека и неговото достойнство в центъра.', example: 'Смирненски съчувства на Йохан независимо от неговата националност.' },
    { term: 'Скица', definition: 'Кратка прозаична творба, фиксираща един образ, миг или характер.', example: '„Йохан" е изграден като скица — концентриран, без излишни детайли.' },
    { term: 'Самота (мотив)', definition: 'Художествен мотив за изолацията на човека от общността и дома.', example: 'Йохан е самотен — откъснат от дома, невидян от другите.' },

    { term: 'Социалистически хуманизъм', definition: 'Хуманистична позиция, свързана с идеята за класовата солидарност — всички войници са жертви на системата.', example: 'Смирненски гледа на Йохан като на пролетарий-жертва, а не като на враг.' }

  'bel11-vaptsarov-istoriya': [

    { term: 'Алтернативна история', definition: 'Художествена идея за история, написана от гледната точка на обикновения човек, не на великите.', example: 'Вапцаров декларира, че „нашата история" е историята на труда и борбата.' },
    { term: 'Декларативен тон', definition: 'Тон на категорично твърдение и публично заявяване на позиция.', example: '„Ние вярваме" — кратко, категорично, без колебание.' },
    { term: 'Светска вяра', definition: 'Вяра в хора, труд и бъдеще, а не в Бог или свръхестествено.', example: 'Вапцаровото „вярвам" е насочено към колектива и прогреса.' },
    { term: 'Колективна идентичност', definition: 'Самоопределяне като член на група/клас, а не само като индивид.', example: '„Ние" е по-важно от „аз" — работническата класа е говорителят.' },
    { term: 'Интертекстуалност', definition: 'Диалог между творби — „История" диалогизира с официалните исторически наративи, като ги оспорва.', example: 'Противопоставянето на „нашата история" с официалната е форма на интертекстуален диалог.' }
  ],
  'bel11-radichkov-nezhnata-spirala': [
    { term: 'Магически реализъм', definition: 'Литературен метод, при който реалистичното и фантастичното съществуват едновременно без ясна граница.', example: 'В „Нежната спирала" реалните спомени и митологичните образи се преплитат.' },
    { term: 'Митопоетика', definition: 'Поетично мислене, натоварващо природата и ежедневието с митологичен смисъл.', example: 'Природата в Радичков не е просто фон, а живо митологично пространство.' },
    { term: 'Есеистичност', definition: 'Белег за жанрово смесване — прозата е пронизана от авторски размисли и отклонения.', example: 'Радичков прекъсва разказа с философски отклонения — есеистично начало.' },

    { term: 'Лирическа проза', definition: 'Проза с поетически качества — ритъм, образност, емоционалност.', example: 'Описанията на природата в Радичков имат поетическа красота и музикалност.' },
    { term: 'Хумор и тъга в едно', definition: 'Едновременното присъствие на смешното и тъжното — типично за Радичков.', example: 'Нелепите ситуации са разказани с усмивка, но носят дълбока тъга.' }

  'bio11-kletkata': [
    { term: 'Клетъчна теория', definition: 'Теория, формулирана от Шлайден, Шван и Вирхов: всички организми се състоят от клетки; клетката е основна структурна и функционална единица; всяка клетка произлиза от клетка.', example: 'Бактерията е прокариотна клетка; чернодробната клетка е еукариотна — и двете потвърждават теорията.' },
    { term: 'Прокариот', definition: 'Организъм без оформено ядро и мембранни органели; ДНК е в нуклеоид в цитоплазмата.', example: 'Бактерии и архея са прокариоти — сред най-древните форми на живот.' },
    { term: 'Еукариот', definition: 'Организъм с оформено ядро, ограденo с ядрена мембрана, и с мембранни органели.', example: 'Животинска, растителна, гъбна клетка — всички са еукариотни.' },
    { term: 'Митохондрия', definition: 'Органела с двойна мембрана, в която се осъществява аеробното клетъчно дишане и се синтезира АТФ.', example: 'Мускулните клетки имат много митохондрии заради високата нужда от АТФ.' },
    { term: 'Клетъчна мембрана', definition: 'Двоен фосфолипиден пласт с белтъци, регулиращ транспорта на вещества между клетката и средата.', example: 'Глюкозата влиза в клетката чрез транспортни белтъци в мембраната.' },
    { term: 'Осмоза', definition: 'Дифузия на вода през полупропусклива мембрана от зона с ниска концентрация на разтворено вещество към зона с висока.', example: 'При поставяне на клетка в хипертоничен разтвор водата излиза — клетката се свива (плазмолиза).' },
    { term: 'Апарат на Голджи', definition: 'Органела, модифицираща, сортираща и опакова белтъци за секреция или вграждане в мембраната.', example: 'Инсулинът е обработен и опакован в апарата на Голджи преди секреция.' }
  ],
  'bio11-fotosinteza': [
    { term: 'Хлоропласт', definition: 'Органела на растителните клетки с двойна мембрана, тилакоиди и строма, в която протича фотосинтезата.', example: 'Листата са зелени заради хлорофила в хлоропластите.' },
    { term: 'Хлорофил', definition: 'Зеленият пигмент в хлоропластите, абсорбиращ светлина (предимно червена и синьо-виолетова) за задвижване на фотосинтезата.', example: 'Есента хлорофилът се разгражда и листата стават жълто-кафяви.' },
    { term: 'Фотолиза на водата', definition: 'Разпадане на водни молекули под влияние на светлина в светлинната фаза; отделя O₂ и освобождава протони и електрони.', example: '2H₂O → 4H⁺ + 4e⁻ + O₂ — кислородът е страничен продукт на фотосинтезата.' },
    { term: 'Цикъл на Калвин', definition: 'Тъмна фаза на фотосинтезата в стромата; CO₂ се фиксира с помощта на АТФ и НАДФН и се синтезира глюкоза.', example: 'Без АТФ от светлинната фаза цикълът на Калвин не може да произведе глюкоза.' },
    { term: 'АТФ (аденозинтрифосфат)', definition: 'Универсален носител на енергия в клетката; синтезира се при фотосинтеза и дишане, използва се за всички клетъчни процеси.', example: 'АТФ → АДФ + Pи + енергия — реакцията захранва мускулното съкращение.' },
    { term: 'Лимитиращ фактор', definition: 'Факторът, чието ниво ограничава скоростта на процеса; при фотосинтеза: интензивност на светлина, CO₂, температура.', example: 'В оранжерия с допълнително CO₂ растенията растат по-бързо — CO₂ е бил лимитиращ фактор.' }
  ],
  'bio11-dishane': [
    { term: 'Гликолиза', definition: 'Първи етап на клетъчното дишане в цитоплазмата; 1 глюкоза → 2 пирувата + 2 АТФ (нетно) + 2 НАДН.', example: 'Гликолизата е единственият начин за получаване на АТФ при анаеробни условия.' },
    { term: 'Цикъл на Кребс', definition: 'Втори етап на аеробното дишане в митохондриалния матрикс; пируватите се окисляват напълно до CO₂, произвеждайки НАДН, ФАДН₂ и АТФ.', example: 'Цикълът на Кребс отделя CO₂ — газът, който издишваме.' },
    { term: 'Окислително фосфорилиране', definition: 'Трети етап на аеробното дишане на вътрешната митохондриална мембрана; НАДН и ФАДН₂ задвижват дихателна верига за синтез на АТФ.', example: 'Около 34 АТФ от 38 общо се синтезират при окислителното фосфорилиране.' },
    { term: 'Ферментация', definition: 'Анаеробно разграждане на органични молекули без участие на O₂; произвежда малко АТФ и лактат или етанол.', example: 'Дрождите ферментират захари до етанол и CO₂ при производство на вино.' },
    { term: 'Дихателна верига', definition: 'Серия от белтъчни комплекси на вътрешната митохондриална мембрана, трансфериращи електрони и изграждащи протонен градиент за АТФ-синтаза.', example: 'Цианидът блокира дихателната верига → клетките не могат да синтезират АТФ → смърт.' },
    { term: 'НАД⁺/НАДН', definition: 'Коензим носител на електрони и водород в катаболните пътища; НАДН се окислява в дихателната верига за производство на АТФ.', example: 'При гликолизата НАД⁺ се редуцира до НАДН — натрупаният НАДН захранва дихателната верига.' }
  ],
  'bio11-nervna-sistema': [
    { term: 'Неврон', definition: 'Основна структурна и функционална единица на нервната система; притежава тяло, дендрити и аксон.', example: 'Двигателните неврони предават импулси от гръбначния мозък към мускулите.' },
    { term: 'Акционен потенциал', definition: 'Електрически сигнал (нервен импулс), генериран при деполяризация на невронната мембрана чрез бързо навлизане на Na⁺.', example: 'При докосване на горещ предмет акционен потенциал достига мозъка за милисекунди.' },
    { term: 'Синапс', definition: 'Място на контакт между два неврона или между неврон и ефектор; предаването е химично (невротрансмитер) или електрично.', example: 'Ацетилхолинът е невротрансмитерът в синапса между двигателен неврон и мускулна клетка.' },
    { term: 'Рефлекс', definition: 'Автоматична, неволна реакция на организма на дразнител, протичаща по рефлексна дъга.', example: 'Коленният рефлекс (рефлекс на разтягане) се проверява при неврологичен преглед.' },
    { term: 'Миелинова обвивка', definition: 'Обвивка от миелин около аксона, образувана от Schwann клетки; ускорява провеждането на импульса чрез скокообразна проводимост.', example: 'При множествена склероза миелинът се разрушава → нарушено провеждане на импулси.' },
    { term: 'Автономна нервна система', definition: 'Дял на ПНС, регулиращ несъзнателни функции (сърдечен ритъм, храносмилане, дишане); включва симпатикус и парасимпатикус.', example: 'При стрес симпатикусът ускорява пулса; парасимпатикусът го забавя в покой.' }
  ],
  'bio11-endokrinna-sistema': [
    { term: 'Хормон', definition: 'Химическа сигнална молекула, произведена от ендокринна жлеза и пренасяна с кръвта до прицелните органи, където предизвиква специфичен ефект.', example: 'Инсулинът е хормон, сигнализиращ на клетките да поемат глюкоза от кръвта.' },
    { term: 'Хипофиза', definition: 'Главна ендокринна жлеза, контролираща другите жлези чрез тропни хормони; свързана с хипоталамуса.', example: 'Тиреоидностимулиращият хормон (ТСХ) от хипофизата стимулира щитовидната жлеза.' },
    { term: 'Обратна отрицателна връзка', definition: 'Механизъм, при който повишеното ниво на хормона потиска собственото му производство, поддържайки хомеостаза.', example: 'Высок тироксин потиска секрецията на ТСХ от хипофизата.' },
    { term: 'Инсулин', definition: 'Хормон на β-клетките на панкреаса; понижава кръвната захар, стимулирайки поемането на глюкоза от клетките.', example: 'При диабет тип 1 инсулинът не се произвежда → кръвната захар остава висока.' },
    { term: 'Адреналин', definition: 'Хормон на надбъбречната медула; задейства реакцията „бий се или бягай" — ускорява пулса, повишава кръвната захар.', example: 'Адреналинът се освобождава при силен стрес или опасност.' },
    { term: 'Хомеостаза', definition: 'Поддържане на постоянна вътрешна среда на организма (температура, рН, кръвна захар) въпреки промените в средата.', example: 'Инсулинът и глюкагонът поддържат кръвната захар в граници 4–6 mmol/L.' }
  ],
  'bio11-razmnozhavane': [
    { term: 'Митоза', definition: 'Клетъчно делене на соматичните клетки: 1 клетка → 2 дъщерни с еднакъв хромозомен набор (2n → 2n); основа на растежа и регенерацията.', example: 'При зарастване на рана кожните клетки се делят чрез митоза.' },
    { term: 'Мейоза', definition: 'Специално клетъчно делене в половите органи: 1 диплоидна клетка → 4 хаплоидни гамети (2n → n); въвежда генетично разнообразие.', example: 'Спермиите и яйцеклетките се образуват чрез мейоза.' },
    { term: 'Кросинговър', definition: 'Обмен на хомоложни сегменти между несестрински хроматиди при профаза I на мейозата; генетична рекомбинация.', example: 'Кросинговърът създава нови комбинации от алели → генетично разнообразие в потомството.' },
    { term: 'Гамета', definition: 'Хаплоидна полова клетка (сперматозоид или яйцеклетка), образувана чрез мейоза.', example: 'При оплождане 2 гамети (n + n) → зигота (2n).' },
    { term: 'Диплоиден/Хаплоиден', definition: 'Диплоиден (2n): клетка с двоен набор хромозоми; хаплоиден (n): с единичен набор.', example: 'Човешките соматични клетки са 2n = 46; гаметите са n = 23.' },
    { term: 'Партеногенеза', definition: 'Развитие на яйцеклетка без оплождане; форма на безполово размножаване.', example: 'Пчелните търтеи се развиват от неоплодени яйца чрез партеногенеза.' }
  ],

  // ── Химия 11 клас ──
  'chem11-stroezh-atoma': [
    { term: 'Атомен номер (Z)', definition: 'Броят на протоните в ядрото на атома; определя химичния елемент и неговото място в периодичната система.', example: 'Na има Z = 11 → 11 протона в ядрото и 11 електрона.' },
    { term: 'Изотоп', definition: 'Атоми на един и същ елемент с еднакъв Z, но различен брой неутрони (различно A).', example: '¹²C (6p, 6n) и ¹⁴C (6p, 8n) са изотопи на въглерода.' },
    { term: 'Орбитала', definition: 'Тримерна зона около ядрото, в която е максималната вероятност за намиране на електрона; видове: s, p, d, f.', example: 's-орбиталата е сферична; p-орбиталата е с форма на гантел.' },
    { term: 'Електронна конфигурация', definition: 'Разпределението на електроните в подобвивки и орбитали; записва се като 1s², 2s², 2p⁶, ...', example: 'Na: 1s²2s²2p⁶3s¹ → 1 валентен електрон → метал от I група.' },
    { term: 'Електроотрицателност', definition: 'Мярка за способността на атома да привлича електрони в ковалентна връзка; нараства в периода, намалява в групата.', example: 'F има най-висока електроотрицателност (4.0 по Полинг).' },
    { term: 'Йонизационна енергия', definition: 'Минималната енергия, необходима за отстраняване на електрон от неутрален атом в газова фаза.', example: 'Na има ниска йонизационна енергия → лесно отдава 1е⁻ → Na⁺.' }
  ],
  'chem11-himichna-vrazka': [
    { term: 'Ковалентна връзка', definition: 'Химична връзка чрез споделяне на една или повече двойки електрони между два атома (обикновено неметали).', example: 'H₂O: кислородът споделя по 1е⁻ с всеки водороден атом — 2 ковалентни О–Н връзки.' },
    { term: 'Йонна връзка', definition: 'Електростатично привличане между разнозаредени йони, образувани при прехвърляне на електрони от метал към неметал.', example: 'NaCl: Na⁺ и Cl⁻ се привличат; кристалната решетка е много стабилна.' },
    { term: 'Полярност на връзката', definition: 'Неравномерно разпределение на електронната плътност в ковалентна връзка заради разлика в електроотрицателностите.', example: 'В H–Cl: Cl е по-електроотрицателен → δ⁻ на Cl, δ⁺ на H → полярна връзка.' },
    { term: 'Водородна връзка', definition: 'Слаба привлекателна сила между водороден атом, свързан с електроотрицателен атом (O, N, F), и lone pair на съседен О, N или F.', example: 'Водата кипи при 100°C (вместо очакваните –80°C) заради водородни връзки.' },
    { term: 'Метална връзка', definition: 'Привличане между метални катиони и „море" от делокализирани електрони; отговорна за проводимостта и пластичността на металите.', example: 'Медта провежда ток заради свободно движещите се делокализирани електрони.' },
    { term: 'VSEPR теория', definition: 'Теория, предсказваща формата на молекулите въз основа на отблъскването между електронни двойки около централния атом.', example: 'NH₃: 3 връзващи + 1 несвързваща двойка → пирамидална форма, ъгъл ~107°.' }
  ],
  'chem11-rastvori': [
    { term: 'Електролит', definition: 'Вещество, което при разтваряне или стопяване се дисоциира на йони и провежда електрически ток.', example: 'NaCl е силен електролит — пълно дисоциира на Na⁺ и Cl⁻ в разтвор.' },
    { term: 'Степен на дисоциация (α)', definition: 'Съотношението между броя на дисоциирали молекули и общия брой молекули; α = 1 за силни, α << 1 за слаби електролити.', example: 'CH₃COOH: α ≈ 0.013 (1.3%) при 0.1 mol/L — слаб електролит.' },
    { term: 'рН', definition: 'Логаритмична мярка за концентрацията на H⁺ в разтвора: рН = –log[H⁺]; скала 0–14.', example: 'Стомашната киселина: рН ≈ 1.5–2; кръв: рН ≈ 7.4; сода: рН ≈ 12.' },
    { term: 'Хидролиза на соли', definition: 'Реакция на йони на солта с вода, водеща до кисела или основна среда.', example: 'CH₃COONa + H₂O → CH₃COOH + NaOH → основна среда (рН > 7).' },
    { term: 'Буферен разтвор', definition: 'Разтвор, поддържащ приблизително постоянно рН при добавяне на малки количества киселина или основа.', example: 'Кръвта (рН 7.35–7.45) е буферна система с HCO₃⁻/H₂CO₃.' },
    { term: 'Неутрализация', definition: 'Реакция между киселина и основа, при която H⁺ и OH⁻ се обединяват в H₂O; продуктите са сол и вода.', example: 'HCl + NaOH → NaCl + H₂O; нетно йонно уравнение: H⁺ + OH⁻ → H₂O.' }
  ],
  'chem11-okislenie-redukciya': [
    { term: 'Степен на окисление', definition: 'Условен заряд на атома в молекулата/йона, изчислен при допускане, че всички връзки са йонни.', example: 'В H₂O: O e –2, H е +1; в MnO₄⁻: Mn е +7.' },
    { term: 'Окисление', definition: 'Процес на отдаване на електрони от атом/йон/молекула; степента на окисление нараства.', example: 'Fe → Fe³⁺ + 3e⁻ — желязото се окислява (ражда ръжда).' },
    { term: 'Редукция', definition: 'Процес на приемане на електрони; степента на окисление намалява.', example: 'Cu²⁺ + 2e⁻ → Cu — медните йони се редуцират до метална мед.' },
    { term: 'Окислител', definition: 'Вещество, което приема електрони от редуктора и се редуцира; при реакцията СО му намалява.', example: 'O₂ е типичен окислител; KMnO₄, Cl₂, H₂SO₄ (конц.) — силни окислители.' },
    { term: 'Редуктор', definition: 'Вещество, което отдава електрони на окислителя и се окислява; при реакцията СО му нараства.', example: 'Металите (Fe, Zn, Al), H₂ и С са типични редуктори.' },
    { term: 'Електролиза', definition: 'Несамоволна редокс реакция, задействана от постоянен електрически ток; на катода — редукция, на анода — окисление.', example: 'Електролизата на NaCl разтвор дава Cl₂ (анод), H₂ (катод) и NaOH.' }
  ],
  'chem11-neorganichni-saedinenia': [
    { term: 'Основен оксид', definition: 'Оксид на метал, реагиращ с вода за образуване на основа или с киселина за сол + вода.', example: 'CaO + H₂O → Ca(OH)₂; CaO + H₂SO₄ → CaSO₄ + H₂O.' },
    { term: 'Киселинен оксид', definition: 'Оксид на неметал (или метал в висока степен на окисление), реагиращ с вода за киселина или с основа за сол + вода.', example: 'SO₃ + H₂O → H₂SO₄; CO₂ + 2NaOH → Na₂CO₃ + H₂O.' },
    { term: 'Амфотерен хидроксид', definition: 'Хидроксид, реагиращ и с киселини (като основа), и с основи (като киселина); типичен за Al, Zn, Cr.', example: 'Al(OH)₃ + 3HCl → AlCl₃ + 3H₂O; Al(OH)₃ + NaOH → NaAlO₂ + 2H₂O.' },
    { term: 'Неутрализация', definition: 'Реакция между киселина и основа; H⁺ + OH⁻ → H₂O; продукти: сол и вода.', example: 'H₂SO₄ + 2KOH → K₂SO₄ + 2H₂O.' },
    { term: 'Генетична връзка', definition: 'Последователност от превращения: Метал → Осн. оксид → Основа → Сол; Неметал → Кис. оксид → Киселина → Сол.', example: 'Na → Na₂O → NaOH → NaCl — генетична верига за натрий.' },
    { term: 'Качествена реакция', definition: 'Реакция за разпознаване (доказване) на определен йон чрез образуване на характерна утайка, цвят или газ.', example: 'Cl⁻ + AgNO₃ → AgCl (бяла утайка) — качествена реакция за хлориден йон.' }
  ],
  'chem11-skorost-ravnovesie': [
    { term: 'Скорост на реакция', definition: 'Промяната на концентрацията на реагент или продукт за единица време; v = Δc/Δt.', example: 'Удвояването на концентрацията на реагента може да удвои или учетвори скоростта.' },
    { term: 'Катализатор', definition: 'Вещество, ускоряващо реакцията, без да се изразходва; намалява активационната енергия.', example: 'Платината катализира реакцията на H₂ с O₂ при стайна температура.' },
    { term: 'Химично равновесие', definition: 'Динамично състояние, при което скоростта на правата реакция е равна на скоростта на обратната; концентрациите са постоянни.', example: 'N₂ + 3H₂ ⇌ 2NH₃ достига равновесие — и двете реакции протичат едновременно.' },
    { term: 'Константа на равновесие (Kc)', definition: 'Отношение на произведенията на равновесните концентрации на продуктите към тези на реагентите, в степени на стехиометричните коефициенти.', example: 'За N₂ + 3H₂ ⇌ 2NH₃: Kc = [NH₃]²/([N₂]·[H₂]³).' },
    { term: 'Принцип на Льо Шателие', definition: 'При промяна на условията (температура, налягане, концентрация) равновесието се измества в посока, намаляваща ефекта от промяната.', example: 'Повишаване на налягането при синтеза на амоняк измества равновесието надясно (по-малко молове газ).' },
    { term: 'Активационна енергия', definition: 'Минималната енергия, необходима за да започне химичната реакция; катализаторът я намалява.', example: 'Ензимите са биологични катализатори — намаляват значително активационната енергия на метаболитните реакции.' }
  ],

  // ── Математика 11 клас ──
  'math11-trigonometriya': [
    { term: 'Синус (sin α)', definition: 'В правоъгълен триъгълник: sin α = срещулежащ катет / хипотенуза. В единична окръжност: ординатата на точката.', example: 'sin 30° = 1/2; sin 90° = 1.' },
    { term: 'Косинус (cos α)', definition: 'В правоъгълен триъгълник: cos α = прилежащ катет / хипотенуза. В единична окръжност: абсцисата на точката.', example: 'cos 60° = 1/2; cos 0° = 1.' },
    { term: 'Тангенс (tg α)', definition: 'tg α = sin α / cos α; определен при cos α ≠ 0. Геометрично — наклонът на права, сключваща ъгъл α с оста Ox.', example: 'tg 45° = 1; tg 0° = 0.' },
    { term: 'Основно тригонометрично тъждество', definition: 'sin²α + cos²α = 1 за всяко α. Следствия: tg²α + 1 = 1/cos²α; ctg²α + 1 = 1/sin²α.', example: 'Ако sin α = 3/5, то cos²α = 1 − 9/25 = 16/25, cos α = ±4/5.' },
    { term: 'Тригонометрично уравнение', definition: 'Уравнение, в което неизвестната е аргумент на тригонометрична функция. Решава се чрез обратни функции и добавяне на периода.', example: 'sin x = 1/2 → x = π/6 + 2πn или x = 5π/6 + 2πn, n ∈ ℤ.' },
    { term: 'Редуцираща формула', definition: 'Формула, свеждаща тригонометрична функция от ъгъл (π/2 ± α, π ± α) до функция от α.', example: 'sin(π − α) = sin α; cos(π/2 − α) = sin α.' },
    { term: 'Формула за двоен ъгъл', definition: 'Изразява тригонометрична функция на 2α чрез функции на α: sin 2α = 2 sin α cos α; cos 2α = cos²α − sin²α.', example: 'sin 60° = sin(2·30°) = 2·(1/2)·(√3/2) = √3/2.' }
  ],
  'math11-pokazatelna-logaritmichna': [
    { term: 'Показателна функция', definition: 'f(x) = aˣ, a > 0, a ≠ 1. Дефинирана за всички x ∈ ℝ; при a > 1 е нарастваща, при 0 < a < 1 — намаляваща. Минава през (0,1).', example: 'f(x) = 2ˣ: f(3) = 8; f(−1) = 1/2.' },
    { term: 'Логаритъм', definition: 'log_a b = c означава aᶜ = b (a > 0, a ≠ 1, b > 0). Логаритъмът е показателят, на който трябва да се вдигне основата, за да се получи числото.', example: 'log₂ 8 = 3, защото 2³ = 8.' },
    { term: 'Натурален логаритъм (ln)', definition: 'Логаритъм с основа e ≈ 2,718 (число на Ойлер): ln x = log_e x. Широко използван в математиката и физиката.', example: 'ln e = 1; ln 1 = 0; ln e² = 2.' },
    { term: 'Десетичен логаритъм (lg)', definition: 'Логаритъм с основа 10: lg x = log₁₀ x. Използван в инженерни пресмятания и скали (рН, Рихтер).', example: 'lg 100 = 2; lg 1000 = 3; lg 1 = 0.' },
    { term: 'Свойства на логаритмите', definition: 'log_a(xy) = log_a x + log_a y; log_a(x/y) = log_a x − log_a y; log_a(xⁿ) = n·log_a x. Следват от свойствата на степените.', example: 'log₂ 12 = log₂ 4 + log₂ 3 = 2 + log₂ 3.' },
    { term: 'Смяна на основата', definition: 'log_a x = log_b x / log_b a. Позволява изчисляване на логаритми с произволна основа чрез lg или ln.', example: 'log₂ 5 = lg 5 / lg 2 ≈ 0,699/0,301 ≈ 2,32.' },
    { term: 'ОДЗ на логаритмична функция', definition: 'Аргументът на логаритъма трябва да е строго положителен: log_a f(x) е дефиниран само при f(x) > 0.', example: 'log₂(x − 3): ОДЗ е x − 3 > 0, т.е. x > 3.' }
  ],
  'math11-kvadratni-neravenstva': [
    { term: 'Квадратно неравенство', definition: 'Неравенство от вида ax² + bx + c > 0 (или <, ≥, ≤) с a ≠ 0. Решава се чрез намиране на корените на съответното уравнение.', example: 'x² − 5x + 6 > 0 → корени x=2, x=3 → решение x < 2 или x > 3.' },
    { term: 'Дискриминанта (D)', definition: 'D = b² − 4ac. Определя броя на реалните корени: D > 0 → два; D = 0 → един двоен; D < 0 → няма реални корени.', example: 'x² − 4x + 4: D = 16 − 16 = 0 → двоен корен x = 2.' },
    { term: 'Метод на параболата', definition: 'Скицираме параболата y = ax² + bx + c и определяме знака на израза: при a > 0 клоновете са нагоре, при a < 0 — надолу.', example: 'За x² − 1 > 0 (a=1>0): корени ±1 → изразът е положителен за x < −1 или x > 1.' },
    { term: 'Знакова схема', definition: 'Нанасяме корените на числовата ос и проверяваме знака на израза в получените интервали. При a > 0: − + − (за два различни корена).', example: 'x² − x − 6: корени −2 и 3; знакова схема: + | − | + → x < −2 или x > 3 за > 0.' },
    { term: 'Квадратен тричлен', definition: 'Израз от вида ax² + bx + c (a ≠ 0). Може да се разложи на множители: a(x − x₁)(x − x₂) при D > 0.', example: 'x² − 5x + 6 = (x − 2)(x − 3).' },
    { term: 'Решение на квадратно неравенство', definition: 'Множеството от стойности на x, за които неравенството е вярно. Записва се в интервален вид или чрез обединение/сечение на интервали.', example: 'x² − 4 ≤ 0 → −2 ≤ x ≤ 2 → x ∈ [−2, 2].' }
  ],
  'math11-progresii': [
    { term: 'Аритметична прогресия (АП)', definition: 'Редица, в която всеки следващ член се получава като към предходния се прибави постоянна разлика d: aₙ = a₁ + (n−1)d.', example: '2, 5, 8, 11, ... (d = 3); a₁₀ = 2 + 9·3 = 29.' },
    { term: 'Разлика на АП (d)', definition: 'd = aₙ₊₁ − aₙ — постоянна за всички n. При d > 0 прогресията нараства; d < 0 — намалява; d = 0 — константна.', example: '1, 4, 7, 10: d = 3 > 0 → нарастваща АП.' },
    { term: 'Сума на АП', definition: 'Sₙ = n·(a₁ + aₙ)/2 = n·(2a₁ + (n−1)d)/2. Сумата на n члена е средноаритметичното на крайните членове, умножено по n.', example: 'Сума 1+2+...+100: S₁₀₀ = 100·(1+100)/2 = 5050.' },
    { term: 'Геометрична прогресия (ГП)', definition: 'Редица, в която всеки следващ член се получава като предходният се умножи по постоянно число q (знаменател): bₙ = b₁·q^(n−1).', example: '3, 6, 12, 24, ... (q = 2); b₅ = 3·2⁴ = 48.' },
    { term: 'Знаменател на ГП (q)', definition: 'q = bₙ₊₁/bₙ — постоянен за всички n. При q > 1 и b₁ > 0: нарастваща. При 0 < q < 1: намаляваща. При q < 0: редуваща знаци.', example: '16, 8, 4, 2, 1: q = 1/2 → намаляваща ГП.' },
    { term: 'Сума на безкрайна ГП', definition: 'При |q| < 1 сумата на всички членове е крайна: S∞ = b₁/(1−q). При |q| ≥ 1 сумата е безкрайна.', example: '1 + 1/2 + 1/4 + ... = 1/(1−1/2) = 2.' },
    { term: 'Средно аритметично на три члена на АП', definition: 'Средният член е средното аритметично на съседите: aₙ = (aₙ₋₁ + aₙ₊₁)/2. Удобно при задачи с три неизвестни члена.', example: 'АП: a, a+d, a+2d → средният = a+d = среднта стойност.' }
  ],
  'math11-planimeriya': [
    { term: 'Теорема на синусите', definition: 'a/sin α = b/sin β = c/sin γ = 2R, където a, b, c са страните, α, β, γ — срещулежащите ъгли, R — радиусът на описаната окръжност.', example: 'В триъгълник с a=5, α=30°, β=90°: b/sin 90° = 5/0,5 = 10 → b=10.' },
    { term: 'Теорема на косинусите', definition: 'c² = a² + b² − 2ab cos γ. Обобщение на питагоровата теорема; при γ = 90° се свежда до c² = a² + b².', example: 'a=3, b=4, γ=60°: c² = 9+16−24·0,5 = 13 → c = √13.' },
    { term: 'Лице на триъгълник', definition: 'S = (1/2)·a·h (основа × височина / 2) или S = (1/2)·ab·sin γ (две страни и ъгъл между тях).', example: 'a=6, b=8, γ=30°: S = (1/2)·6·8·sin 30° = (1/2)·6·8·0,5 = 12.' },
    { term: 'Вписан ъгъл', definition: 'Ъгъл с връх на окръжността, стягащ дъга. Вписаният ъгъл е равен на половината от централния ъгъл, стягащ същата дъга.', example: 'Ако централният ъгъл за дъга AB е 80°, вписаният ъгъл над AB е 40°.' },
    { term: 'Допирателна към окръжност', definition: 'Права, допираща се до окръжността в точно една точка. Допирателната е перпендикулярна на радиуса в точката на допиране.', example: 'Ако T е точка на допиране, то OT ⊥ тангент в T.' },
    { term: 'Формула на Херон', definition: 'S = √(p(p−a)(p−b)(p−c)), където p = (a+b+c)/2 е полупериметърът. Използва се когато са дадени трите страни.', example: 'a=3, b=4, c=5: p=6; S=√(6·3·2·1)=√36=6.' },
    { term: 'Паралелограм', definition: 'Четириъгълник с два чифта успоредни страни. S = a·h = ab·sin α; диагоналите се делят взаимно наполовина.', example: 'a=5, b=8, α=60°: S = 5·8·sin 60° = 40·(√3/2) = 20√3.' }
  ],

  // ── Математика 12 клас ──
  'math12-trigonometriya': [
    { term: 'Период на тригонометрична функция', definition: 'Най-малкото положително T, за което f(x+T) = f(x) за всички x. За sin и cos: T = 2π. За tg: T = π.', example: 'За y = sin(2x): T = 2π/2 = π (2× по-кратък период).' },
    { term: 'Амплитуда', definition: 'Половината от разстоянието между максималната и минималната стойност на функцията. За y = A·sin(x): амплитуда = |A|.', example: 'y = 3cos(x): амплитуда = 3; максимум = 3, минимум = −3.' },
    { term: 'Фаза (хоризонтално отместване)', definition: 'В y = sin(ωx + φ) фазата φ задава хоризонтално изместване на графиката с −φ/ω вляво/вдясно.', example: 'y = sin(x − π/2) = cos x: фаза π/2 измества графиката надясно с π/2.' },
    { term: 'Обратна тригонометрична функция', definition: 'arcsin x — обратна на sin (за x ∈ [−1,1], стойности в [−π/2, π/2]); arccos x — обратна на cos (стойности в [0, π]); arctan x — обратна на tg.', example: 'arcsin(1/2) = π/6; arccos(0) = π/2; arctan(1) = π/4.' },
    { term: 'Тригонометрично уравнение', definition: 'Уравнение, в което неизвестната е аргумент на тригонометрична функция. Общото решение включва всички периодични повторения.', example: 'sin x = √2/2 → x = π/4 + 2πn или x = 3π/4 + 2πn, n ∈ ℤ.' },
    { term: 'Тригонометрично неравенство', definition: 'Неравенство от вида sin x > a или cos x < a. Решава се графично или с единичната окръжност.', example: 'sin x > 1/2: решение x ∈ (π/6 + 2πn, 5π/6 + 2πn), n ∈ ℤ.' },
    { term: 'Единична окръжност', definition: 'Окръжност с радиус 1 и център в началото. Точка (cos θ, sin θ) лежи на окръжността при ъгъл θ. Инструмент за визуализация на тригонометричните стойности.', example: 'При θ = π/3: точката е (1/2, √3/2) → cos(π/3)=1/2, sin(π/3)=√3/2.' }
  ],
  'math12-kvadratna-funkciya': [
    { term: 'Квадратна функция', definition: 'f(x) = ax² + bx + c, a ≠ 0. Графиката е парабола с ос на симетрия x = −b/(2a) и връх V(−b/2a, −D/4a).', example: 'f(x) = x² − 4x + 3: ос x = 2, връх V(2, −1).' },
    { term: 'Върх на парабола', definition: 'Точката V(x₀, y₀) с x₀ = −b/(2a) и y₀ = f(x₀) = −D/(4a). При a > 0 е минимум; при a < 0 — максимум.', example: 'f(x) = 2x² − 4x + 1: x₀ = 1, y₀ = 2−4+1 = −1. Връх V(1, −1).' },
    { term: 'Канонична форма', definition: 'f(x) = a(x − x₀)² + y₀, получена чрез допълване до пълен квадрат. Вижда се директно върхът (x₀, y₀).', example: 'x² − 4x + 5 = (x−2)² + 1: връх (2, 1).' },
    { term: 'Дискриминанта (D)', definition: 'D = b² − 4ac. D > 0 → две реални нули; D = 0 → една двойна нула; D < 0 → няма реални нули.', example: 'x² − 5x + 6: D = 25−24 = 1 > 0 → две нули: x=2 и x=3.' },
    { term: 'Формули на Виета', definition: 'За корените x₁, x₂ на ax²+bx+c=0: x₁+x₂ = −b/a и x₁·x₂ = c/a. Позволяват намиране на сума и произведение без изрично пресмятане на корените.', example: 'x²−5x+6=0: x₁+x₂=5; x₁·x₂=6 → корени 2 и 3.' },
    { term: 'Нули на квадратна функция', definition: 'Стойностите на x, при които f(x) = 0. Съвпадат с корените на квадратното уравнение ax²+bx+c=0. Пресечните точки на параболата с оста Ox.', example: 'f(x) = x²−1: нули при x=1 и x=−1.' },
    { term: 'Ос на симетрия на парабола', definition: 'Вертикалната права x = −b/(2a), спрямо която параболата е симетрична. Минава през върха на параболата.', example: 'f(x) = 3x²+6x−1: ос x = −6/(2·3) = −1.' }
  ],
  'math12-kvadratni-neravenstva': [
    { term: 'Квадратно неравенство', definition: 'Неравенство от вида ax²+bx+c > 0 (или <, ≥, ≤), a ≠ 0. Решава се чрез намиране на корените и построяване на знакова схема.', example: 'x²−x−6 > 0 → корени −2, 3 → x < −2 или x > 3.' },
    { term: 'Метод на параболата', definition: 'Алгоритъм: намери корените на уравнението → скицирай парабола → отчети знака в нужния интервал.', example: 'При a > 0 и D > 0: тричленът е отрицателен между корените, положителен извън тях.' },
    { term: 'Знакова схема', definition: 'Нанасяме корените на числовата ос. Тя се разделя на интервали. Знакът на тричлена се редува при преминаване на прост корен.', example: 'x²−x−6: корени −2 и 3; знакова схема: (+)(−)(+) → положителен за x<−2 и x>3.' },
    { term: 'Случай D < 0', definition: 'Квадратният тричлен не се нулира; знакът му е като знака на a за всички x. При a>0: тричленът е винаги положителен. При a<0: винаги отрицателен.', example: 'x²+x+1: D=1−4=−3<0, a=1>0 → x²+x+1>0 за всички x.' },
    { term: 'Случай D = 0', definition: 'Тричленът има двоен корен x₀=−b/(2a). a>0: f(x)≥0 за всички x, f(x)=0 само при x=x₀. a<0: f(x)≤0 за всички x.', example: 'x²−4x+4=(x−2)²≥0; нула само при x=2.' },
    { term: 'Система от неравенства', definition: 'Решаваме всяко неравенство поотделно. При „и" взимаме сечение; при „или" взимаме обединение на решенията.', example: 'x²−5x+4≤0 и x>1: решения [1,4] ∩ (1,+∞) = (1,4].' }
  ],
  'math12-proizvodna': [
    { term: 'Производна', definition: 'f\'(x) = lim[Δx→0] [f(x+Δx)−f(x)]/Δx. Мярка за мигновената скорост на изменение на функцията. Геометрично — наклонът на допирателната.', example: 'f(x)=x²: f\'(x)=lim[(x+Δx)²−x²]/Δx = lim[2xΔx+(Δx)²]/Δx = 2x.' },
    { term: 'Правило за диференциране на произведение', definition: '(f·g)\' = f\'·g + f·g\'. При произведение от две функции се диференцира всяка поотделно и резултатите се събират.', example: '(x²·sin x)\' = 2x·sin x + x²·cos x.' },
    { term: 'Верижно правило', definition: '[f(g(x))]\' = f\'(g(x))·g\'(x). При сложна функция: производна на външната по вътрешната, умножена по производната на вътрешната.', example: '(sin(3x))\' = cos(3x)·3 = 3cos(3x).' },
    { term: 'Критична точка', definition: 'Точка x₀, в която f\'(x₀) = 0 или f\'(x₀) не съществува. Кандидат за локален екстремум.', example: 'f(x)=x³−3x: f\'(x)=3x²−3=0 → x=±1; критични точки са x=1 и x=−1.' },
    { term: 'Локален минимум и максимум', definition: 'В x₀: ако f\' сменя знак от − към + → локален минимум. Ако f\' сменя знак от + към − → локален максимум.', example: 'f\'(x)=3(x−1)(x+1): f\' + за x<−1, − за −1<x<1, + за x>1 → минимум x=1, максимум x=−1.' },
    { term: 'Монотонност и производна', definition: 'f\'(x) > 0 в интервал → f нараства. f\'(x) < 0 → f намалява. f\'(x) = 0 в единична точка не прекъсва монотонността.', example: 'f(x)=eˣ: f\'(x)=eˣ>0 → нараства навсякъде.' },
    { term: 'Уравнение на допирателна', definition: 'Допирателната в точка (x₀, f(x₀)): y − f(x₀) = f\'(x₀)·(x − x₀).', example: 'f(x)=x²: в x₀=2, f(2)=4, f\'(2)=4 → y−4=4(x−2) → y=4x−4.' }
  ],
  'math12-geometriya': [
    { term: 'Обем на пирамида', definition: 'V = (1/3)·S_осн·h, където S_осн е лицето на основата и h е височината. Важи за всяка пирамида.', example: 'Квадратна пирамида, основа 6×6, h=8: V=(1/3)·36·8=96 куб. ед.' },
    { term: 'Обем на конус', definition: 'V = (1/3)πr²h. Аналогично на пирамидата — 1/3 от цилиндъра с еднаква основа и височина.', example: 'r=3, h=4: V=(1/3)·π·9·4=12π ≈ 37,7.' },
    { term: 'Образуваща на конус', definition: 'Отсечката от върха до точка на основата: l = √(r²+h²). Лице на страничната повърхнина: Sстр = πrl.', example: 'r=3, h=4: l=√(9+16)=5. Sстр=π·3·5=15π.' },
    { term: 'Сфера и кълбо', definition: 'Сфера: повърхнина S = 4πR². Кълбо (обем): V = (4/3)πR³. R е радиусът.', example: 'R=3: S=4π·9=36π; V=(4/3)π·27=36π.' },
    { term: 'Апотема на правилна пирамида', definition: 'Разстоянието от върха до средата на страна от основата. Намирa се чрез Питагор: l_a = √(h² + (a/2)²) за квадратна основа.', example: 'h=8, квадратна основа с a=6: l_a=√(64+9)=√73.' },
    { term: 'Права призма', definition: 'Тяло с два паралелни и равни многоъгълни основи, свързани с правоъгълни стени. V = S_осн · h. Лице на стр. пов. = периметър·h.', example: 'Правилна 3-ъгълна призма, страна 4, h=10: V=(√3/4·16)·10=40√3.' },
    { term: 'Пространствена диагонала на паралелепипед', definition: 'd = √(a²+b²+c²), където a, b, c са размерите. Извежда се с двукратно прилагане на Питагор.', example: 'a=3, b=4, c=5: d=√(9+16+25)=√50=5√2.' }
  ],
  'math12-kombinatorika': [
    { term: 'Факториел', definition: 'n! = 1·2·3·...·n; 0! = 1 по дефиниция. Брои наредбите на n различни елемента.', example: '5! = 120; 3! = 6; 0! = 1.' },
    { term: 'Пермутация', definition: 'Наредена наредба на всички n елемента: Pₙ = n!. Различават се наредбите с различен ред.', example: '4 книги на рафт: P₄=4!=24 наредби.' },
    { term: 'Вариация без повторение', definition: 'Vⁿₖ = n!/(n−k)! — брой наредени k-елементни групи от n елемента (редът има значение).', example: 'От 5 различни цифри — 3-цифрени числа: V⁵₃=60.' },
    { term: 'Комбинация', definition: 'Cⁿₖ = n!/[k!(n−k)!] — брой k-елементни подмножества от n елемента (редът няма значение).', example: 'От 6 отбора избери 2: C⁶₂=15 начина.' },
    { term: 'Биномен коефициент', definition: 'Cⁿₖ — коефициентите в разложението (a+b)ⁿ=Σ Cⁿₖ aⁿ⁻ᵏ bᵏ. Симетрия: Cⁿₖ=Cⁿₙ₋ₖ. Рекурсия: Cⁿₖ=Cⁿ⁻¹ₖ₋₁+Cⁿ⁻¹ₖ.', example: '(a+b)³: коефициенти C³₀=1, C³₁=3, C³₂=3, C³₃=1 → a³+3a²b+3ab²+b³.' },
    { term: 'Принцип на умножението', definition: 'Ако действие A може да се извърши по m начина и след него B — по n начина, то двете последователни действия — по m·n начина.', example: '3 ризи и 4 панталона → 3·4=12 различни облекла.' },
    { term: 'Принцип на събирането', definition: 'Ако A може да се случи по m начина ИЛИ B (взаимно изключващи се) по n начина, то събитие A или B — по m+n начина.', example: 'Да вземем автобус (5 линии) или трамвай (3 линии): 5+3=8 начина.' }
  ],
  'math12-veroyatnosti': [
    { term: 'Вероятност (класическа дефиниция)', definition: 'P(A) = m/n, m — брой благоприятни изходи, n — брой равновероятни изходи. Приложима само при равновероятни изходи.', example: 'Зар: P(четно)=3/6=1/2; P(шест)=1/6.' },
    { term: 'Несъвместими събития', definition: 'A и B са несъвместими ако A ∩ B = ∅ (не могат да се случат едновременно). P(A ∪ B) = P(A) + P(B).', example: 'При хвърляне на зар: A={1,2} и B={5,6} са несъвместими: P(A∪B)=2/6+2/6=2/3.' },
    { term: 'Независими събития', definition: 'A и B са независими ако P(A ∩ B) = P(A)·P(B). Настъпването на A не влияе на вероятността на B.', example: 'Две хвърляния на монета: P(ези и ези)=1/2·1/2=1/4.' },
    { term: 'Условна вероятност', definition: 'P(A|B) = P(A ∩ B)/P(B) — вероятността на A при условие, че B вече е настъпило.', example: 'Урна с 3 червени и 2 сини топки. Теглим 2. P(2. е червена | 1. е червена) = 2/4 = 1/2.' },
    { term: 'Допълнително събитие', definition: 'Ā е събитието „A не се случва". P(Ā) = 1 − P(A). Стратегия: изчисли вероятността на допълнителното, ако е по-лесно.', example: 'P(поне един ези при 3 хвърляния) = 1 − P(нито един) = 1 − (1/2)³ = 7/8.' },
    { term: 'Схема на Бернули', definition: 'n независими еднакви опита, всеки с вероятност p за успех. P(X=k) = Cⁿₖ·pᵏ·(1−p)ⁿ⁻ᵏ.', example: 'Монета 4 пъти: P(точно 2 ези) = C⁴₂·(1/2)²·(1/2)² = 6/16 = 3/8.' },
    { term: 'Пространство на елементарните събития', definition: 'Множеството Ω от всички възможни изходи на случаен опит. Събитие A ⊆ Ω е подмножество.', example: 'Зар: Ω={1,2,3,4,5,6}. Събитие A={2,4,6} (четно число).' }
  ],
  'bel12-pravopis': [
    { term: 'Морфема', definition: 'Най-малката смислоносеща единица на езика. Бива корен, представка (префикс), наставка (суфикс) и окончание.', example: 'В думата „преписвам": пре- (представка) + пис- (корен) + -ва- (суфикс) + -м (окончание).' },
    { term: 'Представка (префикс)', definition: 'Морфема, поставена пред корена, която изменя значението на думата. В БЕ: пре-, при-, раз-, из-, без- и др.', example: 'пре- + скоча = прескоча; при- + стигна = пристигна.' },
    { term: 'Наставка (суфикс)', definition: 'Морфема, поставена след корена за образуване на нова дума или форма. Определя часта на речта.', example: '-ен (горен), -ски (морски), -ост (красота), -ач (певач).' },
    { term: 'Чередуване я/е', definition: 'В думи с „ятов корен" (бял, сняг, вятър): „я" се пише в ударена сричка пред задна гласна; „е" — в неударена сричка или пред предна гласна.', example: 'Бяла (ударено, пред а) → бели (неударено, пред и); вятър → ветрове.' },
