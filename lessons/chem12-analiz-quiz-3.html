        { q:'Каква реакция доказва наличие на сулфатни йони SO₄²⁻ в разтвор?', opts:['Добавяне на AgNO₃','Добавяне на BaCl₂','Добавяне на NaOH','Добавяне на HCl'], correct:1, explanation:'Ba²⁺ + SO₄²⁻ → BaSO₄↓ (бяла утайка). BaSO₄ е неразтворима в разредена HCl и HNO₃ – това потвърждава присъствието на сулфатни йони.' },
        { q:'Кой метод за анализ използва светлинно излъчване от атоми при нагряване?', opts:['Хроматография','Пламъчна спектроскопия','Гравиметрия','Електрофореза'], correct:1, explanation:'При пламъчната спектроскопия (AES – Atomic Emission Spectroscopy) атомите се нагряват и излъчват светлина с характерни дължини на вълната. Всеки елемент има уникален спектър.' },

        { q:'Кое твърдение за pH скалата е ВЯРНО?', opts:['pH може да е само от 0 до 7','pH = -log[H⁺]','При неутрален разтвор pH = 0','pH се измерва само с лакмус'], correct:1, explanation:'pH = -log[H⁺]. При [H⁺] = 10⁻⁷ mol/L, pH = 7 (неутрален). Скалата обичайно е 0–14, но теоретично може да е извън тези граници.' },

        { q:'Кой метод позволява точно измерване на маса на утайка за количествен анализ?', opts:['Титруване','Гравиметрия','Спектроскопия','Хроматография'], correct:1, explanation:'Гравиметрията включва утаяване на анализирания компонент, филтруване, изсушаване и претегляне на утайката. Масата й се свързва с количеството на търсеното вещество.' },
