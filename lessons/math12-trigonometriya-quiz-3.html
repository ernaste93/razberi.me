          q: 'Каква е формулата за cos 2α (само с косинус)?',
          opts: ['2 cos²α', '2 cos²α − 1', '1 − 2 cos²α', 'cos²α + sin²α'],
          correct: 1,
          explanation: 'cos 2α = 2cos²α − 1. Произтича от cos 2α = cos²α − sin²α, като заместим sin²α = 1 − cos²α: cos²α − (1 − cos²α) = 2cos²α − 1.'
        },
        {
          q: 'Колко решения има уравнението sin x = 2?',
          opts: ['Едно: x = 90°', 'Безкрайно много', 'Нито едно', 'Две: x = 30° и x = 150°'],
          correct: 2,
          explanation: 'sin x = 2 няма решения, защото областта на стойностите на sin x е [−1, 1]. Числото 2 е извън тази област.'
        },
        {
          q: 'Каква е стойността на cot 30°?',
          opts: ['√3/3', '√3', '1', '1/2'],
          correct: 1,
          explanation: 'cot 30° = cos 30° / sin 30° = (√3/2) / (1/2) = √3. Алтернативно: cot 30° = 1/tan 30° = 1/(√3/3) = 3/√3 = √3.'
        },
        {
          q: 'Кое е общото решение на уравнението cos x = 1/2?',

          explanation: 'За cos x = a: x = ±arccos a + 360°·n. arccos(1/2) = 60°, значи x = ±60° + 360°·n, n ∈ ℤ. Двата знака ± идват от симетрията на косинуса.'
        },
        {
          q: 'В кой квадрант са и sin, и cos отрицателни?',
          opts: ['I квадрант', 'II квадрант', 'III квадрант', 'IV квадрант'],
          correct: 2,
          explanation: 'В III квадрант (180°–270°) и x, и y са отрицателни, затова cos α < 0 и sin α < 0. Единствено tan и cot са положителни в III квадрант.'
        },
        {
          q: 'Каква е стойността на sin 270°?',
          opts: ['0', '1', '−1', '√2/2'],
          correct: 2,
          explanation: 'sin 270° = −1. При 270° точката на единичната окръжност е (0, −1), затова sin = y-координата = −1.'
