      questions: [
        { q:'Каква е функционалната група на алкохолите?', opts:['–COOH','–CHO','–OH (хидроксилна група)','–C=O (кетонна група)'], correct:2, explanation:'Алкохолите съдържат хидроксилна функционална група –OH, свързана с въглероден атом. Примери: метанол CH₃OH, етанол C₂H₅OH, глицерол (тривалентен алкохол).' },
        { q:'Кое е правилното наименование на CH₃CH₂OH?', opts:['Метанол','Пропанол','Етанол','Бутанол'], correct:2, explanation:'CH₃CH₂OH е етанол (етилов алкохол) — двувъглероден алкохол. Той е познатото „питейно" вещество в алкохолните напитки, получавано при ферментация на захари.' },
        { q:'Алдехидите съдържат функционалната група:', opts:['–OH','–COOH','–CHO (алдехидна група)','–CO– (кетонна група)'], correct:2, explanation:'Алдехидите съдържат алдехидна група –CHO (–C(=O)H) на края на въглеродната верига. Примери: формалдехид HCHO (метанал), ацеталдехид CH₃CHO (етанал).' },
        { q:'Каква е разликата между алдехид и кетон?', opts:['Алдехидите имат OH група, кетоните нямат','В алдехидите карбонилната група е на края на веригата, в кетоните — вътре','Кетоните имат само един въглероден атом','Алдехидите са газообразни, кетоните са течни'], correct:1, explanation:'И алдехидите, и кетоните съдържат карбонилна група C=O. Разликата: при алдехидите тя е терминална (–CHO), при кетоните е вътрешна (–CO–, свързана с два въглеродни атома). Пример: пропанал (алдехид) срещу пропанон/ацетон (кетон).' },
        { q:'Карбоксилните киселини имат функционална група:', opts:['–OH','–CHO','–COOH (карбоксилна група)','–CO–'], correct:2, explanation:'Карбоксилните киселини съдържат карбоксилна група –COOH, която е комбинация от карбонилна (C=O) и хидроксилна (–OH) група. Оцетната киселина (CH₃COOH) е най-познатият пример.' },
        { q:'При реакция между алкохол и карбоксилна киселина се получава:', opts:['Алдехид + вода','Естер + вода (естерификация)','Кетон + водород','Алкен + вода'], correct:1, explanation:'Естерификацията е реакция между алкохол и карбоксилна киселина с отделяне на вода: R–COOH + HO–R\' → R–COO–R\' + H₂O. Катализира се от силни киселини (H₂SO₄). Обратната реакция е хидролиза на естера.' },
        { q:'Ацетонът (пропанон) CH₃COCH₃ е:', opts:['Алкохол','Алдехид','Кетон','Карбоксилна киселина'], correct:2, explanation:'Ацетонът е кетон — карбонилната група е между две метилови групи (CH₃–CO–CH₃). Той е разтворител и се използва в козметиката (лакочистители) и химическата промишленост.' },
        { q:'Оцетната киселина (CH₃COOH) реагира с NaOH по реакция:', opts:['Esterификация','Неутрализация: CH₃COOH + NaOH → CH₃COONa + H₂O','Окисляване','Полимеризация'], correct:1, explanation:'Карбоксилните киселини реагират с основи (неутрализация). Оцетната киселина + NaOH дава натриев ацетат (сол) и вода. Тази реакция е аналогична на реакциите на неорганичните киселини с основи.' },
        { q:'Какво е „многовалентен алкохол"? Дай пример.', opts:['Алкохол с двойна С=С връзка; пример: бутенол','Алкохол с повече от една –OH група; пример: глицерол (3 OH групи)','Алкохол с разклонена верига; пример: изопропанол','Алкохол без водородни атоми; пример: ацетон'], correct:1, explanation:'Многовалентните алкохоли имат повече от една хидроксилна група. Глицерол (пропан-1,2,3-триол) е тривалентен алкохол — важен компонент на мазнините и козметичните продукти. Етиленгликол (двувалентен) се използва като антифриз.' },
