          explanation: 'v = k[A][B] = 0,1 × 0,2 × 0,5 = 0,01 mol/(L·s). Единицата за k при реакция от 2-ри ред е L/(mol·s).'

          options: ['Реагенти, изразходвани в реакцията', 'Биологични катализатори, намаляващи Ea', 'Инхибитори, забавящи реакцията', 'Продукти на метаболизма'],

          q: 'При химично равновесие v(права) = v(обратна). Какво от следното е ВЯРНО?',
          options: ['[реагенти] = [продукти] задължително', 'Реакцията е спряла', 'Концентрациите са постоянни, но не непременно равни', 'Kc = 1 задължително'],
