        { q:'Как символизмът се различава от реализма като литературно направление?', opts:['Символизмът описва само природата, реализмът — само хората','Символизмът търси красота в символи, настроения и спомени; реализмът изобразява социалната действителност точно','Символизмът е по-стар от реализма с 200 години','Двете направления нямат разлики'], correct:1, explanation:'Реализмът (Вазов, Елин Пелин) изобразява точно обществото. Символизмът (Дебелянов, Яворов) бяга от реалността в символи, настроения, музика на думите и вътрешния свят на субекта.' },
