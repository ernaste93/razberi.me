        { q:'Кое от следните изречения съдържа грешка?', opts:['Тя пише писмо.','Той четоха книги.','Ние отидохме на театър.','Те се върнаха вкъщи.'], correct:1, explanation:'„Той четоха" е грешно — „той" е 3 л. ед.ч., глаголът трябва да е „четеше" (мин. несв.) или „прочете" (мин. св.). „Четоха" е 3 л. мн.ч. и не съответства на подлога „той".' },
        { q:'Кое е правилното пълно членуване на „стол"?', opts:['столът','столя','столна','стола'], correct:0, explanation:'„Столът" е правилното пълно членуване (определителен член -ът за мъжки род в именителен падеж — когато думата е подлог). „Стола" е кратко членуване (в другите случаи).' },
        { q:'В кое изречение е правилно употребен краткият местоименен израз?', opts:['Дай го на мен.','Дай ми го.','Дай него.','Дай то на мене.'], correct:1, explanation:'„Дай ми го" е правилно — „ми" е кратка форма на „на мен", „го" е кратка форма за директния обект. Краткият израз е предпочитан в книжовния език.' },
        { q:'Как се образува сравнителна степен при прилагателното „добър"?', opts:['добрий','по-добър','добри','добре'], correct:1, explanation:'Сравнителната степен на „добър" е „по-добър" — чрез добавяне на „по-" пред прилагателното. „Добрий" е архаична форма, „добри" е мн.ч., „добре" е наречие.' },
        { q:'Кой е правилният вид на глагола в изречението „Тя ___ да учи всеки ден"?', opts:['обичаше','обичала е','обича','обичан'], correct:2, explanation:'„Обича" (сегашно време) е правилно в контекста на навик или постоянно действие. „Обичаше" е минало, „обичала е" е перфект, „обичан" е страдателно причастие — не пасват.' },
        { q:'Кое изречение е с правилна употреба на „се" и „си"?', opts:['Миех се ръцете.','Миех си ръцете.','Миех ги ръцете.','Миех ръцете ми.'], correct:1, explanation:'„Миех си ръцете" е правилно — „си" е кратка форма на дателен падеж (за притежание). „Се" е за действия върху самия себе си (рефлексив без обект). „Миех си" означава „миех ръцете на себе си".' },
        { q:'Коя форма е правилна: „двеста" или „двести"?', opts:['двеста','двести','и двете са грешни','двеести'], correct:0, explanation:'Правилната форма е „двеста" — не „двести". Честа грешка е използването на „двести" по аналогия с „триста" и „четиристотин". В книжовния стандарт е „двеста".' },

        { q:'Какво е „четейки" — каква глаголна форма?', opts:['Минало деятелно причастие','Деепричастие (сегашно деятелно причастие)','Страдателно причастие','Герундий'], correct:1, explanation:'„Четейки" е деепричастие (или сегашно деятелно причастие) — изразява съпътстващо действие. Напр. „Четейки книгата, той заспа" — чете и заспива едновременно.' },
        { q:'Кое е правилното изречение с числително?', opts:['Пет ученика дойдоха.','Петима ученика дойдоха.','Петима ученици дойдоха.','Пет ученици дойдоха.'], correct:2, explanation:'„Петима ученици дойдоха" е правилно — за мъжки род се използва бройното числително „петима" (не „пет"), а след него съществителното е в мн.ч. „ученици" (не „ученика" с т.нар. бройна форма, която е за „пет книги" и под.).' },
