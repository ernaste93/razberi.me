          explanation: 'Моделът на течната мозайка (Сингер и Никълсън, 1972) описва клетъчната мембрана като фосфолипиден двоен слой с белтъци, свободно движещи се в него. Той обяснява гъвкавостта и функционалността на мембраната.'

        {
          q: 'Кой органел е наречен „електроцентрала на клетката"?',

          explanation: 'Митохондриите синтезират по-голямата część от клетъчния АТФ чрез аеробно дишане. Те имат двойна мембрана: вътрешната образува кристи, увеличаващи повърхността за АТФ синтеза.'
        },
        {
          q: 'В кой органел протича синтезът на белтъци?',
          options: ['Митохондрия', 'Лизозома', 'Рибозома', 'Вакуола'],
          correct: 2,
          explanation: 'Рибозомите са немембранни органели, изградени от рРНК и белтъци. Те извършват транслация — синтез на белтъци по матрица от информационна РНК. Намират се свободно в цитоплазмата или прикрепени към гранулирания ЕПР.'
        },
        {
          q: 'Коя структура отделя клетката от околната среда и регулира преноса на вещества?',

          q: 'Кои клетки нямат оформено клетъчно ядро?',
          options: ['Животински клетки', 'Растителни клетки', 'Прокариотни клетки', 'Гъбни клетки'],

          explanation: 'Прокариотите (бактерии и архебактерии) нямат оформено ядро с мембрана — ДНК им е свободна в цитоплазмата. Еукариотите (животни, растения, гъби, протисти) имат ядро с двойна мембрана.'
        },
        {
          q: 'Каква е функцията на апарата на Голджи?',
          options: ['Синтез на АТФ', 'Разграждане на клетъчни отпадъци', 'Модифициране, сортиране и опаковане на белтъци', 'Съхраняване на генетична информация'],

          explanation: 'Апаратът на Голджи действа като „пощенска станция" — получава белтъци от ЕПР, модифицира ги (гликозилиране, фосфорилиране), сортира и опакова в везикули за транспорт до местоназначението им.'
