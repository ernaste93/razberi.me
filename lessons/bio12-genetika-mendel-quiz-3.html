        { q:'При монохибридно кръстосване AA × aa каква ще е F1?', opts:['Всички аа','Всички АА','Всички Аа','50% АА и 50% аа'], correct:2, explanation:'При кръстосване на два хомозиготни родители (AA × aa) всички потомци от F1 получават по един алел от всеки родител, т.е. 100% Аа — хетерозиготни с доминантен фенотип.' },
        { q:'Растение с генотип AaBb може да образува колко вида гамети?', opts:['1','2','4','8'], correct:2, explanation:'Организъм с генотип AaBb образува 4 вида гамети: AB, Ab, aB, ab. Броят на видовете гамети е 2ⁿ, където n е броят на хетерозиготните двойки (2² = 4).' },
        { q:'При дихибридно кръстосване AABB × aabb, какъв ще е генотипът на всички потомци от F1?', opts:['AABB','aabb','AaBb','AABb'], correct:2, explanation:'При кръстосване на AABB × aabb всеки потомък получава по един алел от всеки ген от всеки родител: A от AABB и a от aabb, B от AABB и b от aabb → всички F1 са AaBb.' },
        { q:'Кое твърдение за рецесивните алели е ВЯРНО?', opts:['Рецесивните алели се губят при хетерозиготи','Рецесивните алели се „скриват" при хетерозиготи, но се проявяват при хомозиготи аа','Рецесивните алели мутират по-бързо','Рецесивните алели са вредни'], correct:1, explanation:'Рецесивните алели не изчезват — те се предават на следващите поколения, но не се проявяват фенотипно при хетерозигота (Аа). Проявяват се само при хомозиготно рецесивен индивид (аа).' },
        { q:'Ако от 200 растения в F2 при монохибридно кръстосване 150 са доминантни, а 50 рецесивни — потвърждава ли се законът на Мендел?', opts:['Не, защото трябва да е точно 3:1','Да, съотношението 150:50 = 3:1 съответства на очакваното','Не, очакваното е 1:1','Да, но само ако сортовете са чисти'], correct:1, explanation:'150:50 = 3:1 — точното съотношение по Втория закон на Мендел. При практически опити малки отклонения са нормални, но 3:1 е статистически потвърдено.' },
        { q:'Кое от следните НЕ е белег, изследван от Мендел при грах?', opts:['Форма на семената','Цвят на листата','Цвят на цветовете','Височина на стъблото'], correct:1, explanation:'Мендел не е изследвал цвета на листата. Неговите 7 белега включват: форма и цвят на семената, цвят на цветовете, форма и цвят на шушулките, позиция на цветовете, дължина на стъблото.' },
        { q:'Каква е разликата между хомозигота и хетерозигота?', opts:['Хомозиготата има повече хромозоми','Хомозиготата носи два еднакви алела за даден ген (АА или аа), а хетерозиготата — два различни (Аа)','Хетерозиготата е резултат от мутация','Само хомозиготите могат да се размножават'], correct:1, explanation:'Хомозиготен организъм: двата алела за даден ген са еднакви (АА или аа). Хетерозиготен: двата алела са различни (Аа). Хетерозиготите фенотипно изглеждат като доминантния родител.' },
        { q:'Каква е вероятността при кръстосване AaBb × AaBb да се получи потомък с генотип aabb?', opts:['1/16','3/16','9/16','1/4'], correct:0, explanation:'В F2 от AaBb × AaBb: вероятността за аа е 1/4, вероятността за bb е 1/4. По правилото за умножение: 1/4 × 1/4 = 1/16. Затова в съотношението 9:3:3:1, „1" отговаря на 1/16.' },
