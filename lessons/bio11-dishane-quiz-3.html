      title:       'Куиз — Клетъчно дишане — Тест 3',
      passScore:   8,
      questions: [
        {
          q: 'Сравнение: фотосинтеза спрямо клетъчно дишане. Кое твърдение е ВЯРНО?',
          options: ['И двата процеса протичат само в растенията', 'Фотосинтезата изгражда глюкоза от CO₂ и H₂O; дишането разгражда глюкоза до CO₂ и H₂O', 'И двата процеса произвеждат O₂', 'Дишането протича в хлоропластите'],
          correct: 1,
          explanation: 'Фотосинтезата (анаболизъм) изгражда глюкоза от CO₂ и H₂O, използвайки светлинна енергия. Дишането (катаболизъм) разгражда глюкоза до CO₂ и H₂O, освобождавайки енергия под формата на АТФ. Те са метаболитно противоположни процеси, свързани чрез глюкозата.'
        },
        {
          q: 'Ако клетка е отровена с цианид (блокира Комплекс IV на ЕТВ), какво ще се случи?',
          options: ['Само гликолизата ще спре', 'Цялото аеробно дишане ще се блокира и клетката ще умре поради недостиг на АТФ', 'Ще се ускори ферментацията', 'Митохондриите ще се удвоят'],
          correct: 1,
          explanation: 'Цианидът блокира Комплекс IV (цитохром с оксидаза), което спира потока на електрони до O₂ и прекъсва ЕТВ. Без функционираща ЕТВ АТФ синтазата не работи, протонният градиент изчезва и производството на ~32–34 АТФ спира. Клетката разчита само на 2 АТФ от гликолизата — недостатъчно за оцеляване.'
        },
        {
          q: 'Дрождите могат да ферментират захари в безкислородна среда. Какъв е крайният продукт?',
          options: ['Лактат и H₂O', 'Етанол и CO₂', 'Пируват и НАДH', 'Ацетил-КоА и CO₂'],
          correct: 1,
          explanation: 'Дрождите извършват алкохолна ферментация: глюкоза → 2 пируват → 2 ацеталдехид → 2 етанол + 2 CO₂. Отделеният CO₂ кара хляба да „втасва", а етанолът е основата на производството на вино, бира и спиртни напитки.'
        },
        {
          q: 'Защо аеробното дишане е ~19 пъти по-ефективно от анаеробното?',
          options: ['Защото е по-бързо', 'Защото използва O₂ и произвежда ~38 АТФ срещу само 2 АТФ при ферментацията', 'Защото протича при по-висока температура', 'Защото не произвежда CO₂'],
          correct: 1,
          explanation: 'Аеробното дишане произвежда ~38 АТФ на молекула глюкоза (2 от гликолизата + 2 от Кребс цикъла + ~34 от окислително фосфорилиране). Анаеробното произвежда само 2 АТФ (от гликолизата). Ключовото е окислителното фосфорилиране — то извлича по-голямата енергия чрез O₂.'
        },
        {
          q: 'Тренировките с висок интензитет водят до „кислородния дълг" след тренировката. Защо?',
          options: ['Тялото трябва да произведе повече хлорофил', 'Натрупаният лактат трябва да се окисли аеробно след тренировката, изисквайки допълнителен O₂', 'Митохондриите трябва да се разградят', 'Гликолизата продължава да работи след тренировката'],
          correct: 1,
          explanation: 'По време на интензивно усилие лактатът се натрупва (млечно-кисела ферментация). След тренировката тялото трябва аеробно да окисли или конвертира лактата обратно — процес, изискващ допълнителен кислород. Оттук идва повишеното дишане след тренировка ("кислороден дълг" или EPOC).'
        },
        {
          q: 'Коя е разликата между субстратно фосфорилиране и окислително фосфорилиране?',
          options: ['Субстратното е по-бавно', 'Субстратното синтезира АТФ директно при ензимни реакции (гликолиза, Кребс); окислителното — чрез ЕТВ и АТФ синтаза', 'Окислителното не изисква O₂', 'Двата термина означават едно и също'],
          correct: 1,
          explanation: 'Субстратното фосфорилиране е директен синтез на АТФ при ензимни реакции (в гликолизата и цикъла на Кребс) — произвежда малко АТФ. Окислителното фосфорилиране използва енергията от ЕТВ за синтез на АТФ чрез АТФ синтаза — произвежда огромно мнозинство от клетъчния АТФ.'
        },
        {
          q: 'Кои органели биха пострадали НАЙ-МНОГО при спиране на аеробното дишане?',
          options: ['Лизозомите', 'Клетките с висока енергийна потребност (мускулни клетки, неврони)', 'Растителните клетки с хлоропласти', 'Клетките с малко митохондрии'],
          correct: 1,
          explanation: 'Клетките с висока енергийна потребност — мускулни клетки и особено неврони — зависят критично от постоянен приток на АТФ. Те имат много митохондрии. При спиране на аеробното дишане именно тези клетки страдат най-много, защото само 2 АТФ от гликолизата са крайно недостатъчни.'
        },
        {
          q: 'Растение в тъмнина — може ли да провежда клетъчно дишане?',
          options: ['Не, защото дишането зависи от светлината', 'Да, клетъчното дишане протича денонощно, независимо от светлината', 'Само при наличие на CO₂', 'Само хлоропластите дишат в тъмнина'],
          correct: 1,
          explanation: 'Клетъчното дишане е непрекъснат процес, протичащ денонощно в ВСИЧКИ живи клетки — и на растенията, и на животните. То не зависи от светлината. Фотосинтезата пък изисква светлина. В тъмнина растението само диша (поглъща O₂ и отделя CO₂).'
        },
        {
          q: 'Кой процес е общ за фотосинтезата и клетъчното дишане?',
          options: ['Фиксация на CO₂', 'Електронно-транспортна верига', 'Фотолиза на вода', 'Гликолиза'],
          correct: 1,
          explanation: 'И фотосинтезата (в тилакоидните мембрани), и клетъчното дишане (по вътрешната митохондриална мембрана) използват електронно-транспортна верига (ЕТВ) и протонен градиент за синтез на АТФ чрез хемиосмоза. Разликата е в посоката и изходния источник на електрони.'
        },
        {
          q: 'Нетният добив на АТФ от ЦЯЛОТО аеробно дишане на 1 молекула глюкоза е приблизително:',
          options: ['2 АТФ', '8 АТФ', '36–38 АТФ', '100 АТФ'],
          correct: 2,
          explanation: 'Общият добив от аеробното дишане е ~36–38 АТФ: 2 от гликолизата + 2 от цикъла на Кребс + ~32–34 от окислителното фосфорилиране. Точното число варира, защото зависи от ефективността на протонния градиент и транспортните механизми.'
        }
      ]
    };
