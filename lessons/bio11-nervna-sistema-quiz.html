          q: 'Кои са двете главни части на нервната система?',

          explanation: 'Нервната система се дели на Централна (ЦНС — главен и гръбначен мозък) и Периферна (ПНС — всички нервни влакна извън ЦНС). ПНС включва черепно-мозъчните (12 двойки) и гръбначно-мозъчните нерви (31 двойки).'

        {
          q: 'Каква е функцията на дендритите?',
          options: ['Провеждат нервни импулси ОТ тялото на неврона', 'Приемат нервни сигнали и ги провеждат КЪМ тялото на неврона', 'Синтезират невротрансмитери', 'Образуват миелинова обвивка'],

        },

          q: 'Какво е синапс?',
          options: ['Структурна единица на нервната система', 'Специализирана връзка между неврони (или неврон и ефектор) за предаване на нервен сигнал', 'Обвивка около аксона', 'Зона на гръбначния мозък'],

          explanation: 'Правилната последователност е: Рецептор (приема стимул) → Аферентен нерв (пренася КЪМ ЦНС) → Нервен център (обработва) → Еферентен нерв (пренася ОТ ЦНС) → Ефектор (мускул/жлеза, изпълнява отговора). Ключово: аферентен = към центъра, еферентен = от центъра.'

          q: 'Рефлексът е:',
          options: ['Съзнателен, целенасочен отговор на организма', 'Автоматичен, стереотипен отговор на стимул, без участие на съзнанието', 'Процес само в главния мозък', 'Хормонален отговор на стимул'],
          correct: 1,
          explanation: 'Рефлексът е автоматичен, стереотипен отговор на организма на определен стимул, осъществяван без участие на съзнанието. Рефлексите са бързи защитни механизми — например дергане на ръката при допир с горещо или мигащ рефлекс при заплаха за окото.'
        },
        {
          q: 'Симпатиковата нервна система се активира при:',
          options: ['Покой, храносмилане, сън', 'Стрес, опасност, физическа активност ("бий или бягай")', 'Парасимпатикова инхибиция', 'Само при рефлекторни реакции'],
          correct: 1,
          explanation: 'Симпатиковата нервна система е частта от вегетативната НС, активираща „бий или бягай" реакцията: ускорява сърдечния ритъм, разширява зениците, инхибира храносмилането, освобождава адреналин. Парасимпатиковата е противоположна — действа при покой.'
        },
        {
          q: 'Кой дял на главния мозък отговаря за координацията на движенията?',

        }
