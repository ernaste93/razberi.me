          opts: [

            'Вкаменени останки или отпечатъци на организми от минали геоложки епохи',

        {
          q: 'Archaeopteryx е преходна форма между кои две групи животни?',
          opts: [
            'Между рибите и земноводните',
            'Между земноводните и влечугите',
            'Между влечугите и птиците',
            'Между бозайниците и птиците'
          ],
          correct: 2,
          explanation: 'Archaeopteryx (юра, ~150 млн. г.) е класическа преходна форма: има черти и на влечугите (зъби, костена опашка, нокти на крилата) и на птиците (пера, крила). Доказва еволюционната връзка между двете групи.'

        {
          q: 'Какво представляват хомоложните органи?',

            'Органи с обща функция, но различен еволюционен произход',
            'Органи с еднакъв еволюционен произход, но различна функция',

        {
          q: 'Ръката на човека, плавникът на кита и крилото на прилепа са пример за:',

            'Аналогични органи',
            'Рудиментарни органи',
            'Хомоложни органи',
            'Конвергентни структури'

        {
          q: 'Какво са аналогичните органи?',
          opts: [
            'Органи с общ произход и обща функция',
            'Органи с различен произход, но изпълняващи сходна функция',
            'Органи с общ произход и различна функция',
            'Изчезнали органи без функция'
          ],
          correct: 1,
          explanation: 'Аналогичните органи имат различен еволюционен произход, но изпълняват сходна функция — резултат от конвергентна еволюция. Пример: крилото на птицата и крилото на пеперудата — и двете служат за летене, но са се развили независимо.'
        },
        {
          q: 'Крилото на птица и крилото на насекомо (пеперуда) са пример за:',
          opts: [
            'Хомоложни органи',
            'Рудиментарни органи',
            'Аналогични органи',
            'Преходни форми'
          ],
          correct: 2,
          explanation: 'Крилото на птица и крилото на пеперуда са аналогични органи — изпълняват сходна функция (летене), но имат коренно различен еволюционен произход и различна вътрешна структура.'

        {
          q: 'Какво са рудиментарните органи?',
          opts: [
            'Новообразувани органи в резултат на адаптация',
            'Органи с много важна функция за организма',
            'Органи, загубили функционалното си значение в хода на еволюцията, но все още налични',
            'Органи, открити само при ембрионите'
          ],
          correct: 2,
          explanation: 'Рудиментарните органи са органи, изгубили основната си функция в хода на еволюцията, но все още присъстват в организма. Пример: апендиксът при човека (рудимент от тревопасни предци) и задните крайници при кита.'
        },
        {
          q: 'Какво доказват ембриологичните сходства между гръбначните животни?',
          opts: [
            'Че всички животни се развиват по абсолютно еднакъв начин',
            'Общ еволюционен произход — ранните ембриони на риби, влечуги, птици и бозайници си приличат',
            'Че ембриогенезата не се е променила в хода на еволюцията',
            'Че всички гръбначни са всъщност един и същи вид'
          ],
          correct: 1,
          explanation: 'В ранните стадии на развитие ембрионите на различни гръбначни (риба, жаба, птица, човек) си приличат изключително много — имат хрилни цепки, опашка и сходна форма. Това е доказателство за общ еволюционен прародител.'
        },
        {
          q: 'Биохимичните доказателства за еволюцията се основават на:',
          opts: [
            'Сходства в цвета и формата на животните',
            'Факта, че всички живи организми използват ДНК, АТФ и единния генетичен код',
            'Географското разпределение на видовете',
            'Сравнението на черепи от различни епохи'

          correct: 1,
          explanation: 'Всички живи организми — от бактерии до хора — използват ДНК за наследствена информация, АТФ за енергия и един и същи генетичен код. Тази универсалност е силно доказателство за общ произход на живота.'

        {
          q: 'Палеонтологичните доказателства за еволюцията включват:',
          opts: [
            'Само сравнение на живи организми',
            'Само генетични анализи',
            'Фосили, преходни форми и геоложки слоеве с остатъци от различни епохи',

        }
      ]
