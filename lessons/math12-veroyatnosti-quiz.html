  <script>
    window.QUIZ_CONFIG = {

      lessonUrl:   '/lessons/math12-veroyatnosti.html',
      lessonName:  'Вероятности и статистика',
      eyebrow:     'МАТЕМАТИКА · 12 КЛАС',
      title:       'Куиз – Вероятности и статистика – Тест 1',
      sub:         '10 въпроса · Избери верния отговор',
      passScore:   8,
      quizNum:     1,
      nextQuizUrl: '/lessons/math12-veroyatnosti-quiz-2.html',
      questions: [
        { q:'Каква е класическата дефиниция за вероятност?', opts:['P(A) = брой на изпитанията','P(A) = благоприятни изходи / всички равновероятни изходи','P(A) = неблагоприятни / всички','P(A) = 1 / брой събития'], correct:1, explanation:'Класическата вероятност: P(A) = m/n, където m е броят на благоприятните (за събитието A) еднакво възможни изходи, а n е общият брой равновероятни изходи. Стойностите са в [0, 1].' },
        { q:'Хвърля се монета. Каква е вероятността да се падне „ос"?', opts:['1/4','1/3','1/2','2/3'], correct:2, explanation:'При хвърляне на монета има 2 равновероятни изхода: „ос" и „решка". Благоприятни за „ос" = 1. P(ос) = 1/2 = 0,5 = 50%.' },
        { q:'В урна има 3 червени и 7 сини топки. Каква е вероятността за теглене на червена топка?', opts:['3/7','7/10','3/10','1/3'], correct:2, explanation:'Всичко топки: 3 + 7 = 10. Благоприятни (червени): 3. P(червена) = 3/10 = 0,3 = 30%.' },
        { q:'Хвърля се зар. Каква е вероятността да се падне четно число?', opts:['1/6','1/3','1/2','2/3'], correct:2, explanation:'Зарът има 6 лица: 1,2,3,4,5,6. Четни: 2, 4, 6 – три изхода. P(четно) = 3/6 = 1/2.' },
        { q:'Кои две събития се наричат „противоположни"?', opts:['Двете едновременно настъпват','Те са взаимно изключващи се и заедно дават цялото пространство от изходи (P(A) + P(Ā) = 1)','Имат еднаква вероятност','Нито едното не може да настъпи'], correct:1, explanation:'Събитие A и неговото противоположно Ā = „не A" покриват цялото пространство: P(A) + P(Ā) = 1. Пример: хвърляне на зар – A = „пада 6", Ā = „не пада 6"; P(6)=1/6, P(не-6)=5/6.' },
        { q:'Ако P(A) = 0,3, каква е P(Ā)?', opts:['0,3','0,7','0,6','1,3'], correct:1, explanation:'P(Ā) = 1 − P(A) = 1 − 0,3 = 0,7. Сумата от вероятностите на събитие и неговото противоположно винаги е 1.' },
        { q:'При хвърляне на два зара, каква е вероятността и двата да покажат 6?', opts:['1/6','1/12','1/36','2/6'], correct:2, explanation:'Двата зара са независими. P(6 на 1-ви) = 1/6, P(6 на 2-ри) = 1/6. За независими събития: P(A и B) = P(A) × P(B) = 1/6 × 1/6 = 1/36.' },
        { q:'Какво е средна аритметична стойност (средно) за данните: 2, 4, 6, 8, 10?', opts:['5','6','7','8'], correct:1, explanation:'Средна аритметична = сума / брой = (2+4+6+8+10) / 5 = 30 / 5 = 6.' },
        { q:'Медианата на наредена редица 3, 5, 7, 9, 11 е:', opts:['5','7','9','11'], correct:1, explanation:'Медианата е средната стойност при наредена редица. При 5 елемента средният е 3-тият: 3, 5, [7], 9, 11 → медиана = 7.' },
        { q:'При какви условия две събития A и B са независими?', opts:['P(A ∪ B) = 0','P(A ∩ B) = P(A) × P(B)','P(A) = P(B)','A и B не могат едновременно да настъпят'], correct:1, explanation:'Събитията A и B са независими, ако настъпването на едното не влияе на вероятността на другото. Математически: P(A ∩ B) = P(A) · P(B). За зависими: P(A ∩ B) = P(A) · P(B|A).' },
      ]
