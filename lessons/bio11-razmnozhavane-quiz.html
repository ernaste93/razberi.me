          q: 'Колко деления включва мейозата?',

          explanation: 'Мейозата включва 2 последователни деления: Мейоза I (редукционно — разделяне на хомоложните хромозоми, 2n → n) и Мейоза II (екваториално — разделяне на хроматидите, подобно на митоза). Резултатът е 4 хаплоидни клетки.'
        },
        {
          q: 'Кросинговърът се случва в коя фаза на мейозата?',

          explanation: 'Кросинговърът (crossing over) се случва в профаза I, когато хомоложните хромозоми се сдвояват в биваленти. Несестринските хроматиди на хомоложните хромозоми се пресичат и обменят сегменти. Това е ключов механизъм за генетична рекомбинация.'

        },

          q: 'Бинарното разделяне е форма на безполово размножаване, характерна за:',

        },
        {
          q: 'Защо половото размножаване е важно за еволюцията?',
          options: ['Защото е по-бързо от безполовото', 'Защото осигурява генетично разнообразие чрез кросинговър и рекомбинация при оплождане', 'Защото не изисква ДНК', 'Защото клонира организмите'],
          correct: 1,
          explanation: 'Половото размножаване създава генетично разнообразие чрез: 1) кросинговър в мейоза I (рекомбинация в хромозомите); 2) независимо разпределение на хомоложните хромозоми; 3) случайно оплождане. Разнообразието е суровина за естествения отбор и еволюцията.'
        },

          q: 'При кое животно е характерно пъпкуването като форма на безполово размножаване?',
          options: ['Кон', 'Хидра', 'Птица', 'Риба'],
          correct: 1,
          explanation: 'Пъпкуването е характерно за хидра (сладководна полипа) и дрождите (едноклетъчни гъби). При хидрата от тялото израства малка „пъпка", която се развива в нов организъм и се отделя от родителя. Пъпкуването е вид безполово размножаване без намаляване на генетичния материал.'
        }
      ]
