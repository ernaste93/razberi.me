        { q:'Ако P(A ∪ B) = 0,7; P(A) = 0,4; P(B) = 0,5, намери P(A ∩ B).', opts:['0,2','0,3','0,1','1,2'], correct:0, explanation:'Теорема за сумата: P(A ∪ B) = P(A) + P(B) − P(A ∩ B). Следователно: 0,7 = 0,4 + 0,5 − P(A ∩ B) → P(A ∩ B) = 0,9 − 0,7 = 0,2.' },

        { q:'В група от 5 момчета и 3 момичета се избират 2 ученика. По колко начина може да се образува двойка от 2 момичета?', opts:['6','3','8','5'], correct:1, explanation:'Брой начини да се изберат 2 момичета от 3: C(3,2) = 3! / (2! × 1!) = 3. Значи има 3 начина за двойка само от момичета.' },
        { q:'Стандартното отклонение е:', opts:['Квадратът на дисперсията','Коренът квадратен от дисперсията','Средното аритметично','Разликата между максимума и минимума'], correct:1, explanation:'Стандартно отклонение σ = √(дисперсия) = √(σ²). Изразява разсеяността на данните в същите единици като самите данни. По-интуитивно от дисперсията за интерпретация.' },
        { q:'Фактириелът на 5 (5!) е равен на:', opts:['15','25','100','120'], correct:3, explanation:'5! = 5 × 4 × 3 × 2 × 1 = 120. Факториелите се използват при пермутации и комбинации. 0! = 1, 1! = 1, 2! = 2, 3! = 6, 4! = 24, 5! = 120.' },
        { q:'По колко начина могат да се наредят 4 книги на рафт?', opts:['4','12','24','16'], correct:2, explanation:'Пермутации без повторение: P(4) = 4! = 4 × 3 × 2 × 1 = 24. Всяко различно наредждане е различна пермутация.' },
        { q:'Каква е P(A ∪ B), ако A и B са несъвместими (P(A ∩ B) = 0), P(A)=0,3, P(B)=0,4?', opts:['0,12','0,7','0,1','1,0'], correct:1, explanation:'За несъвместими (взаимно изключващи се) събития: P(A ∪ B) = P(A) + P(B) = 0,3 + 0,4 = 0,7. Те не могат едновременно да настъпят, затова пресечението е нула.' },
