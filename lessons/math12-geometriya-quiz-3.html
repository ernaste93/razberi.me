        { q:'Правилна пирамида с квадратна основа (страна 6) и височина 4. Какъв е обемът?', opts:['48','72','96','144'], correct:0, explanation:'S₀ = 6² = 36; V = (1/3)·S₀·h = (1/3)·36·4 = 48. Формулата V = S₀h/3 важи за всяка пирамида — произведението на основата по височината, разделено на 3.' },
