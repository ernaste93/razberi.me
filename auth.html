<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Вход – Разбери.ме</title>
  <link rel="icon" type="image/png" href="logos/tab_transparent.png?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; background: var(--bg) url('/logos/background.png') center top / cover fixed; }
    .auth-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .auth-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo img { height: 110px; }
    .auth-tabs {
      display: flex;
      gap: 0;
      border: 1.5px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 28px;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      color: var(--muted);
      background: none;
      border: none;
      transition: background 0.18s, color 0.18s;
    }
    .auth-tab.active {
      background: var(--accent);
      color: white;
    }
    .auth-form {
      display: none;
      flex-direction: column;
      gap: 14px;
      transition: opacity 0.4s ease;
    }
    .auth-form.active {
      display: flex;
      opacity: 1;
    }
    .auth-form input, .auth-form select {
      padding: 12px 14px;
      border: 1.5px solid var(--line);
      border-radius: 14px;
      font-size: 15px;
      font-family: inherit;
      background: white;
      outline: none;
      transition: border-color 0.18s;
    }
    .auth-form input:focus, .auth-form select:focus { border-color: var(--accent); }
    .auth-form label { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: -8px; text-align: center; }
    .role-select { display: flex; gap: 10px; }
    .role-btn {
      flex: 1;
      padding: 10px;
      border: 1.5px solid var(--line);
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      background: white;
      color: var(--text);
      transition: all 0.18s;
      text-align: center;
    }
    .role-btn.active { border-color: var(--gold); background: var(--gold); color: white; }
    .auth-submit {
      padding: 13px;
      border-radius: 14px;
      border: 0;
      background: var(--accent);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s, transform 0.18s;
      margin-top: 4px;
    }
    .auth-submit:hover { background: var(--accent-dark); transform: translateY(-1px); }
    .auth-msg {
      text-align: center;
      font-size: 14px;
      padding: 10px;
      border-radius: 10px;
      display: none;
    }
    .auth-msg.error { background: #fff0f0; color: #c0392b; display: block; }
    .auth-msg.success { background: #f0fff4; color: var(--success); display: block; }
    .grade-row {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      /* затваряне: opacity изчезва, после height се свива */
      transition: opacity 0.25s ease, max-height 0.4s ease 0.2s;
    }
    .grade-row.visible {
      max-height: 400px;
      opacity: 1;
      pointer-events: auto;
      /* отваряне: height се разтваря, после opacity се появява */
      transition: max-height 0.4s ease, opacity 0.35s ease 0.25s;
    }
    #goal-select { flex-wrap: wrap; }
    #goal-select .role-btn { flex: 1; min-width: 80px; font-size: 13px; padding: 8px 6px; text-align: center; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="/"><img src="logos/transparent_logo.png" alt="Разбери.Ме" /></a>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Вход</button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Регистрация</button>
      </div>

      <!-- Google бутон — общ за вход и регистрация -->
      <button type="button" onclick="handleGoogleLogin()" style="display:flex;align-items:center;justify-content:center;gap:10px;padding:12px;border:1.5px solid var(--line);border-radius:14px;background:white;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--text);transition:border-color 0.18s;width:100%;margin-bottom:16px;" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--line)'">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.08 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-3.59-13.46-8.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Продължи с Google
      </button>
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:16px;">
        <div style="flex:1;height:1px;background:var(--line);"></div>
        <span style="font-size:13px;color:var(--muted);">или с имейл</span>
        <div style="flex:1;height:1px;background:var(--line);"></div>
      </div>

      <div id="msg" class="auth-msg"></div>

      <!-- Login form -->
      <form class="auth-form active" id="form-login" onsubmit="handleLogin(event)">
        <label>Имейл</label>
        <input type="email" id="login-email" placeholder="email@example.com" required />
        <label>Парола</label>
        <input type="password" id="login-password" placeholder="••••••••" required />
        <button type="submit" class="auth-submit">Влез</button>
        <div style="text-align:center;margin-top:10px;">
          <button type="button" onclick="showForgotPassword()" style="background:none;border:none;font-size:13px;color:var(--muted);cursor:pointer;text-decoration:underline;text-underline-offset:3px;font-family:inherit;">Забравена парола?</button>
        </div>
      </form>

      <!-- Забравена парола форма -->
      <div id="form-forgot" class="auth-form" style="display:none;">
        <div style="text-align:center;margin-bottom:16px;">
          <div style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:6px;">Забравена парола</div>
          <div style="font-size:13px;color:var(--muted);line-height:1.55;">Въведи имейла си и ще ти изпратим линк за нулиране на паролата.</div>
        </div>
        <label>Имейл адрес</label>
        <input type="email" id="forgot-email" placeholder="email@example.com" />
        <button type="button" class="auth-submit" onclick="handleForgotPassword()">Изпрати линк</button>
        <div style="text-align:center;margin-top:10px;">
          <button type="button" onclick="showLogin()" style="background:none;border:none;font-size:13px;color:var(--muted);cursor:pointer;text-decoration:underline;text-underline-offset:3px;font-family:inherit;">← Обратно към вход</button>
        </div>
      </div>

      <!-- Register form -->
      <form class="auth-form" id="form-register" onsubmit="handleRegister(event)">
        <label>Пълно име</label>
        <input type="text" id="reg-name" placeholder="Иван Иванов" required />
        <label>Имейл</label>
        <input type="email" id="reg-email" placeholder="email@example.com" required />
        <label>Парола</label>
        <input type="password" id="reg-password" placeholder="Минимум 6 символа" required minlength="6" />
        <label>Клас</label>
        <select id="reg-grade" onchange="onGradeChange(this.value)">
          <option value="7">7. клас</option>
          <option value="8">8. клас</option>
          <option value="9">9. клас</option>
          <option value="10">10. клас</option>
          <option value="11">11. клас</option>
          <option value="12" selected>12. клас</option>
        </select>
        <label>Пол</label>
        <div class="role-select" id="gender-select">
          <div class="role-btn" id="gender-m" onclick="selectGender('m')">Момче</div>
          <div class="role-btn" id="gender-f" onclick="selectGender('f')">Момиче</div>
        </div>
        <label>Цел на обучение</label>
        <div class="role-select" id="goal-select">
          <div class="role-btn" id="goal-general" onclick="selectGoal('general')">Общи знания</div>
          <div class="role-btn" id="goal-nvo" onclick="selectGoal('nvo')">НВО</div>
          <div class="role-btn" id="goal-matura" onclick="selectGoal('matura')">Матури</div>
        </div>
        <button type="submit" class="auth-submit">Създай профил</button>
      </form>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://wbcppvfgtvkrsfmclmjp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7Z_7D7Zpl42erySzKs9FmQ_cB8vt-5l';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);


    function fadeSwitch(outEl, inEl) {
      // Fade out
      outEl.style.opacity = '0';

      setTimeout(() => {
        // Всичко е невидимо – смени формите (height се сменя тихо)
        outEl.classList.remove('active');
        outEl.style.opacity = '';
        inEl.classList.add('active');
        inEl.style.opacity = '0';

        // Fade in
        setTimeout(() => {
          inEl.style.opacity = '1';
          setTimeout(() => { inEl.style.opacity = ''; }, 350);
        }, 20);
      }, 300);
    }

    window.showForgotPassword = function() {
      const loginForm = document.getElementById('form-login');
      const forgotForm = document.getElementById('form-forgot');
      loginForm.style.display = 'none';
      forgotForm.style.display = 'block';
      document.getElementById('tab-login').classList.remove('active');
      document.getElementById('tab-register').classList.remove('active');
      hideMsg();
    };

    window.showLogin = function() {
      const loginForm = document.getElementById('form-login');
      const forgotForm = document.getElementById('form-forgot');
      forgotForm.style.display = 'none';
      loginForm.style.display = '';
      loginForm.classList.add('active');
      document.getElementById('tab-login').classList.add('active');
      hideMsg();
    };

    window.handleForgotPassword = async function() {
      const email = document.getElementById('forgot-email').value.trim();
      if (!email || !email.includes('@')) {
        showMsg('Въведи валиден имейл адрес.', 'error'); return;
      }
      const { error } = await supabase.auth.resetPasswordForEmail(email, {
        redirectTo: window.location.origin + '/settings.html?tab=security'
      });
      if (error) {
        showMsg(error.message, 'error');
      } else {
        showMsg('Линкът е изпратен на ' + email + '. Провери входящата си поща.', 'success');
        document.getElementById('forgot-email').value = '';
      }
    };

    window.switchTab = function(tab) {
      const outEl = document.getElementById(tab === 'login' ? 'form-register' : 'form-login');
      const inEl  = document.getElementById(tab === 'login' ? 'form-login' : 'form-register');
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      hideMsg();
      fadeSwitch(outEl, inEl);
    };


    let selectedGoal = '';
    let selectedGender = '';

    window.selectGender = function(g) {
      selectedGender = g;
      ['m', 'f'].forEach(v =>
        document.getElementById('gender-' + v).classList.toggle('active', v === g)
      );
    };

    window.selectGoal = function(goal) {
      selectedGoal = goal;
      ['general', 'nvo', 'matura'].forEach(g =>
        document.getElementById('goal-' + g).classList.toggle('active', g === goal)
      );
    };

    window.onGradeChange = function(grade) {
      if (grade === '7') selectGoal('nvo');
      else if (grade === '12') selectGoal('matura');
      else selectGoal('general');
    };

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'auth-msg ' + type;
    }

    function hideMsg() {
      document.getElementById('msg').className = 'auth-msg';
    }

    window.handleLogin = async function(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) return showMsg(error.message, 'error');
      const dest = localStorage.getItem('onboardingDone') ? '/dnevnik.html' : '/onboarding.html';
      window.location.href = dest;
    };

    window.handleRegister = async function(e) {
      e.preventDefault();
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const grade = parseInt(document.getElementById('reg-grade').value);
      const goal = selectedGoal;

      const { data, error } = await supabase.auth.signUp({
        email, password,
        options: { data: { full_name: name } }
      });
      if (error) return showMsg(error.message, 'error');

      const userId = data.user?.id;
      if (userId) {
        await supabase.from('profiles').upsert({
          id: userId,
          email,
          full_name: name,
          grade,
          goal,
          gender: selectedGender || null,
          plan: 'trial',
          trial_started_at: new Date().toISOString(),
        }, { onConflict: 'id' });
      }

      showMsg('Профилът е създаден! Провери имейла си за потвърждение.', 'success');
    };

    window.handleGoogleLogin = async function() {
      await supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: window.location.origin + '/dnevnik.html' }
      });
    };

    // Redirect if already logged in
    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.href = '/dnevnik.html';

    // Auto-switch to register tab if URL has #register
    if (window.location.hash === '#register') switchTab('register');
  </script>
</body>
</html>
