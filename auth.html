<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Вход – Разбери.ме</title>
  <link rel="icon" type="image/png" href="logos/tab_transparent.png?v=2" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />

  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; background: var(--bg) url('/logos/background.png') center top / cover fixed; }
    .auth-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }
    .auth-card {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 28px;
      box-shadow: var(--shadow);
      padding: 40px;
      width: 100%;
      max-width: 420px;
    }
    .auth-logo { text-align: center; margin-bottom: 28px; }
    .auth-logo img { height: 110px; }
    .auth-tabs {
      display: flex;
      gap: 0;
      border: 1.5px solid var(--line);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 28px;
    }
    .auth-tab {
      flex: 1;
      padding: 10px;
      text-align: center;
      font-weight: 600;
      font-size: 15px;
      cursor: pointer;
      color: var(--muted);
      background: none;
      border: none;
      transition: background 0.18s, color 0.18s;
    }
    .auth-tab.active {
      background: var(--accent);
      color: white;
    }
    .auth-form {
      display: none;
      flex-direction: column;
      gap: 14px;
      transition: opacity 0.4s ease;
    }
    .auth-form.active {
      display: flex;
      opacity: 1;
    }
    .auth-form input, .auth-form select {
      padding: 12px 14px;
      border: 1.5px solid var(--line);
      border-radius: 14px;
      font-size: 15px;
      font-family: inherit;
      background: white;
      outline: none;
      transition: border-color 0.18s;
    }
    .auth-form input:focus, .auth-form select:focus { border-color: var(--accent); }
    .auth-form label { font-size: 13px; font-weight: 600; color: var(--muted); margin-bottom: -8px; text-align: center; }
    .role-select { display: flex; gap: 10px; }
    .role-btn {
      flex: 1;
      padding: 10px;
      border: 1.5px solid var(--line);
      border-radius: 12px;
      font-weight: 600;
      font-size: 14px;
      cursor: pointer;
      background: white;
      color: var(--text);
      transition: all 0.18s;
      text-align: center;
    }
    .role-btn.active { border-color: var(--gold); background: var(--gold); color: white; }
    .auth-submit {
      padding: 13px;
      border-radius: 14px;
      border: 0;
      background: var(--accent);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.18s, transform 0.18s;
      margin-top: 4px;
    }
    .auth-submit:hover { background: var(--accent-dark); transform: translateY(-1px); }
    .auth-msg {
      text-align: center;
      font-size: 14px;
      padding: 10px;
      border-radius: 10px;
      display: none;
    }
    .auth-msg.error { background: #fff0f0; color: #c0392b; display: block; }
    .auth-msg.success { background: #f0fff4; color: var(--success); display: block; }
    .grade-row {
      display: flex;
      flex-direction: column;
      gap: 14px;
      max-height: 0;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      /* затваряне: opacity изчезва, после height се свива */
      transition: opacity 0.25s ease, max-height 0.4s ease 0.2s;
    }
    .grade-row.visible {
      max-height: 400px;
      opacity: 1;
      pointer-events: auto;
      /* отваряне: height се разтваря, после opacity се появява */
      transition: max-height 0.4s ease, opacity 0.35s ease 0.25s;
    }
    #goal-select { flex-wrap: wrap; }
    #goal-select .role-btn { flex: 1; min-width: 80px; font-size: 13px; padding: 8px 6px; text-align: center; display: flex; align-items: center; justify-content: center; }
  </style>
</head>
<body>
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="/"><img src="logos/transparent_logo.png" alt="Разбери.Ме" /></a>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" id="tab-login" onclick="switchTab('login')">Вход</button>
        <button class="auth-tab" id="tab-register" onclick="switchTab('register')">Регистрация</button>
      </div>

      <div id="msg" class="auth-msg"></div>

      <!-- Login form -->
      <form class="auth-form active" id="form-login" onsubmit="handleLogin(event)">
        <label>Имейл</label>
        <input type="email" id="login-email" placeholder="email@example.com" required />
        <label>Парола</label>
        <input type="password" id="login-password" placeholder="••••••••" required />
        <button type="submit" class="auth-submit">Влез</button>
      </form>

      <!-- Register form -->
      <form class="auth-form" id="form-register" onsubmit="handleRegister(event)">
        <label>Пълно име</label>
        <input type="text" id="reg-name" placeholder="Иван Иванов" required />
        <label>Имейл</label>
        <input type="email" id="reg-email" placeholder="email@example.com" required />
        <label>Парола</label>
        <input type="password" id="reg-password" placeholder="Минимум 6 символа" required minlength="6" />
        <label>Аз съм</label>
        <div class="role-select">
          <div class="role-btn active" id="role-student" onclick="selectRole('student')">Ученик</div>
          <div class="role-btn" id="role-parent" onclick="selectRole('parent')">Родител</div>
        </div>
        <div class="grade-row visible" id="grade-row">
          <label>Клас</label>
          <select id="reg-grade" onchange="onGradeChange(this.value)">
            <option value="7">7. клас</option>
            <option value="8">8. клас</option>
            <option value="9">9. клас</option>
            <option value="10">10. клас</option>
            <option value="11">11. клас</option>
            <option value="12">12. клас</option>
          </select>
          <label>Цел на обучение</label>
          <div class="role-select" id="goal-select">
            <div class="role-btn" id="goal-general" onclick="selectGoal('general')">Общи знания</div>
            <div class="role-btn active" id="goal-nvo" onclick="selectGoal('nvo')">НВО</div>
            <div class="role-btn" id="goal-matura" onclick="selectGoal('matura')">Матури</div>
          </div>
        </div>
        <button type="submit" class="auth-submit">Създай профил</button>
      </form>
    </div>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://wbcppvfgtvkrsfmclmjp.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_7Z_7D7Zpl42erySzKs9FmQ_cB8vt-5l';
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

    let selectedRole = 'student';
    let selectedGoal = 'nvo';

    function fadeSwitch(outEl, inEl) {
      // Fade out
      outEl.style.opacity = '0';

      setTimeout(() => {
        // Всичко е невидимо — смени формите (height се сменя тихо)
        outEl.classList.remove('active');
        outEl.style.opacity = '';
        inEl.classList.add('active');
        inEl.style.opacity = '0';

        // Fade in
        setTimeout(() => {
          inEl.style.opacity = '1';
          setTimeout(() => { inEl.style.opacity = ''; }, 350);
        }, 20);
      }, 300);
    }

    window.switchTab = function(tab) {
      const outEl = document.getElementById(tab === 'login' ? 'form-register' : 'form-login');
      const inEl  = document.getElementById(tab === 'login' ? 'form-login' : 'form-register');
      document.getElementById('tab-login').classList.toggle('active', tab === 'login');
      document.getElementById('tab-register').classList.toggle('active', tab === 'register');
      hideMsg();
      fadeSwitch(outEl, inEl);
    };

    window.selectRole = function(role) {
      selectedRole = role;
      document.getElementById('role-student').classList.toggle('active', role === 'student');
      document.getElementById('role-parent').classList.toggle('active', role === 'parent');
      const gradeRow = document.getElementById('grade-row');
      gradeRow.classList.toggle('visible', role === 'student');
    };

    window.selectGoal = function(goal) {
      selectedGoal = goal;
      ['general', 'nvo', 'matura'].forEach(g =>
        document.getElementById('goal-' + g).classList.toggle('active', g === goal)
      );
    };

    window.onGradeChange = function(grade) {
      if (grade === '7') selectGoal('nvo');
      else if (grade === '12') selectGoal('matura');
      else selectGoal('general');
    };

    function showMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'auth-msg ' + type;
    }

    function hideMsg() {
      document.getElementById('msg').className = 'auth-msg';
    }

    window.handleLogin = async function(e) {
      e.preventDefault();
      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const { error } = await supabase.auth.signInWithPassword({ email, password });
      if (error) return showMsg(error.message, 'error');
      window.location.href = '/dnevnik.html';
    };

    window.handleRegister = async function(e) {
      e.preventDefault();
      const name = document.getElementById('reg-name').value;
      const email = document.getElementById('reg-email').value;
      const password = document.getElementById('reg-password').value;
      const grade = selectedRole === 'student' ? parseInt(document.getElementById('reg-grade').value) : null;
      const goal = selectedRole === 'student' ? selectedGoal : null;

      const { data, error } = await supabase.auth.signUp({
        email, password,
        options: { data: { full_name: name } }
      });
      if (error) return showMsg(error.message, 'error');

      const userId = data.user?.id;
      if (userId) {
        await supabase.from('profiles').upsert({
          id: userId,
          email,
          full_name: name,
          role: selectedRole,
          grade,
          goal,
        }, { onConflict: 'id' });
      }

      showMsg('Профилът е създаден! Провери имейла си за потвърждение.', 'success');
    };

    // Redirect if already logged in
    const { data: { session } } = await supabase.auth.getSession();
    if (session) window.location.href = '/dnevnik.html';
  </script>
</body>
</html>
