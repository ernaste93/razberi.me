<!doctype html>
<html lang="bg">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Уроци – Разбери.Ме</title>
  <link rel="icon" type="image/png" href="logos/tab_transparent.png?v=2"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@400;600;700;800;900&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="styles.css"/>
  <style>
    .ur-wrap { max-width: 1100px; margin: 0 auto; padding: 32px var(--gutter) 80px; }

    /* Header */
    .ur-header { display:flex; align-items:flex-start; justify-content:space-between; margin-bottom:22px; gap:16px; flex-wrap:wrap; background:#fff; border-radius:14px; padding:18px 22px; box-shadow:0 1px 4px rgba(0,0,0,0.06); }
    .ur-title  { font-size:28px; font-weight:900; color:#0f172a; margin:0 0 4px; }
    .ur-sub    { font-size:14px; color:#64748b; margin:0; }

    /* Search */
    .ur-search { position:relative; }
    .ur-search-input {
      padding:9px 14px 9px 38px; border-radius:10px; border:1.5px solid #e2e8f0;
      background:#fff; font-size:14px; font-family:inherit; color:#0f172a;
      width:240px; outline:none; transition:border-color .15s;
    }
    .ur-search-input:focus { border-color:#1a2f5a; }
    .ur-search-icon { position:absolute; left:11px; top:50%; transform:translateY(-50%); color:#94a3b8; pointer-events:none; }

    /* Subject tabs */
    .ur-tabs { display:flex; gap:8px; margin-bottom:16px; flex-wrap:wrap; }
    .ur-tab {
      padding:9px 22px; border-radius:10px; font-size:14px; font-weight:700;
      cursor:pointer; border:1.5px solid #e2e8f0; background:#fff; color:#475569;
      transition:all .15s; font-family:inherit;
    }
    .ur-tab:hover { border-color:#1a2f5a; color:#1a2f5a; }
    .ur-tab.active { background:#1a2f5a; color:#fff; border-color:#1a2f5a; }

    /* Filters */
    .ur-filters { display:flex; gap:14px; margin-bottom:16px; flex-wrap:wrap; align-items:center; }
    .ur-filter-group { display:flex; align-items:center; gap:7px; }
    .ur-filter-label { font-size:10px; font-weight:700; color:#c0c9d8; text-transform:uppercase; letter-spacing:.07em; white-space:nowrap; }
    .ur-filter-sep { width:1px; height:24px; background:#dde4ef; }

    /* Grade dropdown */
    .ur-grade-wrap { position:relative; display:inline-flex; align-items:center; }
    .ur-grade-select {
      appearance:none; -webkit-appearance:none;
      padding:6px 30px 6px 12px; border-radius:8px; border:1.5px solid #e2e8f0;
      background:#fff; font-size:13px; font-weight:700; font-family:inherit;
      color:#1a2f5a; cursor:pointer; outline:none; transition:border-color .15s;
    }
    .ur-grade-select:hover { border-color:#3b82f6; }
    .ur-grade-select.changed { border-color:#3b82f6; background:#eff6ff; color:#1d4ed8; }
    .ur-grade-chevron { position:absolute; right:9px; pointer-events:none; color:#64748b; }

    /* Status buttons */
    .ur-sf {
      padding:6px 13px; border-radius:8px; font-size:13px; font-weight:700;
      cursor:pointer; border:1.5px solid #e2e8f0; background:#fff; color:#64748b;
      transition:all .15s; font-family:inherit;
    }
    .ur-sf:hover  { border-color:#E8A020; color:#E8A020; }
    .ur-sf.active { background:#E8A020; color:#fff; border-color:#E8A020; }

    /* Summary bar */
    .ur-summary {
      background:#fff; border:1.5px solid #e8edf5; border-radius:12px;
      padding:11px 18px; margin-bottom:24px;
      display:flex; align-items:center; gap:6px; flex-wrap:wrap; min-height:44px;
    }
    .ur-sum-item  { font-size:13px; color:#475569; white-space:nowrap; }
    .ur-sum-num   { font-weight:800; color:#0f172a; }
    .ur-sum-sep   { color:#cbd5e1; }
    .ur-sum-done  { font-weight:800; color:#1a2f5a; }
    .ur-sum-score { font-weight:800; color:#16a34a; }

    /* Panels */
    @keyframes ur-panel-in {
      from { opacity:0; transform:translateY(-10px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .ur-panel { display:none; }
    .ur-panel.active { display:block; animation:ur-panel-in .25s ease both; }

    /* Grade sections */
    .ur-grade { margin-bottom:36px; }
    .ur-grade.hidden { display:none; }
    .ur-grade-title {
      font-size:13px; font-weight:800; text-transform:uppercase;
      letter-spacing:.08em; color:#94a3b8; margin-bottom:14px;
      display:flex; align-items:center; gap:10px;
    }
    .ur-grade-title::after { content:''; flex:1; height:1px; background:#e8edf5; }

    /* Category groups */
    .ur-cat-group { margin-bottom:28px; }
    .ur-cat-title {
      font-size:12px; font-weight:800; color:#64748b;
      margin-bottom:12px; display:flex; align-items:center; gap:8px;
    }
    .ur-cat-title::after { content:''; flex:1; height:1px; background:#f1f5f9; }

    /* Cards */
    .ur-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
    @media (max-width:900px) { .ur-grid { grid-template-columns:repeat(2,1fr); } }
    @media (max-width:560px) { .ur-grid { grid-template-columns:1fr; } }

    .ur-card {
      background:#fff; border:1.5px solid #e8edf5; border-radius:14px;
      padding:16px 18px; transition:box-shadow .2s, border-color .2s, transform .2s;
      text-decoration:none; display:block; color:inherit;
    }
    .ur-card:hover { box-shadow:0 8px 24px rgba(26,47,90,.11); border-color:#c7d2e8; transform:translateY(-2px); }
    .ur-card.locked { opacity:.45; pointer-events:none; }
    .ur-card.ur-hide { display:none !important; }

    .ur-card-top { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:3px; }
    .ur-card-title { font-size:13px; font-weight:800; color:#0f172a; line-height:1.35; }

    .ur-badge {
      flex-shrink:0; font-size:10px; font-weight:800; padding:2px 8px;
      border-radius:20px; white-space:nowrap;
      background:#f1f5f9; color:#94a3b8; /* default: Ново */
    }
    .ur-badge.started  { background:#dbeafe; color:#1d4ed8; }
    .ur-badge.done     { background:#dcfce7; color:#16a34a; }
    .ur-badge.low      { background:#fef3c7; color:#d97706; }
    .ur-badge.bad      { background:#fee2e2; color:#dc2626; }
    .ur-badge.review   { background:#fef3c7; color:#d97706; }

    .ur-card-meta { font-size:11px; color:#94a3b8; font-weight:600; margin-bottom:10px; }

    .ur-prog { display:none; margin-bottom:0; }
    .ur-prog-bar { height:3px; background:#f1f5f9; border-radius:2px; overflow:hidden; margin-bottom:3px; margin-top:10px; }
    .ur-prog-fill { height:100%; background:#1a2f5a; border-radius:2px; transition:width .4s ease; }
    .ur-prog-lbl { font-size:10px; color:#94a3b8; font-weight:600; }

    .ur-card-time {
      display:inline-block; font-size:10px; font-weight:700; text-transform:uppercase;
      letter-spacing:.05em; color:#94a3b8; background:#f8fafc;
      padding:2px 7px; border-radius:6px; margin-bottom:8px;
    }

    /* Empty state */
    .ur-empty { text-align:center; padding:56px 20px; color:#94a3b8; display:none; }
    .ur-empty-icon { font-size:36px; margin-bottom:10px; }
    .ur-empty-text { font-size:15px; font-weight:700; }
    .ur-empty-sub  { font-size:13px; margin-top:4px; }

    /* Review disabled button */
    .ur-sf.review-locked { opacity:.45; cursor:not-allowed; position:relative; }
    .ur-sf.review-locked:hover { border-color:#e2e8f0; color:#64748b; background:#fff; }
    .ur-sf.review-locked::after {
      content: attr(data-tip);
      position:absolute; bottom:calc(100% + 8px); left:50%; transform:translateX(-50%);
      background:#1e293b; color:#fff; font-size:11px; font-weight:600;
      padding:6px 10px; border-radius:8px; white-space:nowrap;
      pointer-events:none; opacity:0; transition:opacity .15s;
    }
    .ur-sf.review-locked:hover::after { opacity:1; }

    /* Exam prep banner */
    #ur-exam-banner {
      display:none; background:linear-gradient(135deg,#1a2f5a,#2563eb);
      color:#fff; border-radius:14px; padding:16px 22px; margin-bottom:20px;
      align-items:center; gap:16px; flex-wrap:wrap;
    }
    #ur-exam-banner.show { display:flex; }
    .ur-exam-icon { font-size:28px; flex-shrink:0; }
    .ur-exam-text { flex:1; }
    .ur-exam-title { font-size:15px; font-weight:800; margin-bottom:2px; }
    .ur-exam-sub   { font-size:13px; opacity:.85; }
    .ur-exam-count { font-size:22px; font-weight:900; flex-shrink:0; }

    /* Trial banner */
    #trial-banner {
      display:none; background:linear-gradient(90deg,#1d4ed8,#2563eb); color:#fff;
      padding:11px 24px; text-align:center; font-size:14px; font-weight:500;
    }
  </style>
</head>
<body>

<!-- kept for nav.js compatibility -->
<header class="topbar" style="display:none">
  <div class="topbar-main">
    <div class="brand"><a href="/"><img src="logos/transparent_logo.png" alt="Разбери.Ме" class="logo-img"/></a></div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:8px;">
      <div class="user-menu" id="user-menu" style="display:none">
        <button class="user-chip" id="user-chip" aria-expanded="false">
          <span class="user-avatar" id="user-avatar">?</span>
          <script>(function(){var i=localStorage.getItem('userInitials');if(i)document.getElementById('user-avatar').textContent=i;})()</script>
          <span class="user-chevron">▾</span>
        </button>
        <div class="user-dropdown" id="user-dropdown">
          <div class="user-email">
            <div class="user-fullname" id="user-fullname-label"></div>
            <div class="user-emailaddr" id="user-email-label"></div>
          </div>
          <a href="/settings.html">Настройки</a>
          <a href="/dnevnik-book.html">Оценки</a>
          <a href="/admin.html" id="btn-admin" style="display:none">Админ панел</a>
          <div class="dropdown-divider"></div>
          <button id="btn-logout">Изход</button>
        </div>
      </div>
    </div>
  </div>
</header>

<div id="trial-banner"><span id="trial-banner-text"></span></div>

<main>
  <div class="ur-wrap">

    <div class="ur-header">
      <div>
        <h1 class="ur-title">Уроци</h1>
        <p class="ur-sub">Избери предмет и клас – прочети урока, после реши тестовете.</p>
      </div>
      <div class="ur-search">
        <svg class="ur-search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
        <input class="ur-search-input" id="ur-search" type="text" placeholder="Търси автор или произведение…" oninput="applyFilters()"/>
      </div>
    </div>

    <div class="ur-tabs">
      <button class="ur-tab active" data-tab="bel"  onclick="setTab('bel',this)">БЕЛ</button>
      <button class="ur-tab"        data-tab="math" onclick="setTab('math',this)">Математика</button>
      <button class="ur-tab"        data-tab="bio"  onclick="setTab('bio',this)">Биология</button>
      <button class="ur-tab"        data-tab="chem" onclick="setTab('chem',this)">Химия</button>
    </div>

    <div class="ur-filters">
      <div class="ur-filter-group">
        <span class="ur-filter-label">Клас</span>
        <div class="ur-grade-wrap">
          <select class="ur-grade-select" id="ur-grade-select" onchange="setGrade(this.value, this)">
            <option value="all">Всички класове</option>
            <option value="12">12 клас</option>
            <option value="11">11 клас</option>
            <option value="10">10 клас</option>
            <option value="9">9 клас</option>
            <option value="7">7 клас</option>
          </select>
          <svg class="ur-grade-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="ur-filter-sep"></div>
      <div class="ur-filter-group">
        <span class="ur-filter-label">Статус</span>
        <button class="ur-sf active" onclick="setStatus('all',this)">Всички</button>
        <button class="ur-sf" onclick="setStatus('unseen',this)">Незапочнати</button>
        <button class="ur-sf" onclick="setStatus('started',this)">Започнати</button>
        <button class="ur-sf" onclick="setStatus('done',this)">Завършени</button>
        <button class="ur-sf review-locked" id="btn-review" onclick="setStatus('review',this)" data-tip="Достъпно след ≥80% завършени уроци">За преговор</button>
      </div>
    </div>

    <div class="ur-summary" id="ur-summary"><span class="ur-sum-item">Зарежда…</span></div>

    <div id="ur-exam-banner">
      <div class="ur-exam-icon">📚</div>
      <div class="ur-exam-text">
        <div class="ur-exam-title">Режим „За преговор"</div>
        <div class="ur-exam-sub" id="ur-exam-sub">Уроци с резултат под 80% – повтори ги преди матурата.</div>
      </div>
      <div class="ur-exam-count" id="ur-exam-count"></div>
    </div>

    <div id="ur-panels"></div>

  </div>
</main>

let progressMap   = {};

// ── Render ────────────────────────────────────────────────────────────────────
function renderPanels() {
  document.getElementById('ur-panels').innerHTML = SUBJECTS.map(s => `
    <div class="ur-panel${s.id === currentTab ? ' active' : ''}" id="tab-${s.id}">
      ${[12, 11, 10, 7].filter(g => s.grades[g]).map(g => {
        const byCat = {};
        s.grades[g].forEach(t => { if (!byCat[t.group]) byCat[t.group] = []; byCat[t.group].push(t); });
        return `
          <div class="ur-grade" data-grade="${g}">
            <div class="ur-grade-title">${g} клас</div>
            ${Object.entries(byCat).map(([cat, lessons]) => `
              <div class="ur-cat-group">
                <div class="ur-cat-title">${cat}</div>
                <div class="ur-grid">${lessons.map(l => cardHTML(l, g)).join('')}</div>
              </div>
            `).join('')}
            <div class="ur-empty" id="empty-${s.id}-${g}">
              <div class="ur-empty-icon">🔍</div>
              <div class="ur-empty-text">Няма намерени уроци</div>
              <div class="ur-empty-sub">Опитай с различно търсене или филтър</div>
            </div>
          </div>`;
      }).join('')}
    </div>
  `).join('');
}

function cardHTML(lesson, grade) {
  return `<a class="ur-card" href="/lessons/${lesson.slug}.html"
      data-slug="${lesson.slug}" data-grade="${grade}" data-completed="0" data-review="false" data-read-pct="0">
    <div class="ur-card-top">
      <div class="ur-card-title">${lesson.title}</div>
      <div class="ur-badge" id="ubadge-${lesson.slug}">Ново</div>
    </div>
    <div class="ur-card-meta">${lesson.meta}</div>
    <span class="ur-card-time">${lesson.time}</span>
    <div class="ur-prog" id="uprog-${lesson.slug}">
      <div class="ur-prog-bar"><div class="ur-prog-fill" id="ufill-${lesson.slug}" style="width:0%"></div></div>
      <div class="ur-prog-lbl" id="ulbl-${lesson.slug}"></div>
    </div>
  </a>`;
}

// ── Controls ──────────────────────────────────────────────────────────────────
function setTab(id, btn) {
  currentTab = id;
  document.querySelectorAll('.ur-panel').forEach(p => p.classList.remove('active'));
  const panel = document.getElementById('tab-' + id);
  panel.style.animation = 'none'; panel.offsetHeight; panel.style.animation = '';
  panel.classList.add('active');
  document.querySelectorAll('.ur-tab').forEach(b => b.classList.toggle('active', b.dataset.tab === id));
  const subject = SUBJECTS.find(s => s.id === id);
  document.getElementById('ur-search').placeholder = subject.searchPlaceholder;
  applyFilters();
  updateSummary();
  updateReviewButton();
}

function setGrade(grade, el) {
  currentGrade = grade;
  document.getElementById('ur-grade-select').classList.toggle('changed', grade !== 'all');
  applyFilters();
  updateSummary();
  updateReviewButton();
}

function setStatus(status, btn) {
  if (status === 'review' && btn.classList.contains('review-locked')) return;
  currentStatus = status;
  document.querySelectorAll('.ur-sf').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const banner = document.getElementById('ur-exam-banner');
  if (banner) banner.classList.toggle('show', status === 'review');
  applyFilters();
}

function getCompletionPct() {
  const subject = SUBJECTS.find(s => s.id === currentTab);
  let total = 0, done = 0;
  [12, 11].forEach(g => {
    if (!subject.grades[g]) return;
    if (currentGrade !== 'all' && currentGrade !== String(g)) return;
    subject.grades[g].forEach(l => {
      total++;
      const p = progressMap[l.slug];
      const readPct = parseInt(localStorage.getItem('lp_' + l.slug) ? JSON.parse(localStorage.getItem('lp_' + l.slug)).p : 0);
      if ((p && p.completed === 3) || readPct >= 100) done++;
    });
  });
  return total > 0 ? done / total : 0;
}

function updateReviewButton() {
  const btn = document.getElementById('btn-review');
  if (!btn) return;
  const pct = getCompletionPct();
  const unlocked = pct >= 0.8;
  btn.classList.toggle('review-locked', !unlocked);
  if (unlocked) {
    btn.removeAttribute('data-tip');
    // Count review candidates
    const reviewCount = document.querySelectorAll('.ur-card[data-review="true"]:not(.ur-hide)').length;
    const countEl = document.getElementById('ur-exam-count');
    const subEl   = document.getElementById('ur-exam-sub');
    if (countEl) countEl.textContent = reviewCount + ' урока';
    if (subEl)   subEl.textContent   = reviewCount > 0
      ? 'Уроци с резултат под 80% – повтори ги преди матурата.'
      : 'Отличен резултат – всичко е усвоено над 80%!';
  } else {
    const needed = Math.ceil(0.8 * (() => {
      const s = SUBJECTS.find(x => x.id === currentTab);
      let t = 0;
      [12,11,10].forEach(g => { if (s.grades[g] && (currentGrade === 'all' || currentGrade === String(g))) t += s.grades[g].length; });
      return t;
    })());
    btn.setAttribute('data-tip', `Достъпно след ${needed} завършени урока (≥80%)`);
  }
}

// ── Filters ───────────────────────────────────────────────────────────────────
function applyFilters() {
  const q = document.getElementById('ur-search').value.toLowerCase().trim();
  const panel = document.getElementById('tab-' + currentTab);
  if (!panel) return;

  panel.querySelectorAll('.ur-grade').forEach(section => {
    const g = section.dataset.grade;
    const gradeHidden = currentGrade !== 'all' && currentGrade !== g;
    section.classList.toggle('hidden', gradeHidden);
    if (gradeHidden) return;

    let visible = 0;
    section.querySelectorAll('.ur-card').forEach(card => {
      const title     = card.querySelector('.ur-card-title').textContent.toLowerCase();
      const meta      = card.querySelector('.ur-card-meta').textContent.toLowerCase();
      const completed = parseInt(card.dataset.completed || '0');
      const isReview  = card.dataset.review === 'true';

      let show = true;
      if (q && !title.includes(q)) show = false;
      const readPct   = parseInt(card.dataset.readPct || '0');
      const readDone  = readPct >= 100;
      if (currentStatus === 'unseen'  && (completed > 0 || readPct >= 3))                                               show = false;
      if (currentStatus === 'started' && !((completed > 0 && completed < 3) || (completed === 0 && readPct >= 3 && !readDone))) show = false;
      if (currentStatus === 'done'    && completed < 3 && !readDone)                                                    show = false;
      if (currentStatus === 'review'  && !isReview)                         show = false;

      card.classList.toggle('ur-hide', !show);
      if (show) visible++;
    });

    // Hide category groups with no visible cards
    section.querySelectorAll('.ur-cat-group').forEach(group => {
      const hasVisible = group.querySelectorAll('.ur-card:not(.ur-hide)').length > 0;
      group.style.display = hasVisible ? '' : 'none';
    });

    const empty = document.getElementById(`empty-${currentTab}-${g}`);
    if (empty) empty.style.display = 'none';
    // Скрий цялата секция ако няма видими уроци (при активно търсене или филтър)
    section.style.display = visible === 0 ? 'none' : '';
  });
}

// ── Summary bar ───────────────────────────────────────────────────────────────
function updateSummary() {
  const subject = SUBJECTS.find(s => s.id === currentTab);
  let lessons = 0, doneCount = 0, scores = [];

  [12, 11].forEach(g => {
    if (!subject.grades[g]) return;
    if (currentGrade !== 'all' && currentGrade !== String(g)) return;
    subject.grades[g].forEach(l => {
      lessons++;
      const p = progressMap[l.slug];
      if (p) {
        if (p.completed === 3) doneCount++;
        if (p.completed > 0) scores.push(p.avgScore);
      }
    });
  });

  const avgScore = scores.length ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length) : null;

  const progressPart = avgScore !== null
    ? `<span class="ur-sum-sep">·</span>
       <span class="ur-sum-item"><span class="ur-sum-done">${doneCount}</span> завършени</span>
       <span class="ur-sum-sep">·</span>
       <span class="ur-sum-item">Среден резултат <span class="ur-sum-score">${avgScore}%</span></span>`
    : '';

  document.getElementById('ur-summary').innerHTML = `
    <span class="ur-sum-item"><span class="ur-sum-num">${lessons}</span> урока</span>
    <span class="ur-sum-sep">·</span>
    <span class="ur-sum-item"><span class="ur-sum-num">${lessons * 3}</span> теста</span>
    <span class="ur-sum-sep">·</span>
    <span class="ur-sum-item">3 нива на трудност</span>
    ${progressPart}
  `;
}

// ── Progress from Supabase ────────────────────────────────────────────────────
async function loadProgress() {
  try {
    const mod = await import('https://esm.sh/@supabase/supabase-js@2');
    const sb  = mod.createClient(
      'https://wbcppvfgtvkrsfmclmjp.supabase.co',
      'sb_publishable_7Z_7D7Zpl42erySzKs9FmQ_cB8vt-5l'
    );
    const { data: { session } } = await sb.auth.getSession();
    if (!session) return;

    const { data: results } = await sb
      .from('quiz_results')
      .select('lesson_slug, score')
      .eq('user_id', session.user.id);

    // Apply reading progress from localStorage (works even if no quiz results)
    applyReadingProgress();

    if (!results || !results.length) return;

    const raw = {};
    results.forEach(r => {
      const m    = r.lesson_slug.match(/-quiz(-(\d))?$/);
      const num  = m ? (m[2] ? parseInt(m[2]) : 1) : null;
      const base = r.lesson_slug.replace(/-quiz(-\d)?$/, '');
      if (!num) return;
      if (!raw[base]) raw[base] = [null, null, null];
      raw[base][num - 1] = Number(r.score);
    });

    Object.entries(raw).forEach(([base, scores]) => {
      const done = scores.filter(s => s !== null);
      const avg  = done.length ? Math.round(done.reduce((a, b) => a + b, 0) / done.length) : 0;
      progressMap[base] = { scores, completed: done.length, avgScore: avg, isReview: avg < 80 && done.length > 0 };
    });

    document.querySelectorAll('.ur-card').forEach(card => {
      const slug = card.dataset.slug;
      const p    = progressMap[slug];
      if (!p) return;

      card.dataset.completed = p.completed;
      card.dataset.review    = p.isReview;

      const badge = document.getElementById('ubadge-' + slug);
      if (badge) {
        if (p.isReview) {
          badge.textContent = 'За преговор'; badge.className = 'ur-badge review';
        } else if (p.completed === 3) {
          badge.textContent = '✓ ' + p.avgScore + '%';
          badge.className   = 'ur-badge done' + (p.avgScore < 70 ? ' low' : '');
        } else {
          badge.textContent = p.completed + '/3 теста'; badge.className = 'ur-badge started';
        }
      }

      if (p.completed > 0) {
        const prog = document.getElementById('uprog-' + slug);
        const fill = document.getElementById('ufill-' + slug);
        const lbl  = document.getElementById('ulbl-' + slug);
        if (prog && fill && lbl) {
          prog.style.display = 'block';
          fill.style.width   = (p.completed / 3 * 100) + '%';
          lbl.textContent    = 'Прогрес: ' + p.completed + '/3 теста';
        }
      }
    });

    applyFilters();
    updateSummary();
    updateReviewButton();
  } catch (e) {}
}

// ── Reading progress from localStorage ───────────────────────────────────────
function applyReadingProgress() {
  document.querySelectorAll('.ur-card').forEach(card => {
    const slug    = card.dataset.slug;
    const readRaw = localStorage.getItem('lp_' + slug);
    if (!readRaw) return;
    const pct = JSON.parse(readRaw).p || 0;
    if (pct < 3) return;

    card.dataset.readPct = pct;

    // Only update badge/bar if no quiz data exists yet
    if (parseInt(card.dataset.completed || '0') > 0) return;

    const badge = document.getElementById('ubadge-' + slug);
    if (badge) {
      badge.textContent = pct >= 100 ? '✓ Прочетен' : 'Четен ' + pct + '%';
      badge.className   = pct >= 100 ? 'ur-badge done' : 'ur-badge started';
    }

    const prog = document.getElementById('uprog-' + slug);
    const fill = document.getElementById('ufill-' + slug);
    const lbl  = document.getElementById('ulbl-' + slug);
    if (prog && fill && lbl) {
      prog.style.display  = 'block';
      fill.style.width    = pct + '%';
      fill.style.background = '#3b82f6';
      lbl.textContent     = 'Прочетено: ' + pct + '%';
    }
  });
}

// ── Init ──────────────────────────────────────────────────────────────────────
renderPanels();
applyReadingProgress();
updateSummary();
updateReviewButton();
loadProgress();
</script>

<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
  const sb = createClient('https://wbcppvfgtvkrsfmclmjp.supabase.co','sb_publishable_7Z_7D7Zpl42erySzKs9FmQ_cB8vt-5l');
  const { data: { session } } = await sb.auth.getSession();
  if (!session) { window.location.href = '/auth.html'; }

  const ADMIN_EMAILS = ['kirilmodev@gmail.com', 'help.razberi.me@gmail.com'];
  if (ADMIN_EMAILS.includes(session.user.email)) document.getElementById('btn-admin').style.display = '';
  if (!ADMIN_EMAILS.includes(session.user.email)) {
    const { data: rows } = await sb.from('profiles')
      .select('plan, trial_started_at, trial_quizzes_done, trial_lessons_opened')
      .eq('id', session.user.id).limit(1);
    let profile     = rows?.[0];
    const PAID_PLANS_FE = new Set(['active', 'focus', 'podgotovka', 'otlichnik']);
    const isExpired   = profile?.plan === 'expired';
    const isTrial     = !profile || (!PAID_PLANS_FE.has(profile.plan) && !isExpired);
    // Backfill: old users without trial_started_at get it set now
    if (isTrial && profile && !profile.trial_started_at) {
      const now = new Date().toISOString();
      await sb.from('profiles').update({ trial_started_at: now, plan: 'trial' }).eq('id', session.user.id);
      profile = { ...profile, trial_started_at: now, plan: 'trial' };
    }
    const trialExpired = isTrial && profile?.trial_started_at &&
      (Date.now() - new Date(profile.trial_started_at)) / 86400000 > TRIAL_DAYS;

    if (isTrial && !trialExpired && profile?.trial_started_at) {
      document.getElementById('trial-banner').style.display = 'block';
      const daysLeft = Math.max(0, TRIAL_DAYS - Math.floor((Date.now() - new Date(profile.trial_started_at)) / 86400000));
      const trialLessons = profile?.trial_lessons_opened || [];
      const quizDone = (profile?.trial_quizzes_done || []).length;
      document.getElementById('trial-banner-text').innerHTML =
        `Безплатна версия – <strong>${Math.min(trialLessons.length,3)}/3 урока</strong> · <strong>${Math.min(quizDone,3)}/3 теста</strong> · остават <strong>${daysLeft} дни</strong>. <a href="/index.html#pricing" style="color:#fde68a;font-weight:700;text-decoration:underline;">Виж плановете →</a>`;
    }

    function lockCard(card) {
      card.classList.add('locked');
      card.removeAttribute('href');
      if (!card.querySelector('.lock-icon')) {
        const lock = document.createElement('span');
        lock.className = 'lock-icon';
        lock.textContent = '🔒';
        lock.style.cssText = 'position:absolute;top:10px;right:12px;font-size:16px;';
        card.style.position = 'relative';
        card.prepend(lock);
      }
    }

    if (isExpired) {
      document.querySelectorAll('.ur-card').forEach(card => lockCard(card));
      document.getElementById('trial-banner').style.display = 'block';
      document.getElementById('trial-banner-text').innerHTML =
        `Абонаментът ти е изтекъл. <a href="/index.html#pricing" style="color:#fde68a;font-weight:700;text-decoration:underline;">Поднови плана →</a>`;
    }

    if (!isExpired && (isTrial || trialExpired)) {
      // Hide 11 клас grade section
      document.querySelectorAll('.ur-grade[data-grade="11"]').forEach(el => el.style.display = 'none');

      const trialLessons = profile?.trial_lessons_opened || [];
      document.querySelectorAll('.ur-card').forEach(card => {
        const slug  = card.dataset.slug || '';
        const isBel = slug.startsWith('bel');
        if (!isBel) {
          lockCard(card);
        } else if (trialLessons.length >= 3 && !trialLessons.includes(slug)) {
          lockCard(card);
        }
      });

      if (trialExpired) {
        document.querySelectorAll('.ur-card').forEach(card => lockCard(card));
        const banner = document.createElement('div');
        banner.style.cssText = 'background:#fee2e2;border:1px solid #fca5a5;border-radius:12px;padding:16px 20px;text-align:center;margin:20px 0;font-weight:600;color:#b91c1c;';
        banner.innerHTML = 'Пробният ти период е изтекъл. <a href="/index.html#pricing" style="color:#b91c1c;text-decoration:underline;">Избери план →</a>';
        document.querySelector('main')?.prepend(banner);
      }

      const params = new URLSearchParams(window.location.search);
      const tabParam = params.get('tab');
      if (tabParam && ['bel','math','bio','chem'].includes(tabParam)) {
        const btn = document.querySelector(`.ur-tab[data-tab="${tabParam}"]`);
        if (btn) setTab(tabParam, btn);
      }
      if (params.get('trial_limit')) {
        const type = params.get('trial_limit') === 'lesson' ? 'уроци' : 'теста';
        const msg = document.createElement('div');
        msg.style.cssText = 'background:#fef3c7;border:1px solid #fcd34d;border-radius:12px;padding:14px 20px;text-align:center;margin:16px 0;color:#92400e;font-weight:600;';
        msg.innerHTML = `Достигна лимита от 3 ${type}. <a href="/index.html#pricing" style="color:#92400e;text-decoration:underline;">Виж плановете →</a>`;
        document.querySelector('main')?.prepend(msg);
        history.replaceState({}, '', '/urotsi.html');
      }
    }
  }
</script>
