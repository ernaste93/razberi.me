      --ink:   #1e293b;
      --muted: #64748b;

      --bg:    #f8fafc;
      --paper: #ffffff;

    * { box-sizing: border-box; margin: 0; padding: 0; }
    a, button, img { -webkit-user-drag: none; user-drag: none; user-select: none; }

    .topbar {
      background: var(--navy);
      height: 52px; display: flex; align-items: center;
      padding: 0 24px; gap: 16px; position: sticky; top: 0; z-index: 100;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
    }
    .topbar-back { color: rgba(255,255,255,0.6); text-decoration: none; font-size: 13px; font-weight: 700; transition: color .15s; }
    .topbar-back:hover { color: #fff; }
    .topbar-title { color: #fff; font-size: 16px; font-weight: 800; }

    /* ── Page ── */
    .page { max-width: 900px; margin: 0 auto; padding: 32px 20px 60px; }

    /* ── Student header ── */
    .student-hdr {
      display: flex; align-items: flex-start; justify-content: space-between;
      margin-bottom: 28px; gap: 16px; flex-wrap: wrap;
    }
    .student-name { font-size: 22px; font-weight: 800; color: var(--navy); }
    .student-year { font-size: 12px; color: var(--muted); font-weight: 700; margin-top: 2px; }
    .student-meta { display: flex; gap: 16px; margin-top: 8px; flex-wrap: wrap; }
    .student-stat { font-size: 12px; font-weight: 700; color: var(--muted); display: flex; align-items: center; gap: 4px; }
    .student-stat strong { color: var(--ink); }
    .overall-chip {
      display: flex; flex-direction: column; align-items: center;
      background: var(--navy); color: #fff;
      border-radius: 14px; padding: 10px 20px; min-width: 80px;
    }
    .overall-chip-lbl { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: .1em; opacity: .6; }
    .overall-chip-val { font-size: 26px; font-weight: 900; line-height: 1; margin-top: 2px; letter-spacing: -.5px; }

    /* ── Section tabs ── */
    .tabs { display: flex; gap: 6px; margin-bottom: 24px; flex-wrap: wrap; }
    .tab {
      padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 700;
      border: 2px solid var(--border); background: var(--paper); color: var(--muted);
      cursor: pointer; transition: all .15s;
    }
    .tab.active { background: var(--navy); color: #fff; border-color: var(--navy); }
    .tab:hover:not(.active) { border-color: var(--navy); color: var(--navy); }

    /* ── Subject card ── */
    .subj-card {
      background: var(--paper);
      border: 1.5px solid var(--border);
      border-radius: 16px;
      margin-bottom: 20px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.05);
    }
    .subj-card-hdr {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 12px;
    }
    .subj-color-dot {
      width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; margin-right: 10px;
    }
    .subj-name { font-size: 15px; font-weight: 800; flex: 1; }
    .subj-avg-wrap { display: flex; align-items: baseline; gap: 6px; }
    .subj-avg { font-size: 28px; font-weight: 900; line-height: 1; letter-spacing: -.5px; }
    .subj-avg-cat { font-size: 12px; font-weight: 800; margin-top: 2px; }
    .subj-avg-lbl { font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }

    /* ── Subject stats row ── */
    .subj-stats {
      display: flex; gap: 12px; padding: 0 20px 12px; flex-wrap: wrap;
      border-bottom: 1.5px solid var(--border);
    }
    .stat-pill {
      font-size: 11px; font-weight: 700; color: var(--muted);
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 20px; padding: 3px 10px;
      display: flex; align-items: center; gap: 4px;
    }
    .stat-pill strong { color: var(--ink); }

    /* ── Table summary row ── */
    .tbl-summary-row td { background: #e8edf5; border-top: 1.5px solid #c7d2e8 !important; border-bottom: 1.5px solid #c7d2e8 !important; padding-top: 10px !important; padding-bottom: 10px !important; }

    /* ── BEL grade breakdown ── */
    .bel-breakdown { margin: 0 20px 12px; border-radius: 10px; border: 1.5px solid var(--border); overflow: hidden; }
    .bel-breakdown-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 14px; font-size: 13px;
    }
    .bel-breakdown-row + .bel-breakdown-row { border-top: 1px solid var(--border); }
    .bel-breakdown-lbl { font-weight: 600; color: var(--muted); }
    .bel-breakdown-val { font-weight: 800; }
    .bel-breakdown-total {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 14px; font-size: 13px;
      background: var(--bg); border-top: 1.5px solid var(--border);
    }
    .bel-breakdown-total .bel-breakdown-lbl { color: var(--ink); font-weight: 700; }

    /* ── Progress bar ── */
    .subj-prog { padding: 10px 20px 14px; border-bottom: 1.5px solid var(--border); }
    .prog-bar { height: 5px; background: var(--border); border-radius: 5px; overflow: hidden; margin-top: 6px; }
    .prog-fill { height: 100%; border-radius: 5px; }

    /* ── Tests table ── */
    .tests-table { width: 100%; border-collapse: collapse; }
    .tests-table th {
      padding: 8px 14px; font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: .07em; color: var(--muted);
      text-align: left; background: #f8fafc; border-bottom: 1px solid var(--border);
    }
    .tests-table th:last-child, .tests-table th.th-r { text-align: right; }
    .tests-table td {
      padding: 10px 14px; font-size: 13px; font-weight: 600;
      border-bottom: 1px solid var(--border); color: var(--ink);
    }
    .tests-table tr:last-child td { border-bottom: none; }
    .tests-table td.td-grade {
      font-size: 13px; font-weight: 800;
      text-align: right; padding-right: 18px;
    }
    .tests-table td.td-r { text-align: right; }
    .tests-table td.td-date { color: var(--muted); font-size: 12px; }
    .tests-table td.td-attempt { color: var(--muted); font-size: 11px; font-weight: 700; white-space: nowrap; }
    .tests-table td.td-delta { font-size: 11px; font-weight: 800; text-align: right; white-space: nowrap; }
    .badge {
      display: inline-block; border-radius: 6px; padding: 2px 7px;
      font-size: 11px; font-weight: 800;
    }

    /* ── Section divider in table ── */
    .tbl-section-hdr td {
      background: #f8fafc; font-size: 10px; font-weight: 800;
      text-transform: uppercase; letter-spacing: .07em; color: var(--muted);
      padding: 6px 14px; border-bottom: 1px solid var(--border);
    }

    /* ── Empty ── */
    .empty-card {
      background: var(--paper); border: 1.5px dashed var(--border);
      border-radius: 16px; padding: 40px 20px; text-align: center;
      color: var(--muted); font-size: 14px; margin-bottom: 20px;
    }

    /* ── Loading ── */
    .loading { text-align: center; padding: 60px 20px; color: var(--muted); font-size: 14px; }
    .spinner {
      width: 32px; height: 32px; border: 3px solid var(--border);
      border-top-color: var(--navy); border-radius: 50%;
      animation: spin .7s linear infinite; margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Hidden ── */
    .hidden { display: none !important; }

  function shortName(slug) {
    if (!slug) return '–';
    return LESSON_TITLES[slug] || slug.replace(/^(bel|math|bio|chem)\d*-/,'').replace(/-/g,' ').replace(/\b\w/g,c=>c.toUpperCase());
  }
  function relDate(s) {
    const d = new Date(s);
    return d.toLocaleDateString('bg-BG',{day:'numeric',month:'long'}).replace(/\s*г\.?$/, '');
  }

  // ── Read lessons from localStorage ──
  function getReadCount(subjectKey) {
    let count = 0;
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!k || !k.startsWith('lp_' + subjectKey)) continue;
      try {
        const d = JSON.parse(localStorage.getItem(k));
        if (d && (d.p || 0) >= 10) count++;
      } catch {}
    }
    return count;
  }

  // ── Essay data from localStorage (sachine.html format) ──
  function getBelEssayLS() {
    const bySlug = {};
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (!k || !k.startsWith('essay_bel')) continue;
      const m = k.match(/^essay_(bel[^_]+)_t(\d+)$/);
      if (!m) continue;
      const slug = m[1];
      try {
        const attempts = JSON.parse(localStorage.getItem(k) || '[]');
        if (attempts.length) {
          const best = attempts.reduce((a, b) => (b.total ?? 0) > (a.total ?? 0) ? b : a);

          bySlug[slug].push({ total: best.total ?? 0, date: best.date || '–', topicIdx: parseInt(m[2]) });
        }
      } catch {}
    }
    return bySlug; // { slug: [{total, date, topicIdx}] }
  }

  // ── Render student header ──
  const name = profile.full_name || session.user.email?.split('@')[0] || '–';
  document.getElementById('student-name').textContent = name;

  // Знайко count (today only)
  const today = new Date().toISOString().slice(0,10);
  const znaykoToday = profile.znayko_reset_date === today ? (profile.znayko_count_today || 0) : 0;

  // Total quizzes and lessons across all subjects
  const totalQuizLessons = new Set(quizAll.map(r => r.lesson_slug)).size;
  const totalReadLessons = SUBJECTS.reduce((sum, s) => sum + getReadCount(s.key), 0);

  const metaEl = document.getElementById('student-meta');
  const metaItems = [
    totalQuizLessons ? `<span class="student-stat">${I.quiz} <strong>${totalQuizLessons}</strong> теста</span>` : '',
    totalReadLessons ? `<span class="student-stat">${I.read} <strong>${totalReadLessons}</strong> урока</span>` : '',
    znaykoToday ? `<span class="student-stat">${I.chat} Знайко днес: <strong>${znaykoToday}</strong></span>` : '',
  ].filter(Boolean);
  metaEl.innerHTML = metaItems.join('');

  // ── Essay data from localStorage ──
  const belEssayLS = getBelEssayLS();

  // ── Compute per-subject data ──
  const subjData = SUBJECTS.map(s => {
    const qRows = quizAll.filter(r => r.lesson_slug?.startsWith(s.key));
    const eRows = essayAll.filter(r => r.lesson_slug?.startsWith(s.key)); // from Supabase

    // Group by lesson_slug → quiz_num → best pct
    const byLesson = {}; // { slug: { quizNum: {pct, created_at} } }
    qRows.forEach(r => {
      if (!byLesson[r.lesson_slug]) byLesson[r.lesson_slug] = {};
      const qn = r.quiz_num || 1;
      if (!byLesson[r.lesson_slug][qn] || r.pct > byLesson[r.lesson_slug][qn].pct) {
        byLesson[r.lesson_slug][qn] = { pct: r.pct, created_at: r.created_at };
      }
    });

    // Per-lesson average pct (across all quiz_nums done for that lesson) – no rounding, keeps precision
    const lessonAvgs = Object.values(byLesson).map(qnMap => {
      const pcts = Object.values(qnMap).map(v => v.pct);
      return pcts.reduce((a, p) => a + p, 0) / pcts.length;
    });
    const avgPct = lessonAvgs.length ? lessonAvgs.reduce((a, p) => a + p, 0) / lessonAvgs.length : null;
    const quizGrade = avgPct !== null ? pctToGrade(avgPct) : null;

    // Essay grade
    let essayGradeAvg = null;
    let essayGradesList = [];
    if (s.essay) {
      essayGradesList = eRows.map(e => e.grade ?? e.score ?? null).filter(g => g !== null);
      const lsData = s.key === 'bel' ? belEssayLS : {};
      Object.values(lsData).forEach(topics => {
        topics.forEach(t => essayGradesList.push(essayTotalToGrade(t.total)));
      });
      if (essayGradesList.length) {
        essayGradeAvg = essayGradesList.reduce((a, g) => a + g, 0) / essayGradesList.length;
      }
    }

    // Combined grade – weighted by count (quiz lessons + essay items каунтват поравно)
    let avg = null;
    const qCount = lessonAvgs.length;
    const eCount = essayGradesList.length;
    if (quizGrade !== null && essayGradeAvg !== null) {
      avg = (quizGrade * qCount + essayGradeAvg * eCount) / (qCount + eCount);
    } else if (quizGrade !== null) {
      avg = quizGrade;
    } else if (essayGradeAvg !== null) {
      avg = essayGradeAvg;
    }

    const readCount = getReadCount(s.key);
    const quizCount = Object.keys(byLesson).length;

    // Essay count from localStorage for BEL
    const essayLSCount = s.key === 'bel'
      ? Object.values(belEssayLS).reduce((sum, arr) => sum + arr.length, 0)
      : 0;
    const essayCount = eRows.length + essayLSCount;

    return { ...s, qRows, eRows, byLesson, lessonAvgs, avgPct, avg, quizGrade, essayGradeAvg, readCount, quizCount, essayCount };
  });

  // ── Overall average ──
  const withGrade = subjData.filter(s => s.avg !== null);
  if (withGrade.length) {
    const overall = withGrade.reduce((a, s) => a + s.avg, 0) / withGrade.length;
    const chip = document.getElementById('overall-chip');
    chip.style.display = 'flex';
    chip.querySelector('#overall-val').textContent = fmtGrade(overall);
  }

  // ── Tabs ──
  const tabsEl = document.getElementById('tabs');
  SUBJECTS.forEach(s => {
    const t = document.createElement('div');
    t.className = 'tab'; t.dataset.key = s.key; t.textContent = s.short;
    tabsEl.appendChild(t);
  });

  let activeKey = 'all';
  tabsEl.addEventListener('click', e => {
    const tab = e.target.closest('.tab');
    if (!tab) return;
    activeKey = tab.dataset.key;
    tabsEl.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.key===activeKey));
    renderCards();
  });

  // ── Render cards ──
  function renderCards() {
    const cardsEl = document.getElementById('cards');
    cardsEl.innerHTML = '';
    const toShow = activeKey==='all' ? subjData : subjData.filter(s=>s.key===activeKey);

    toShow.forEach(s => {
      const hasData = s.qRows.length > 0 || s.eRows.length > 0 || (s.key === 'bel' && Object.keys(belEssayLS).length > 0);
      if (!hasData) {
        cardsEl.insertAdjacentHTML('beforeend', `
          <div class="empty-card">
            <div style="font-size:28px;margin-bottom:8px;opacity:.4">📋</div>
            <strong>${s.label}</strong><br>
            Реши тест, за да се появят оценките.
          </div>`);
        return;
      }

      const avg = s.avg;
      const gNum = avg !== null ? fmtGrade(avg) : '–';
      const pct  = s.avgPct !== null ? Math.round(s.avgPct) : 0;

      // Grade label breakdown (for BEL show quiz + essay separately if both)
      let avgSubLabel = '';

      // Stats pills
      const statPills = [
        s.quizCount ? `<span class="stat-pill">${I.quiz} <strong>${s.quizCount}</strong> ${s.quizCount === 1 ? 'тест' : 'теста'}</span>` : '',
        s.readCount ? `<span class="stat-pill">${I.read} <strong>${s.readCount}</strong> ${s.readCount === 1 ? 'урок' : 'урока'}</span>` : '',
        s.essay && s.essayCount ? `<span class="stat-pill">${I.essay} <strong>${s.essayCount}</strong> ${s.essayCount === 1 ? 'съчинение' : 'съчинения'}</span>` : '',
      ].filter(Boolean).join('');

      // Build quiz rows – one row per lesson per quiz_num, sorted by lesson then quiz_num
      const quizRows = Object.entries(s.byLesson).map(([slug, qnMap]) => {
        const qnsSorted = Object.entries(qnMap).sort((a, b) => parseInt(a[0]) - parseInt(b[0]));
        const pcts = qnsSorted.map(([,v]) => v.pct);
        return qnsSorted.map(([qn, v], idx) => {
          const gRaw  = pctToGrade(v.pct);
          const gc    = gradeColor(gRaw);
          const gInt  = gRaw.toFixed(2);
          const gLbl  = gradeLabel(gRaw);
          const delta = idx > 0 ? v.pct - pcts[idx - 1] : null;
          const deltaHtml = delta !== null
            ? `<span style="color:${delta >= 0 ? '#15803d' : '#dc2626'}">${delta >= 0 ? '↑' : '↓'} ${Math.abs(delta)}%</span>`
            : '<span style="color:var(--muted)">–</span>';
          const lessonLabel = idx === 0
            ? `${shortName(slug)}`
            : `<span style="color:var(--muted);padding-left:10px">↳ ${shortName(slug)}</span>`;
          const attemptLabel = qnsSorted.length > 1 ? `Тест ${qn}` : '';
          return `<tr>
            <td>${lessonLabel}</td>
            <td class="td-attempt">${attemptLabel}</td>
            <td class="td-date">${relDate(v.created_at)}</td>
            <td class="td-r"><span class="badge" style="background:${gc}18;color:${gc}">${v.pct}%</span></td>
            <td class="td-delta">${deltaHtml}</td>
            <td class="td-grade" style="color:${gc}">${gLbl} <span style="font-size:11px;font-weight:700">${gInt}</span></td>
          </tr>`;
        }).join('');
      }).join('');

      // Essay rows from Supabase
      const supabaseEssayRows = s.essay && s.eRows.length ? s.eRows.map(e => {
        const g  = e.grade ?? e.score ?? '–';
        const gc = typeof g === 'number' ? gradeColor(g) : '#64748b';
        return `<tr>
          <td>${shortName(e.lesson_slug)}</td>
          <td class="td-attempt" style="color:#7c3aed">Съчинение</td>
          <td class="td-date">${relDate(e.created_at)}</td>
          <td></td>
          <td></td>
          <td class="td-grade" style="color:${gc}">${typeof g === 'number' ? `${gradeLabel(g)} <span style="font-size:11px;font-weight:700">${g.toFixed(2)}</span>` : g}</td>
        </tr>`;
      }).join('') : '';

      // Essay rows from localStorage (sachine.html)
      const lsEssayRows = s.key === 'bel' ? Object.entries(belEssayLS).map(([slug, topics]) =>
        topics.map(t => {
          const g  = essayTotalToGrade(t.total);
          const gc = gradeColor(g);
          return `<tr>
            <td>${shortName(slug)}</td>
            <td class="td-attempt" style="color:#7c3aed">Съчинение</td>
            <td class="td-date">${fixDate(t.date) || '–'}</td>
            <td><span class="badge" style="background:#7c3aed18;color:#7c3aed">${t.total}/24</span></td>
            <td></td>
            <td class="td-grade" style="color:${gc}">${gradeLabel(g)} <span style="font-size:11px;font-weight:700">${g.toFixed(2)}</span></td>
          </tr>`;
        }).join('')
      ).join('') : '';

      const hasQuizRows = s.qRows.length > 0;
      const hasEssayRows = supabaseEssayRows || lsEssayRows;

      // Summary rows at bottom of each section
      const quizSummaryRow = hasQuizRows && s.quizGrade !== null ? (() => {
        const gc = gradeColor(s.quizGrade);
        return `<tr class="tbl-summary-row">
          <td colspan="5" style="color:var(--muted);font-weight:700;font-size:12px;">Обща оценка от тестове</td>
          <td class="td-grade" style="color:${gc}">${gradeLabel(s.quizGrade)} <span style="font-size:11px;font-weight:700">${fmtGrade(s.quizGrade)}</span></td>
        </tr>`;
      })() : '';

      const essaySummaryRow = hasEssayRows && s.essayGradeAvg !== null ? (() => {
        const gc = gradeColor(s.essayGradeAvg);
        return `<tr class="tbl-summary-row">
          <td colspan="5" style="color:var(--muted);font-weight:700;font-size:12px;">Обща оценка от съчинения</td>
          <td class="td-grade" style="color:${gc}">${gradeLabel(s.essayGradeAvg)} <span style="font-size:11px;font-weight:700">${fmtGrade(s.essayGradeAvg)}</span></td>
        </tr>`;
      })() : '';

      const sectionDivider = hasQuizRows && hasEssayRows
        ? `<tr class="tbl-section-hdr"><td colspan="6">Съчинения</td></tr>` : '';

      cardsEl.insertAdjacentHTML('beforeend', `
        <div class="subj-card">
          <div class="subj-card-hdr">
            <div class="subj-color-dot" style="background:${s.color}"></div>
            <div class="subj-name" style="color:${s.color}">${s.label}</div>
            <div>
              ${avg !== null ? `
                <div style="text-align:right">
                  <div class="subj-avg" style="color:${gradeColor(avg)}">${gNum}</div>
                  <div class="subj-avg-cat" style="color:${gradeColor(avg)}">${gradeLabel(avg)}</div>
                  ${avgSubLabel}
                </div>
              ` : '<div class="subj-avg-lbl" style="color:var(--muted)">Няма данни</div>'}
            </div>
          </div>
          ${statPills ? `<div class="subj-stats">${statPills}</div>` : ''}
          ${avg !== null ? `
            <div class="subj-prog">
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <span style="font-size:11px;font-weight:700;color:var(--muted)">Успеваемост (тестове)</span>
                <span style="font-size:11px;font-weight:800;color:${gradeColor(pctToGrade(pct))}">${pct}%</span>
              </div>
              <div class="prog-bar"><div class="prog-fill" style="width:${pct}%;background:${s.color}"></div></div>
            </div>
          ` : ''}
          <table class="tests-table">
            <thead><tr>
              <th>Урок / Тема</th>
              <th>Опит</th>
              <th>Дата</th>
              <th class="th-r">Резултат</th>
              <th class="th-r">Промяна</th>
              <th class="th-r">Оценка</th>
            </tr></thead>
            <tbody>${quizRows}${quizSummaryRow}${sectionDivider}${supabaseEssayRows}${lsEssayRows}${essaySummaryRow}</tbody>
          </table>
        </div>`);
    });
  }

  // ── Show ──
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('content').classList.remove('hidden');
  renderCards();
})();
</script>
<script src="/sidebar.js"></script>
</body>
</html>
